function XAIExplainCard({user, txs}){
  const lastTx = txs[0];
  if(!lastTx) return null;
  const avg = calculateAvgTransaction(user);
  const std = calculateStdDeviation(user, avg);
  const z   = std>0 ? Math.abs((lastTx.amt - avg)/std) : 0;
  const bal = user.balance;
  const inContacts = lastTx.toNum && (lastTx.toNum in (user.contacts||{}));
  const inHistory  = lastTx.toNum && user.known_recipients?.has(lastTx.toNum);
  const inUPI      = lastTx.toNum && (lastTx.toNum in USERS);
  const spentToday = getDailySpent(user);
  const startBal   = Math.max(bal + spentToday, 1);
  const dailyPct   = ((spentToday + lastTx.amt) / startBal * 100).toFixed(0);

  const reasons = [];
  if(lastTx.amt / Math.max(bal,1) > 0.5) reasons.push({icon:"💸", label:"Unusual Amount", detail:`₹${lastTx.amt.toLocaleString()} is >50% of balance`, risk:"high"});
  if(!inContacts && !inHistory) reasons.push({icon:"👤", label:"New Recipient", detail:"Not in contacts or history", risk:"medium"});
  if(!inUPI) reasons.push({icon:"🌐", label:"Off-Network", detail:"Recipient not in UPI registry", risk:"high"});
  if(z > 2) reasons.push({icon:"📊", label:"Abnormal Amount", detail:`${z.toFixed(1)}σ from your avg (₹${Math.round(avg).toLocaleString()})`, risk:"medium"});
  if(dailyPct > 70) reasons.push({icon:"📅", label:"High Daily Spend", detail:`${dailyPct}% of today's starting balance`, risk:"medium"});
  if(lastTx.risk_tag === "otp" || lastTx.risk_tag === "high_risk") reasons.push({icon:"⏰", label:"High-Risk Transaction", detail:"Required OTP verification", risk:"high"});

  if(reasons.length === 0) reasons.push({icon:"✅", label:"Low Risk Pattern", detail:"No significant anomalies detected", risk:"low"});

  const riskColor = {high:"#dc2626", medium:"#f59e0b", low:"#22c55e"};
  const riskBg    = {high:"#fef2f2", medium:"#fef3c7", low:"#dcfce7"};

  return(
    <div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>
        Explaining last transaction: <b style={{color:"#0f172a"}}>₹{lastTx.amt.toLocaleString()}</b> to <b style={{color:"#0f172a"}}>{lastTx.to||lastTx.from||"?"}</b>
      </div>
      {reasons.map((r,i)=>(
        <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",
          background:riskBg[r.risk],borderRadius:10,marginBottom:8,
          border:`1px solid ${riskColor[r.risk]}22`}}>
          <span style={{fontSize:16,lineHeight:1}}>{r.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:riskColor[r.risk]}}>{r.label}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{r.detail}</div>
          </div>
          <span style={{padding:"2px 8px",background:riskColor[r.risk],color:"#fff",
            borderRadius:12,fontSize:10,fontWeight:700,whiteSpace:"nowrap",alignSelf:"center"}}>
            {r.risk.toUpperCase()}
          </span>
        </div>
      ))}
    </div>
  );
}

function EDAPatterns({txs}){
  const fraudTxs  = txs.filter(t=>t.status==="blocked");
  const legitTxs  = txs.filter(t=>t.status!=="blocked");
  const avgFraud  = fraudTxs.length ? Math.round(fraudTxs.reduce((s,t)=>s+t.amt,0)/fraudTxs.length) : 0;
  const avgLegit  = legitTxs.length ? Math.round(legitTxs.reduce((s,t)=>s+t.amt,0)/legitTxs.length) : 0;

  // Hour distribution
  const hourBuckets = {night:0, morning:0, afternoon:0, evening:0};
  txs.forEach(t=>{
    const h = t.time ? parseInt(t.time.split(":")[0]) : 12;
    if(h>=1&&h<5)       hourBuckets.night++;
    else if(h>=5&&h<12) hourBuckets.morning++;
    else if(h>=12&&h<18)hourBuckets.afternoon++;
    else                 hourBuckets.evening++;
  });

  // New recipient fraud rate
  const newRecFraud = txs.filter(t=>t.risk_tag==="high_risk"||t.risk>=95).length;
  const otpTxs      = txs.filter(t=>t.otp_used).length;

  const patterns = [
    {icon:"💰", label:"Avg Blocked Amount", val:`₹${avgFraud.toLocaleString()}`, note:"vs ₹"+avgLegit.toLocaleString()+" legitimate", color:"#dc2626", bg:"#fef2f2"},
    {icon:"🌙", label:"Night-Time Suspicious", val:hourBuckets.night, note:"Txns 1AM–5AM (high-risk window)", color:"#7c3aed", bg:"#f5f3ff"},
    {icon:"👤", label:"High-Risk Flagged", val:newRecFraud, note:"Scored ≥95 risk or high_risk tier", color:"#f59e0b", bg:"#fef3c7"},
    {icon:"🔐", label:"OTP Interventions", val:otpTxs, note:"Extra verification required", color:"#0078FF", bg:"#e8f1ff"},
  ];

  const timeLabels = ["Night (1-5AM)","Morning (5-12)","Afternoon (12-6PM)","Evening (6-1AM)"];
  const timeVals   = [hourBuckets.night, hourBuckets.morning, hourBuckets.afternoon, hourBuckets.evening];
  const timeColors = ["#dc2626","#22c55e","#0078FF","#f59e0b"];
  const maxTime    = Math.max(...timeVals, 1);

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {patterns.map(p=>(
          <div key={p.label} style={{background:p.bg,borderRadius:12,padding:"14px",
            border:`1px solid ${p.color}22`}}>
            <div style={{fontSize:20,marginBottom:4}}>{p.icon}</div>
            <div style={{fontSize:18,fontWeight:800,color:p.color}}>{p.val}</div>
            <div style={{fontSize:11,fontWeight:700,color:p.color,marginBottom:2}}>{p.label}</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>{p.note}</div>
          </div>
        ))}
      </div>
      <div style={{fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:10}}>
        🕐 Time-Based Fraud Pattern
      </div>
      {timeLabels.map((lbl,i)=>(
        <div key={lbl} style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:11,color:"#64748b"}}>{lbl}</span>
            <span style={{fontSize:11,fontWeight:700,color:timeColors[i]}}>{timeVals[i]} txns</span>
          </div>
          <div style={{height:7,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(timeVals[i]/maxTime)*100}%`,
              background:timeColors[i],borderRadius:4}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ═══ LOCATION CARD (Geo-enhanced Profile) ═══ */
function LocationCard({ user }){
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState("");
  const[loc,setLoc]=useState(GeoDeviceBaseline.location?.display || null);
  const[editing,setEditing]=useState(false);
  const[manual,setManual]=useState("");

  function refreshLocation(){
    setLoading(true);
    setMsg("");
    if (!navigator.geolocation) {
      setMsg("Geolocation not supported by your browser.");
      setLoading(false);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        GeoDeviceBaseline.location_enabled = true;
        GeoDeviceBaseline.location = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          city: "Locating...",
          display: "Locating...",
        };
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
          .then(r => r.json())
          .then(data => {
            const addr = data.address || {};
            const area = addr.neighbourhood || addr.quarter || addr.suburb || addr.residential || null;
            const city = addr.city || addr.town || addr.municipality || addr.village || addr.county || "Unknown";
            const state = addr.state || "";
            const display = area ? `${area}, ${city}, ${state}` : `${city}, ${state}`;
            GeoDeviceBaseline.location.city = city;
            GeoDeviceBaseline.location.area = area;
            GeoDeviceBaseline.location.region = state;
            GeoDeviceBaseline.location.display = display;
            setLoc(display);
            setMsg("✅ Location updated successfully");
            setTimeout(() => setMsg(""), 3000);
          })
          .catch(() => {
            setMsg("Could not fetch address. Try again.");
          })
          .finally(() => setLoading(false));
      },
      () => {
        setMsg("⚠️ Location permission denied. Please allow access in browser settings.");
        setLoading(false);
      },
      { timeout: 8000 }
    );
  }

  function saveManual(){
    if (!manual.trim()) return;
    // Only admins may set location manually — log it
    if (!user.isAdmin) {
      setMsg("❌ Manual location entry is not allowed.");
      setEditing(false);
      return;
    }
    GeoDeviceBaseline.location = {
      ...GeoDeviceBaseline.location,
      display: manual.trim(),
      city: manual.trim(),
      manual: true,
    };
    console.log(`[ADMIN OVERRIDE] ${user.name} set manual location: ${manual.trim()}`);
    setLoc(manual.trim());
    setEditing(false);
    setManual("");
    setMsg("✅ Location updated manually");
    setTimeout(() => setMsg(""), 3000);
  }

  return(
    <div style={{marginTop:16}}>
      <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:10,
        display:"flex",alignItems:"center",gap:6}}>
        📍 Current Location
      </div>

      {/* Location display */}
      <div style={{background:"#f8faff",borderRadius:12,padding:"12px 16px",
        border:"1px solid #e8f1ff",marginBottom:12}}>
        {loc ? (
          <div style={{fontSize:13,fontWeight:600,color:"#0f172a"}}>
            📍 {loc}
            {GeoDeviceBaseline.location?.manual && (
              <span style={{fontSize:10,color:"#f59e0b",fontWeight:700,
                marginLeft:8,background:"#fef3c7",padding:"2px 7px",borderRadius:8}}>
                Manual
              </span>
            )}
          </div>
        ) : (
          <div style={{fontSize:13,color:"#94a3b8"}}>Location not captured yet</div>
        )}
        <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>
          💻 {GeoDeviceBaseline.deviceInfo
            ? `${GeoDeviceBaseline.deviceInfo.browser} · ${GeoDeviceBaseline.deviceInfo.os} · ${GeoDeviceBaseline.deviceInfo.timezone}`
            : "Device info unavailable"}
        </div>
      </div>

      {/* Message */}
      {msg && (
        <div style={{fontSize:12,fontWeight:600,
          color: msg.startsWith("✅") ? "#166534" : "#dc2626",
          marginBottom:10,padding:"6px 12px",borderRadius:8,
          background: msg.startsWith("✅") ? "#dcfce7" : "#fef2f2"}}>
          {msg}
        </div>
      )}

      {/* Manual edit input */}
      {editing && (
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input
            value={manual}
            onChange={e => setManual(e.target.value)}
            onKeyDown={e => e.key === "Enter" && saveManual()}
            placeholder="e.g. Baner, Pune, Maharashtra"
            style={{flex:1,padding:"9px 13px",border:"1.5px solid #bfdbfe",borderRadius:10,
              fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif"}}
          />
          <button onClick={saveManual}
            style={{padding:"9px 16px",background:"linear-gradient(135deg,#0078FF,#0055cc)",
              border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:13,
              cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            Save
          </button>
          <button onClick={() => setEditing(false)}
            style={{padding:"9px 14px",background:"#f1f5f9",border:"none",borderRadius:10,
              color:"#64748b",fontWeight:600,fontSize:13,cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif"}}>
            Cancel
          </button>
        </div>
      )}

      {/* Action buttons */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={refreshLocation} disabled={loading}
          style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",
            background:"linear-gradient(135deg,#0078FF,#0055cc)",border:"none",
            borderRadius:10,color:"#fff",fontWeight:700,fontSize:12,
            cursor:loading?"not-allowed":"pointer",opacity:loading?0.6:1,
            fontFamily:"'DM Sans',sans-serif"}}>
          {loading ? "Detecting..." : "🔄 Refresh Location"}
        </button>
        {user.isAdmin && (
        <button onClick={() => { setEditing(e => !e); setMsg(""); }}
          style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",
            background:"#f0f6ff",border:"1.5px solid #bfdbfe",
            borderRadius:10,color:"#0078FF",fontWeight:700,fontSize:12,
            cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
          ✏️ Set Manually
        </button>
        )}
      </div>
    </div>
  );
}

function ProfilePage({user,txs,balance,updateUser,tickets}){
  const[locked,setLocked]=useState(false);
  const[pd,setPd]=useState({cur:"",n1:"",n2:""});
  const[msg,setMsg]=useState("");
  const[detailTicket,setDetailTicket]=useState(null);
  const[mockCity,setMockCity]=useState(MockLocation.active ? MockLocation.label : "");
  
  const safetyScore = Math.max(0, 100 - (user.risk_score));
  const avgAmount = txs.length ? Math.round(txs.reduce((s,t)=>s+t.amt,0)/txs.length) : 0;
  const riskHistory = user.risk_score_history || [];
  const myTickets = (tickets||[]).filter(t => t.user === user.number);

  function resetPin(){
    if(pd.n1.length<4||pd.n1!==pd.n2){setMsg("PINs must match and be 4 digits");return;}
    setMsg("PIN updated successfully ✔");
    setPd({cur:"",n1:"",n2:""});setTimeout(()=>setMsg(""),3000);
  }

  function handleEmergencyLock(){
    emergencyLock(user);
    setLocked(true);
    setMsg("Account locked successfully. Please visit branch to unlock.");
  }

  const ticketStatusMeta = {
    "Under Review":  {color:"#92400e",bg:"#fef3c7",border:"#fcd34d"},
    "Investigating": {color:"#1e40af",bg:"#dbeafe",border:"#93c5fd"},
    "Resolved":      {color:"#166534",bg:"#dcfce7",border:"#86efac"},
  };

  return(
    <div className="page-pad page-enter" style={{padding:24,maxWidth:700,margin:"0 auto"}}>
      {detailTicket && (
        <TicketDetailModal ticket={detailTicket} tx={txs.find(t => t.id === detailTicket.transaction_id)} onClose={()=>setDetailTicket(null)}/>
      )}
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#0f172a",marginBottom:4}}>Profile & Security</h2>
        <p style={{fontSize:14,color:"#64748b"}}>Manage your account and security settings</p>
      </div>

      {/* ═══ DEV TOOLS: Mock Location Override (Admin only) ═══ */}
      {user.isAdmin && (
      <div style={{background:"#0f172a",borderRadius:16,padding:"16px 18px",marginBottom:18,
        border:"1.5px solid #1e293b"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{fontSize:16}}>🧪</span>
          <span style={{fontWeight:800,fontSize:13,color:"#e2e8f0",letterSpacing:.3}}>Dev Tools — Simulate Location</span>
          {MockLocation.active && (
            <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,padding:"2px 10px",
              borderRadius:10,background:"#22c55e22",color:"#4ade80",border:"1px solid #4ade8040"}}>
              ACTIVE
            </span>
          )}
        </div>
        <p style={{fontSize:12,color:"#64748b",marginBottom:12,lineHeight:1.5}}>
          Override GPS location for testing geo-anomaly detection. The selected city will be used as the transaction origin for all future payments this session.
        </p>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {MOCK_CITIES.map(city => (
            <button key={city.label}
              onClick={()=>{ setMockCity(city.label); setMockLocation(city); }}
              style={{padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:700,
                fontFamily:"'DM Sans',sans-serif",cursor:"pointer",
                border: mockCity===city.label ? "2px solid #0078FF" : "1.5px solid #334155",
                background: mockCity===city.label ? "#0078FF" : "#1e293b",
                color: mockCity===city.label ? "#fff" : "#94a3b8",
                transition:"all .15s"}}>
              📍 {city.label}
            </button>
          ))}
          {MockLocation.active && (
            <button onClick={()=>{ setMockCity(""); setMockLocation(null); }}
              style={{padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:700,
                fontFamily:"'DM Sans',sans-serif",cursor:"pointer",
                border:"1.5px solid #ef4444",background:"#ef444422",color:"#f87171"}}>
              ✕ Clear override
            </button>
          )}
        </div>
        {MockLocation.active && (
          <div style={{marginTop:10,fontSize:12,color:"#4ade80",fontWeight:600}}>
            ✔ Payments will appear to originate from: <strong>{MockLocation.label}</strong>
            &nbsp;({MockLocation.lat.toFixed(4)}, {MockLocation.lng.toFixed(4)})
          </div>
        )}
      </div>
      )}

      <Card style={{padding:0,marginBottom:16,overflow:"hidden"}}>
        <div style={{background:`linear-gradient(135deg,#0078FF,#0055cc,#003fa6)`,
          padding:"26px 24px 28px",position:"relative",backgroundSize:"200% 200%",animation:"gradMove 8s ease infinite"}}>
          <div style={{position:"absolute",right:-30,top:-30,width:130,height:130,borderRadius:"50%",background:"rgba(255,255,255,.05)"}}/>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{position:"relative"}}>
              <Avatar name={user.name} size={62}/>
              <div style={{position:"absolute",bottom:1,right:1,width:17,height:17,borderRadius:"50%",
                background:"#22c55e",border:"2.5px solid #fff"}}/>
            </div>
            <div>
              <div style={{fontWeight:900,fontSize:22,color:"#fff",letterSpacing:"-.3px"}}>{user.name}</div>
              {user.verified&&<div style={{display:"inline-flex",alignItems:"center",gap:5,
                background:"rgba(255,255,255,.18)",borderRadius:20,padding:"3px 10px",marginTop:4}}>
                <span style={{color:"#fff",fontSize:11,fontWeight:700}}>✔ Verified User</span>
              </div>}
              <div style={{color:"rgba(255,255,255,.72)",fontSize:13,marginTop:5}}>{user.upi}</div>
              <div style={{color:"rgba(255,255,255,.55)",fontSize:12,marginTop:2}}>+91 {user.number}</div>
            </div>
          </div>
        </div>
        <div style={{padding:"20px 24px"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:16}}>
            {Ic.check("#166534")}
            <span style={{color:"#166534",fontSize:13,fontWeight:700}}>KYC Verified Account</span>
          </div>
          
          <div className="profile-3" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
            {[
              {label:"Balance",      value:`₹${balance.toLocaleString("en-IN")}`,color:"#0078FF"},
              {label:"Transactions", value:String(txs.length), color:"#7c3aed"},
              {label:"Safety Score", value:`${safetyScore}/100`, color:"#22c55e"},
            ].map(s=>(
              <div key={s.label} style={{background:"#f8faff",borderRadius:12,padding:"14px 16px",
                border:"1px solid #f0f6ff"}}>
                <div style={{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:4}}>{s.label}</div>
                <div style={{fontSize:18,fontWeight:800,color:s.color}}>{s.value}</div>
              </div>
            ))}
          </div>
          
          <Div/>
          
          <div style={{marginTop:16}}>
            <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:8}}>Risk Score History</div>
            {riskHistory.length === 0 ? (
              <div style={{color:"#94a3b8",fontSize:13}}>No risk history yet</div>
            ) : (
              <div style={{maxHeight:200,overflowY:"auto"}}>
                {riskHistory.slice(-5).reverse().map((h,i) => (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",
                    borderBottom:i<4?"1px solid #f1f5f9":"none"}}>
                    <span style={{fontSize:12,color:"#64748b"}}>
                      {new Date(h.time).toLocaleTimeString()}
                    </span>
                    <span style={{fontWeight:700,color: riskMeta(h.score).color}}>
                      {h.score} ({h.action})
                    </span>
                    <span style={{fontSize:12,color:"#64748b"}}>₹{h.amount}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </Card>

      {/* ═══ LOCATION CARD ═══ */}
      <Card style={{padding:22,marginBottom:16}}>
        <LocationCard user={user} />
      </Card>

      {/* ═══ ACTIVE FRAUD REPORTS SECTION ═══ */}
      <Card style={{padding:22,marginBottom:16}}>
        <div style={{fontWeight:800,color:"#0f172a",fontSize:15,marginBottom:16,
          display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            🚨 Fraud Reports / Dispute Cases
            {myTickets.length > 0 && (
              <span style={{background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"#fff",
                fontSize:11,fontWeight:800,padding:"2px 9px",borderRadius:20,
                animation:"badgePop .4s cubic-bezier(.16,1,.3,1)"}}>
                {myTickets.length}
              </span>
            )}
          </div>
        </div>
        {myTickets.length === 0 ? (
          <div style={{textAlign:"center",padding:"24px 0"}}>
            <div style={{fontSize:32,marginBottom:10}}>🛡️</div>
            <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:4}}>No active fraud reports</div>
            <div style={{fontSize:12,color:"#94a3b8"}}>
              Report a suspicious transaction from the Transaction History page to file a dispute case.<br/>
              <span style={{color:"#92400e",fontWeight:600}}>⚡ Instant auto-forward to Bank &amp; Cyber Cell</span>
            </div>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {myTickets.map(ticket => {
              const sm = ticketStatusMeta[ticket.status] || ticketStatusMeta["Under Review"];
              const sev = ticket.severity || getFraudSeverity(ticket.reason || "");
              const svm = getSeverityMeta(sev);
              return (
                <button key={ticket.id} onClick={()=>setDetailTicket(ticket)}
                  style={{width:"100%",padding:"14px 16px",background:"#f8faff",
                    border:`1.5px solid ${sm.border}`,borderRadius:14,cursor:"pointer",
                    fontFamily:"'DM Sans',sans-serif",textAlign:"left",
                    transition:"all .18s ease",animation:"fadeUp .3s cubic-bezier(.16,1,.3,1)"}}
                  onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,.1)";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,fontWeight:800,color:"#0f172a"}}>{ticket.id}</span>
                      <span style={{background:svm.bg,border:`1px solid ${svm.border}`,color:svm.color,fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:8}}>Under Review</span>
                    </div>
                    <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,
                      background:sm.bg,color:sm.color,border:`1px solid ${sm.border}`}}>
                      {ticket.status}
                    </span>
                  </div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:6}}>
                    <span style={{fontSize:12,color:"#64748b"}}>
                      💰 <b style={{color:"#0f172a"}}>₹{ticket.amount?.toLocaleString("en-IN")}</b>
                    </span>
                    <span style={{fontSize:12,color:"#64748b"}}>
                      👤 {ticket.recipientName || ticket.recipient}
                    </span>
                    <span style={{fontSize:12,color:"#64748b"}}>
                      📋 {ticket.reason}
                    </span>
                  </div>
                  <div style={{fontSize:11,color:svm.color,background:svm.bg,border:`1px solid ${svm.border}`,
                    borderRadius:8,padding:"3px 8px",display:"inline-flex",alignItems:"center",gap:4,
                    fontWeight:600}}>
                    Under Review — Expected: {svm.resolution}
                  </div>
                  {ticket.refund_status !== "Pending" && (
                    <div style={{marginTop:8,fontSize:12,fontWeight:700,
                      color:ticket.refund_status==="Approved"?"#166534":"#dc2626"}}>
                      Refund: {ticket.refund_status==="Approved"?"✅ Approved":"❌ Rejected"}
                    </div>
                  )}
                  <div style={{marginTop:6,fontSize:11,color:"#94a3b8",display:"flex",alignItems:"center",gap:5}}>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    {new Date(ticket.created_at).toLocaleDateString()} · ETA: {svm.resolution}
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </Card>

      <Card style={{padding:22,marginBottom:16}}>
        <div style={{fontWeight:800,color:"#0f172a",fontSize:15,marginBottom:16,
          display:"flex",alignItems:"center",gap:8}}>
          {Ic.shield("#0078FF")} Security Center
        </div>
        <div className="sec-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={handleEmergencyLock}
            style={{padding:16,background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:14,cursor:"pointer",
              textAlign:"left",fontFamily:"'DM Sans',sans-serif"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              {Ic.freeze("#dc2626")}
              <span style={{fontWeight:700,fontSize:14,color:"#dc2626"}}>Emergency Lock</span>
            </div>
            <div style={{fontSize:12,color:"#94a3b8"}}>Freeze account instantly</div>
          </button>
          {[
            {ico:Ic.monitor("#0078FF"), t:"2FA Active",   s:"OTP on all transfers"},
            {ico:Ic.shield("#166534"),  t:"Verified",     s:"KYC confirmed"},
            {ico:Ic.flag("#dc2626"),    t:"Report Fraud", s:"helpdesk@paytrust.in"},
          ].map(x=>(
            <div key={x.t} style={{padding:16,background:"#f8faff",border:"1px solid #e2e8f0",borderRadius:14}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                {x.ico}<span style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{x.t}</span>
              </div>
              <div style={{fontSize:12,color:"#94a3b8"}}>{x.s}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card style={{padding:22}}>
        <div style={{fontWeight:800,color:"#0f172a",fontSize:15,marginBottom:16,
          display:"flex",alignItems:"center",gap:8}}>
          {Ic.key("#0078FF")} Reset PIN
        </div>
        {[["cur","Current PIN"],["n1","New PIN"],["n2","Confirm New PIN"]].map(([k,lbl])=>(
          <div key={k} style={{marginBottom:16}}>
            <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:6,
              color:"#374151",textTransform:"uppercase",letterSpacing:.5}}>{lbl}</label>
            <input type="password" maxLength={4} value={pd[k]}
              onChange={e=>setPd(p=>({...p,[k]:e.target.value.replace(/\D/,"").slice(0,4)}))}
              placeholder="••••"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",
                fontSize:20,letterSpacing:10,outline:"none",boxSizing:"border-box",
                background:"#f8faff",fontFamily:"'DM Sans',sans-serif"}}/>
          </div>
        ))}
        {msg&&(
          <div style={{padding:"10px 14px",borderRadius:10,marginBottom:14,fontSize:13,fontWeight:600,
            background:msg.includes("✔")?"#dcfce7":"#fef2f2",
            color:msg.includes("✔")?"#166534":"#dc2626",
            border:`1px solid ${msg.includes("✔")?"#bbf7d0":"#fca5a5"}`}}>
            {msg}
          </div>
        )}
        <Btn onClick={resetPin} variant="primary">Update PIN</Btn>
      </Card>
    </div>
  );
}

// ===== NEW FEATURE: Request Money Page =====
// Allows the user to REQUEST money FROM others — they receive it, not send it
function RequestMoneyPage({user, setPage}){
  const [recipient, setRecipient] = useState("");
  const [recipientType, setRecipientType] = useState("phone");
  const [recipientErr, setRecipientErr] = useState(""); // FEATURE: mobile validation error
  const [amt, setAmt] = useState("");
  const [note, setNote] = useState("");
  const [stage, setStage] = useState("form"); // form | success
  const [sentRequests, setSentRequests] = useState([]);

  const parsedAmt = parseFloat(amt) || 0;

  const getRecipientInfo = () => {
    let targetNum = recipient;
    if (recipientType === 'upi') {
      const u = Object.entries(USERS).find(([,v]) => v.upi === recipient);
      if (u) targetNum = u[0];
    }
    const inSystem = targetNum in USERS;
    const name = inSystem ? USERS[targetNum].name : recipient;
    return { targetNum, name, inSystem };
  };

  const { name: recipName, inSystem } = recipient ? getRecipientInfo() : { name: "", inSystem: false };
  const isReady = recipient && parsedAmt > 0 && note.trim();

  function sendRequest() {
    // FEATURE: Validate recipient mobile is 10 digits for phone type
    if (recipientType === 'phone' && recipient.replace(/\D/,"").length !== 10) {
      setRecipientErr("Enter a valid 10-digit mobile number");
      return;
    }
    if (!isReady) return;
    const { targetNum, name } = getRecipientInfo();
    const { date, time } = nowStamp();
    const newReq = {
      id: Date.now(),
      to: name || recipient,
      toNum: targetNum,
      upi: inSystem ? USERS[targetNum]?.upi : recipient,
      amt: parsedAmt,
      reason: note,
      date,
      time,
      status: "pending",
      type: "sent_request"
    };
    setSentRequests(prev => [newReq, ...prev]);
    setStage("success");
  }

  if (stage === "success") return (
    <div className="page-pad page-enter" style={{padding:40,display:"flex",flexDirection:"column",
      alignItems:"center",minHeight:"60vh",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:24,padding:"40px 34px",maxWidth:380,width:"100%",
        boxShadow:"0 20px 56px rgba(124,58,237,.1)",textAlign:"center",animation:"scaleIn .4s cubic-bezier(.16,1,.3,1)"}}>
        <div style={{width:80,height:80,borderRadius:"50%",
          background:"linear-gradient(135deg,#f5f3ff,#ede9fe)",
          display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",
          boxShadow:"0 8px 24px rgba(124,58,237,.15)"}}>
          <svg width="40" height="40" viewBox="0 0 40 40">
            <polyline points="8 20 16 28 32 12" fill="none" stroke="#7c3aed" strokeWidth="3.5"
              strokeLinecap="round" strokeLinejoin="round"
              strokeDasharray="36" strokeDashoffset="36"
              style={{animation:"drawCheck .4s .1s ease forwards"}}/>
          </svg>
        </div>
        <h2 style={{color:"#7c3aed",fontSize:22,fontWeight:800,marginBottom:8}}>Request Sent!</h2>
        <p style={{color:"#64748b",marginBottom:4,fontSize:15}}>
          You requested <b style={{color:"#0f172a"}}>₹{parsedAmt.toLocaleString("en-IN")}</b> from
        </p>
        <p style={{color:"#7c3aed",fontWeight:700,marginBottom:20,fontSize:14}}>
          {getRecipientInfo().name || recipient}
        </p>
        <p style={{fontSize:12,color:"#94a3b8",marginBottom:24}}>
          They will receive a notification to approve and pay you.
        </p>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{setStage("form");setRecipient("");setAmt("");setNote("");}} variant="primary" style={{flex:1}}>
            New Request
          </Btn>
          <Btn onClick={()=>setPage("dashboard")} variant="secondary" style={{flex:1}}>Dashboard</Btn>
        </div>
      </div>
    </div>
  );

  return (
    <div className="page-pad page-enter" style={{padding:24,maxWidth:580,margin:"0 auto"}}>
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#0f172a",marginBottom:4}}>Request Money</h2>
        <p style={{fontSize:14,color:"#64748b"}}>
          Ask someone to send you money — they pay, you receive
        </p>
      </div>

      {/* Info banner */}
      <div style={{padding:"12px 16px",background:"#f5f3ff",border:"1px solid #c4b5fd",
        borderRadius:12,marginBottom:20,display:"flex",alignItems:"flex-start",gap:10}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p style={{fontSize:13,color:"#6d28d9",margin:0,lineHeight:1.5}}>
          <strong>Requesting money:</strong> You are asking someone else to pay you. Money will be credited to your account only after they approve. You will NOT send any money.
        </p>
      </div>

      <Card style={{padding:24}}>
        {/* Recipient type toggle */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            {["phone","upi"].map(t => (
              <button key={t} onClick={() => { setRecipientType(t); setRecipient(""); setRecipientErr(""); }}
                style={{flex:1,padding:"8px",borderRadius:8,cursor:"pointer",
                  fontFamily:"'DM Sans',sans-serif",fontWeight:600,
                  border:recipientType===t?"2px solid #7c3aed":"1px solid #e2e8f0",
                  background:recipientType===t?"#f5f3ff":"#fff",
                  color:recipientType===t?"#7c3aed":"#64748b"}}>
                {t === "phone" ? "📱 Phone" : "🆔 UPI ID"}
              </button>
            ))}
          </div>

          <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:7}}>
            Request From ({recipientType === 'phone' ? 'Mobile Number' : 'UPI ID'})
          </label>
          <input
            value={recipient}
            onChange={e => {
              // FEATURE: digit-only for phone type, max 10 digits
              const val = recipientType === 'phone'
                ? e.target.value.replace(/\D/,"").slice(0,10)
                : e.target.value;
              setRecipient(val);
              setRecipientErr("");
            }}
            placeholder={recipientType === 'phone' ? "10-digit mobile number" : "example@paytrust"}
            style={{width:"100%",padding:"12px 14px",borderRadius:12,
              border:`1.5px solid ${recipientErr?"#fca5a5":recipient?"#c4b5fd":"#e2e8f0"}`,
              fontSize:14,outline:"none",boxSizing:"border-box",
              color:"#0f172a",background:"#fff",fontFamily:"'DM Sans',sans-serif"}}
          />
          {/* FEATURE: Recipient mobile validation error */}
          {recipientErr && (
            <div style={{marginTop:6,fontSize:12,color:"#dc2626",fontWeight:600,animation:"slideDown .2s ease"}}>
              {recipientErr}
            </div>
          )}
          {recipient && recipientType === 'phone' && recipient in USERS && (
            <div style={{marginTop:6,fontSize:13,color:"#7c3aed",display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              <strong>{USERS[recipient].name}</strong>
              {USERS[recipient].verified && (
                <span style={{fontSize:11,background:"#e0f2fe",color:"#0369a1",padding:"2px 8px",
                  borderRadius:12,fontWeight:700}}>✔ Verified</span>
              )}
            </div>
          )}
          {recipient && !inSystem && recipientType === 'phone' && (
            <div style={{marginTop:6,fontSize:12,color:"#94a3b8"}}>
              ⚠️ This number is not on PayTrust — request may not be delivered
            </div>
          )}
        </div>

        {/* Amount */}
        <div style={{marginBottom:18}}>
          <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:7}}>
            Amount You Want to Receive (₹)
          </label>
          <input type="number" value={amt} onChange={e => setAmt(e.target.value)}
            placeholder="0"
            style={{width:"100%",padding:"12px 14px",borderRadius:12,
              border:`1.5px solid ${amt?"#c4b5fd":"#e2e8f0"}`,
              fontSize:24,fontWeight:800,outline:"none",boxSizing:"border-box",
              color:"#0f172a",background:"#fff"}}/>
          <div style={{marginTop:8,display:"flex",gap:7,flexWrap:"wrap"}}>
            {[100,500,1000,5000].map(v => (
              <button key={v} onClick={() => setAmt(String(v))}
                style={{padding:"5px 12px",background:amt==v?"#f5f3ff":"#f8faff",
                  border:`1px solid ${amt==v?"#c4b5fd":"#e2e8f0"}`,
                  borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",
                  color:amt==v?"#7c3aed":"#64748b",fontFamily:"'DM Sans',sans-serif"}}>
                ₹{v.toLocaleString()}
              </button>
            ))}
          </div>
        </div>

        {/* Reason */}
        <div style={{marginBottom:22}}>
          <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:7}}>
            Reason / Note (required)
          </label>
          <input value={note} onChange={e => setNote(e.target.value)}
            placeholder="e.g. Rent split, Dinner bill, Loan repayment…"
            style={{width:"100%",padding:"12px 14px",borderRadius:12,
              border:`1.5px solid ${note?"#c4b5fd":"#e2e8f0"}`,
              fontSize:14,outline:"none",boxSizing:"border-box",
              color:"#0f172a",background:"#fff",fontFamily:"'DM Sans',sans-serif"}}/>
        </div>

        {/* Preview */}
        {parsedAmt > 0 && recipient && (
          <div style={{padding:"14px 16px",background:"#f5f3ff",borderRadius:12,marginBottom:18,
            border:"1px solid #c4b5fd"}}>
            <div style={{fontSize:12,color:"#7c3aed",fontWeight:700,marginBottom:6}}>Request Preview</div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
              <span style={{color:"#64748b"}}>Requesting from</span>
              <span style={{fontWeight:700,color:"#0f172a"}}>{recipName || recipient}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
              <span style={{color:"#64748b"}}>Amount you receive</span>
              <span style={{fontWeight:800,fontSize:17,color:"#7c3aed"}}>+₹{parsedAmt.toLocaleString("en-IN")}</span>
            </div>
          </div>
        )}

        <button onClick={sendRequest} disabled={!isReady}
          className="btn-primary"
          style={{width:"100%",padding:"14px",fontSize:16,borderRadius:14,border:"none",
            background:isReady?"linear-gradient(135deg,#7c3aed,#6d28d9)":"#c4b5fd",
            color:"#fff",fontWeight:700,cursor:isReady?"pointer":"not-allowed",
            fontFamily:"'DM Sans',sans-serif",
            boxShadow:isReady?"0 6px 18px rgba(124,58,237,.3)":"none"}}>
          Send Request →
        </button>
      </Card>

      {/* Sent requests history */}
      {sentRequests.length > 0 && (
        <div style={{marginTop:20}}>
          <h3 style={{fontWeight:800,fontSize:16,color:"#0f172a",marginBottom:12}}>Requests Sent This Session</h3>
          {sentRequests.map(r => (
            <Card key={r.id} style={{padding:16,marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:14}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <Avatar name={r.to} size={40}/>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{r.to}</div>
                    <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{r.reason} · {r.date}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:800,fontSize:16,color:"#7c3aed"}}>+₹{r.amt.toLocaleString("en-IN")}</div>
                  <span style={{fontSize:11,background:"#fef3c7",color:"#92400e",padding:"2px 8px",
                    borderRadius:10,fontWeight:700}}>Pending</span>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

// ===== TOAST NOTIFICATION =====
function useToast(){
  const[toast,setToast]=useState(null);
  function showToast(msg,ms=2500){
    setToast(msg);
    setTimeout(()=>setToast(null),ms);
  }
  const ToastEl=toast?(
    <div className="pt-toast">{toast}</div>
  ):null;
  return{showToast,ToastEl};
}


// ===== SMART GUARD GAME =====
function SmartGuardGame({onComplete}) {
  const [currentIdx, setCurrentIdx] = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [gameOver, setGameOver] = useState(false);

  const POOL = [
    // Scam or Legit - 5 questions
    { id: 1, type: 'scamlegit', question: 'You receive an SMS: "Your bank account will be frozen. Click here to verify your details immediately."', options: ['Scam', 'Legit'], correctAnswer: 0 },
    { id: 2, type: 'scamlegit', question: 'Your UPI app shows a notification: "Welcome! Tap to claim ₹500 cashback. No verification needed."', options: ['Scam', 'Legit'], correctAnswer: 0 },
    { id: 3, type: 'scamlegit', question: 'You get a call from your bank asking for your full ATM pin to unblock your card.', options: ['Scam', 'Legit'], correctAnswer: 0 },
    { id: 4, type: 'scamlegit', question: 'An email from your bank says: "Update your KYC now or your account will be suspended."', options: ['Scam', 'Legit'], correctAnswer: 0 },
    { id: 5, type: 'scamlegit', question: 'You win a lottery message saying you can withdraw ₹10,000 by paying ₹500 processing fee.', options: ['Scam', 'Legit'], correctAnswer: 0 },
    // Spot the Red Flag - 5 questions
    { id: 6, type: 'redflag', question: 'A stranger sends you ₹500 on UPI and calls: "I made a mistake, please return it to this number."', options: ['Safe', 'Red Flag'], correctAnswer: 1 },
    { id: 7, type: 'redflag', question: 'A "bank executive" calls and says your Aadhaar is linked to illegal activities and asks for OTP.', options: ['Safe', 'Red Flag'], correctAnswer: 1 },
    { id: 8, type: 'redflag', question: 'Your friend asks you to transfer ₹2000 via UPI as they are stuck without cash.', options: ['Safe', 'Red Flag'], correctAnswer: 0 },
    { id: 9, type: 'redflag', question: 'A website promises 50% cashback on first recharge if you enter your UPI PIN on their page.', options: ['Red Flag', 'Safe'], correctAnswer: 0 },
    { id: 10, type: 'redflag', question: 'You receive a link to track your delivery, it asks for your card number to confirm.', options: ['Red Flag', 'Safe'], correctAnswer: 0 },
    // Escape Room - 5 questions
    { id: 11, type: 'escape', question: 'You accidentally tap an unknown UPI link. What do you do first?', options: ['Enter your details', 'Close the app', 'Tell a family member', 'Call the police'], correctAnswer: 2 },
    { id: 12, type: 'escape', question: 'Your bank calls asking for UPI PIN. What should you do?', options: ['Give the PIN', 'Hang up and call bank official number', 'Ask them to verify first', 'Ignore the call'], correctAnswer: 1 },
    { id: 13, type: 'escape', question: 'You see ₹5000 credited by mistake. The sender asks for it back. What do you do?', options: ['Ignore', 'Transfer immediately', 'Report to bank', 'Block them'], correctAnswer: 2 },
    { id: 14, type: 'escape', question: 'OTP for a transaction you did not initiate arrives. What next?', options: ['Share with caller', 'Enter on unknown app', 'Delete and ignore', 'Tell everyone'], correctAnswer: 2 },
    { id: 15, type: 'escape', question: 'Someone creates a fake ID of you on social media. What should you do first?', options: ['Create fake ID of them', 'Report to cyber crime', 'Ignore it', 'Hack their account'], correctAnswer: 1 },
  ];

  const questions = useMemo(() => {
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    return shuffle(POOL).slice(0, 5);
  }, []);

  function handleSelect(idx) {
    if (selected !== null) return;
    setSelected(idx);
    setShowResult(true);
    if (idx === questions[currentIdx].correctAnswer) {
      setCorrectCount(c => c + 1);
    }
  }

  function handleNext() {
    if (currentIdx < 4) {
      setCurrentIdx(currentIdx + 1);
      setSelected(null);
      setShowResult(false);
    } else {
      // Game finished - save coins to localStorage
      const earned = correctCount * 5;
      const coins = parseInt(localStorage.getItem('coins') || '0');
      localStorage.setItem('coins', coins + earned);
      localStorage.setItem('lastPlayedDate', new Date().toDateString());
      setGameOver(true);
    }
  }

  function handleFinish() {
    onComplete();
  }

  if (gameOver) {
    const earned = correctCount * 5;
    return (
      <Modal>
        <div style={{ background: '#fff', borderRadius: 24, padding: 32, maxWidth: 360, width: '90vw', textAlign: 'center', animation: 'scaleIn .3s ease' }}>
          <div style={{ width: 72, height: 72, borderRadius: 22, background: 'linear-gradient(135deg,#8b5cf6,#6d28d9)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 18px', boxShadow: '0 8px 24px rgba(139,92,246,.35)' }}>
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <h3 style={{ fontSize: 22, fontWeight: 800, color: '#0f172a', marginBottom: 6 }}>Game Completed!</h3>
          <p style={{ fontSize: 14, color: '#64748b', marginBottom: 20, lineHeight: 1.5 }}>Great job testing your fraud detection skills!</p>
          <div style={{ background: '#f0f6ff', borderRadius: 16, padding: '18px', marginBottom: 14 }}>
            <div style={{ fontSize: 14, color: '#64748b', fontWeight: 600, marginBottom: 4 }}>Total Correct Answers</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: '#0f172a' }}>{correctCount} out of 5</div>
          </div>
          <div style={{ background: '#dcfce7', borderRadius: 16, padding: '18px', marginBottom: 22 }}>
            <div style={{ fontSize: 13, color: '#64748b', fontWeight: 600, marginBottom: 4 }}>Coins Earned</div>
            <div style={{ fontSize: 38, fontWeight: 800, color: '#0078FF' }}>🪙 {earned}</div>
          </div>
          <button onClick={handleFinish} style={{ width: '100%', padding: '14px', background: 'linear-gradient(135deg,#0078FF,#0055cc)', color: '#fff', border: 'none', borderRadius: 14, fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: "'DM Sans',sans-serif", boxShadow: '0 6px 20px rgba(0,120,255,.3)' }}>
            Back to Dashboard
          </button>
        </div>
      </Modal>
    );
  }

  const q = questions[currentIdx];
  const typeLabel = q.type === 'scamlegit' ? 'Scam or Legit' : q.type === 'redflag' ? 'Red Flag' : 'Escape Room';
  return (
    <Modal>
      <div style={{ background: '#fff', borderRadius: 24, padding: 28, maxWidth: 420, width: '90vw', animation: 'scaleIn .3s ease' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: '#0078FF', background: '#e8f1ff', padding: '4px 12px', borderRadius: 20 }}>
            Question {currentIdx + 1} of 5
          </span>
          <span style={{ fontSize: 12, fontWeight: 600, color: '#8b5cf6', background: '#f5f3ff', padding: '4px 10px', borderRadius: 20 }}>
            {typeLabel}
          </span>
        </div>
        <div style={{ background: '#f8faff', borderRadius: 14, padding: '16px', marginBottom: 20 }}>
          <p style={{ fontSize: 15, fontWeight: 700, color: '#0f172a', lineHeight: 1.5 }}>{q.question}</p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {q.options.map((opt, i) => {
            let bg = '#f0f6ff';
            let bd = '#dbeafe';
            let color = '#0f172a';
            let cursor = 'pointer';
            if (showResult) {
              if (i === q.correctAnswer) { bg = '#dcfce7'; bd = '#86efac'; color = '#166534'; }
              else if (i === selected && i !== q.correctAnswer) { bg = '#fef2f2'; bd = '#fca5a5'; color = '#dc2626'; }
              cursor = 'default';
            } else if (selected === i) {
              bg = '#e8f1ff'; bd = '#0078FF';
            }
            return (
              <button key={i} onClick={() => handleSelect(i)} disabled={selected !== null}
                style={{ padding: '14px 16px', background: bg, border: `2px solid ${bd}`, borderRadius: 14, fontSize: 14, fontWeight: 600, color, cursor, fontFamily: "'DM Sans',sans-serif", textAlign: 'left', transition: 'all .2s' }}>
                {opt}
              </button>
            );
          })}
        </div>
        {showResult && (
          <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
            <button onClick={handleNext} style={{ padding: '10px 24px', background: '#0078FF', color: '#fff', border: 'none', borderRadius: 12, fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: "'DM Sans',sans-serif", boxShadow: '0 4px 14px rgba(0,120,255,.3)' }}>
              {currentIdx < 4 ? 'Next →' : 'See Results'}
            </button>
          </div>
        )}
      </div>
    </Modal>
  );
}

function RedeemRewards({coins, onClose}) {
  const rewards = [
    { cost: 75, label: 'Nykaa Voucher', icon: '💄', desc: 'Flat ₹75 off on beauty & skincare' },
    { cost: 80, label: 'boAt Voucher', icon: '🎧', desc: '₹80 off on audio & wearables' },
    { cost: 100, label: 'Amazon Voucher', icon: '📦', desc: '₹100 off on any order' },
    { cost: 95, label: 'Flipkart Voucher', icon: '🛒', desc: '₹95 off on fashion & electronics' },
    { cost: 85, label: 'Swiggy Voucher', icon: '🍔', desc: '₹85 off on food delivery' },
    { cost: 85, label: 'Zomato Voucher', icon: '🍕', desc: '₹85 off on restaurant orders' },
    { cost: 90, label: 'Uber Ride Coupon', icon: '🚗', desc: '₹90 off on your next ride' },
    { cost: 120, label: 'MakeMyTrip Voucher', icon: '✈️', desc: '₹120 off on flight bookings' },
    { cost: 110, label: 'BookMyShow Ticket', icon: '🎬', desc: '₹110 off on movie tickets' },
    { cost: 70, label: 'Reliance Smart Coupon', icon: '🛍️', desc: '₹70 off at Reliance Smart stores' },
  ];

  function handleRedeem(r, label) {
    if (coins < r.cost) {
      alert('Not enough coins! Keep playing to earn more.');
      return;
    }
    const newCoins = coins - r.cost;
    localStorage.setItem('coins', newCoins);
    alert(`🎉 Congratulations! You redeemed ${r.label}. Enjoy!`);
    onClose();
  }

  return (
    <Modal>
      <div style={{ background: '#fff', borderRadius: 24, padding: 28, maxWidth: 380, width: '90vw', animation: 'scaleIn .3s ease' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h3 style={{ fontSize: 18, fontWeight: 800, color: '#0f172a' }}>Redeem Rewards</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, cursor: 'pointer', color: '#94a3b8' }}>✕</button>
        </div>
        <div style={{ background: '#f0f6ff', borderRadius: 14, padding: '12px 16px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 20 }}>🪙</span>
          <div>
            <div style={{ fontSize: 12, color: '#64748b', fontWeight: 600 }}>Your Coins</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: '#0078FF' }}>{coins}</div>
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, maxHeight: '60vh', overflowY: 'auto' }}>
          {rewards.map(r => (
            <div key={r.cost + r.label} style={{ padding: '14px', background: coins >= r.cost ? '#f8faff' : '#fef2f2', border: `1.5px solid ${coins >= r.cost ? '#dbeafe' : '#fecaca'}`, borderRadius: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 44, height: 44, borderRadius: 12, background: coins >= r.cost ? '#e8f1ff' : '#fee2e2', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>{r.icon}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: '#0f172a' }}>{r.label}</div>
                <div style={{ fontSize: 11, color: '#64748b', lineHeight: 1.3 }}>{r.desc}</div>
              </div>
              <button onClick={() => handleRedeem(r, r.label)} disabled={coins < r.cost} style={{ padding: '7px 12px', background: coins >= r.cost ? 'linear-gradient(135deg,#0078FF,#0055cc)' : '#94a3b8', color: '#fff', border: 'none', borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: coins >= r.cost ? 'pointer' : 'not-allowed', fontFamily: "'DM Sans',sans-serif", whiteSpace: 'nowrap' }}>
                {r.cost} 🪙
              </button>
            </div>
          ))}
        </div>
        {coins < 70 && (
          <div style={{ marginTop: 16, padding: '12px', background: '#fef3c7', borderRadius: 12, textAlign: 'center' }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: '#92400e' }}>Not enough coins — play Learn & Play to earn more!</span>
          </div>
        )}
      </div>
    </Modal>
  );
}

// ===== FEATURE 6: RISK EXPLAINER TAGS =====
function RiskExplainer({tx, user}){
  if(!tx) return null;
  const avg=calculateAvgTransaction(user);
  const tags=[];
  const inContacts=tx.toNum&&(tx.toNum in(user.contacts||{}));
  const inHistory=tx.toNum&&user.known_recipients?.has(tx.toNum);
  const inUPI=tx.toNum&&(tx.toNum in USERS);

  if(tx.amt>avg*3) tags.push({label:`${Math.round(tx.amt/Math.max(avg,1))}× your avg amount`,color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  if(!inContacts&&!inHistory&&tx.type==="debit") tags.push({label:"New recipient",color:"#f59e0b",bg:"#fef3c7",border:"#fcd34d"});
  if(!inUPI&&tx.type==="debit") tags.push({label:"Off-network recipient",color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  const h=tx.time?parseInt(tx.time.split(":")[0]):12;
  if(h>=1&&h<5) tags.push({label:"Late-night (1–5AM)",color:"#7c3aed",bg:"#f5f3ff",border:"#c4b5fd"});
  if(tx.otp_used) tags.push({label:"OTP verified",color:"#22c55e",bg:"#dcfce7",border:"#86efac"});
  if(tx.status==="blocked") tags.push({label:"Blocked — high risk",color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  const recRisk=getRecipientRisk(tx.toNum||"");
  const recReason=getRecipientReportReason(tx.toNum||"");
  if(recRisk>=1&&recReason) tags.push({label:`Reported for ${recReason}`,color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  else if(recRisk>=2) tags.push({label:`Flagged ${recRisk}× network-wide`,color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  if(tx.risk<40&&!tags.length) tags.push({label:"Low risk",color:"#22c55e",bg:"#dcfce7",border:"#86efac"});

  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}}>
      {tags.map((t,i)=>(
        <span key={i} className="risk-tag"
          style={{color:t.color,background:t.bg,borderColor:t.border,fontSize:10,padding:"3px 9px",borderRadius:14,fontWeight:700}}>
          {t.label}
        </span>
      ))}
    </div>
  );
}

  if(!tx||!tx.toNum||tx.type==="credit") return null;

    <>
      {reportModal && (
        <ReportReasonModal

/* ═══ REPORT ISSUE MODAL (Scam Recovery Flow) ═══ */
/* ═══ FRAUD SEVERITY HELPERS ═══ */
function getFraudSeverity(reason) {
  if (reason.includes("Unauthorized") || reason.includes("Fraud")) return "HIGH";
  if (reason.includes("Wrong") || reason.includes("wrong")) return "MEDIUM";
  if (reason.includes("Failed") || reason.includes("deducted")) return "LOW";
  return "MEDIUM";
}
function getSeverityMeta(severity) {
  if (severity === "HIGH") return { color: "#dc2626", bg: "#fef2f2", border: "#fca5a5", emoji: "🔴", label: "Under Review", badge: "#450a0a", resolution: "0–24 Hours", sublabel: "Investigation Underway" };
  if (severity === "MEDIUM") return { color: "#d97706", bg: "#fffbeb", border: "#fcd34d", emoji: "🟡", label: "Under Review", badge: "#78350f", resolution: "2–5 Days", sublabel: "Standard Review" };
  return { color: "#16a34a", bg: "#f0fdf4", border: "#86efac", emoji: "🟢", label: "Under Review", badge: "#14532d", resolution: "1–3 Days", sublabel: "Processing" };
}
function generateRefId() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let id = "CFCFRMS-IND-2026-";
  for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}
function getAIRiskInsights(tx) {
  const insights = [];
  const riskLevel = tx.risk >= 70 ? "HIGH" : tx.risk >= 40 ? "MEDIUM" : "LOW";
  if (tx.risk >= 70) insights.push({ icon: "⚠️", label: "High Risk Transaction", desc: `Risk score ${tx.risk}/100 — flagged` });
  if (!tx.otp_used && tx.type === "debit") insights.push({ icon: "🔐", label: "No OTP Verified", desc: "Transaction not verified via OTP" });
  if (tx.location && tx.location.toLowerCase().includes("unknown")) insights.push({ icon: "📍", label: "Unusual Location", desc: tx.location });
  if (tx.risk_tag === "new_device") insights.push({ icon: "📱", label: "New Device Detected", desc: "Login from unrecognized device" });
  if (tx.risk >= 50) insights.push({ icon: "💸", label: "Large Amount", desc: `₹${tx.amt?.toLocaleString("en-IN")} — unusual for this account` });
  return { insights, riskLevel, riskPercent: tx.risk || 0 };
}

/* ═══ LOADING SIMULATION MODAL ═══ */
function FraudReportLoadingModal({ reason, onDone }) {
  const [step, setStep] = useState(0);
  const [done, setDone] = useState(false);
  const STEPS = [
    { label: "Validating transaction...", sub: "Verifying transaction details & amounts", duration: 1200 },
    { label: "Forwarding to bank...", sub: "Notifying your bank for immediate action", duration: 1800 },
    { label: "Sending to cyber system...", sub: "CFCFRMS — Cyber Fraud Coordination Centre", duration: 1600 },
    { label: "Generating reference ID...", sub: "Creating official complaint reference", duration: 1000 },
  ];
  useEffect(() => {
    let timer;
    const run = (i) => {
      if (i >= STEPS.length) { setDone(true); timer = setTimeout(() => onDone(), 800); return; }
      setStep(i);
      timer = setTimeout(() => run(i + 1), STEPS[i].duration);
    };
    timer = setTimeout(() => run(0), 300);
    return () => clearTimeout(timer);
  }, []);
  const sev = getFraudSeverity(reason);
  const sm = getSeverityMeta(sev);
  return (
    <Modal>
      <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", zIndex: 10001, background: "rgba(10,18,60,.88)", backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>

            <div style={{ position: "absolute", top: -30, right: -30, width: 160, height: 160, borderRadius: "50%", background: "rgba(255,255,255,.06)" }}/>
            <div style={{ display: "flex", alignItems: "center", gap: 14, position: "relative" }}>

              </div>
            </div>
          </div>
          <div style={{ padding: "24px 26px 28px" }}>
            <div style={{ marginBottom: 20 }}>
              {STEPS.map((s, i) => {
                const done2 = i < step || done;

                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16, opacity: i > step ? 0.45 : 1, transition: "opacity .3s" }}>

                      {done2 && !active ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                        : active ? <div style={{ width: 12, height: 12, borderRadius: "50%", background: "#fff", animation: "pulse 1s infinite" }}/> : <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#cbd5e1" }}/>}
                    </div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14, color: done ? "#16a34a" : active ? "#5b21b6" : "#94a3b8", transition: "color .3s" }}>{s.label}</div>
                      <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{s.sub}</div>
                    </div>
                  </div>

              })}
            </div>
            {done && <div style={{ textAlign: "center", padding: "12px", background: "#f0fdf4", borderRadius: 14, border: "1.5px solid #86efac" }}><span style={{ color: "#16a34a", fontWeight: 800, fontSize: 14 }}>✓ All steps complete — Forwarding to success screen...</span></div>}

    </Modal>
  );
}

  const [wsStatus, setWsStatus] = useState("connecting"); // "connecting"|"connected"|"error"

  // ── Socket initialization (once, on mount) ────────────────────────────
  useEffect(() => {
    // Derive WS server URL from current hostname so cross-device works.
    // WebSocket server runs as a separate Railway service.
    // Replace the URL below with your Railway WS service domain after deploying.
    const wsUrl = window.__WS_URL__ || "https://determined-vibrancy.up.railway.app";
    console.log("[PayTrust WS] Connecting to:", wsUrl);

    const socket = io(wsUrl, {
      // ✅ FIX 1: Always start with polling so the initial HTTP handshake
      //    succeeds, then upgrade to WebSocket. "websocket"-only silently
      //    fails when the server is not yet ready or a proxy is in the way.
      transports: ["polling", "websocket"],
      reconnectionDelay:    1000,
      reconnectionDelayMax: 5000,
      reconnectionAttempts: Infinity,
      timeout: 10000,
    });

    socketRef.current = socket;
    window._ptSocket  = socket;   // global handle for SendMoneyPage

    // ── CONNECT ──────────────────────────────────────────────────────────
    socket.on("connect", () => {
      console.log("[PayTrust WS] ✅ Connected  socket.id:", socket.id,
                  "| transport:", socket.io.engine.transport.name);
      setWsStatus("connected");

      // Re-register on every (re)connect — covers page reload + reconnection
      if (userRef.current) {
        socket.emit("user_register", userRef.current.number, (ack) => {
          console.log("[PayTrust WS] Re-registered:", userRef.current?.number, ack);
        });
      }
    });

    // ── CONNECT ERROR ─────────────────────────────────────────────────────
    // ✅ FIX 2: Catch and surface connection failures
    socket.on("connect_error", (err) => {
      console.error("[PayTrust WS] ❌ connect_error:", err.message);
      setWsStatus("error");
    });

    // ── DISCONNECT ───────────────────────────────────────────────────────
    socket.on("disconnect", (reason) => {
      console.warn("[PayTrust WS] Disconnected:", reason);
      setWsStatus("connecting");
    });

    // ── RECEIVE PAYMENT (credit the receiver's account) ──────────────────
    socket.on("receive_payment", (data) => {
      console.log("[PayTrust WS] 💰 receive_payment:", data);
      const { fromNumber, amount, txId, timestamp, note } = data;
      const now = new Date(timestamp || Date.now());
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const dateStr = `${String(now.getDate()).padStart(2,"0")} ${months[now.getMonth()]} ${String(now.getFullYear()).slice(2)}`;
      const timeStr = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

      const sender      = USERS[fromNumber];
      const senderName  = sender ? sender.name : fromNumber;

      const tx = {
        id:      txId || Date.now(),
        from:    senderName,
        fromNum: fromNumber,
        amt:     Number(amount),
        date:    dateStr,
        time:    timeStr,
        risk:    0,
        status:  "success",
        type:    "credit",
        note:    note || "Payment received",
        isNew:   true,
      };

      // Stable refs — never stale even though socket handler is created once
      if (addTxRef.current)  addTxRef.current(tx);
      if (updBalRef.current) updBalRef.current(b => b + Number(amount));

      setWsToast(`💰 Received ₹${Number(amount).toLocaleString("en-IN")} from ${senderName}`);
      setTimeout(() => setWsToast(""), 4500);
    });

    // ── FRAUD WARNING ────────────────────────────────────────────────────
    socket.on("fraud_warning", (data) => {
      console.warn("[PayTrust WS] 🚨 fraud_warning:", data);
      setWsToast(`🚨 Fraud Alert: ${data.reason || "Suspicious activity detected"}`);
      setTimeout(() => setWsToast(""), 5500);
    });

    // ── CLEANUP ──────────────────────────────────────────────────────────
    return () => {
      socket.off("connect");
      socket.off("connect_error");
      socket.off("disconnect");
      socket.off("receive_payment");
      socket.off("fraud_warning");
      socket.disconnect();
      socketRef.current = null;
      window._ptSocket  = null;
    };
  }, []); // eslint-disable-line — intentionally run once

  function handleLogin(u){
    setUser(u);
    setBalance(u.balance);
    setTxs(SEED_TXS);
    setRequests(SEED_REQS);
    userRef.current = u;
    // Register with WS server as soon as the user is known
    if (socketRef.current?.connected) {
      socketRef.current.emit("user_register", u.number, (ack) => {
        if (ack?.success) console.log("[PayTrust WS] Registered:", u.number, `(${ack.connections} conn)`);
      });
    }
  }

  function handleLogout(){
    if (socketRef.current && userRef.current) {
      socketRef.current.emit("user_leave", userRef.current.number);
      console.log("[PayTrust WS] user_leave:", userRef.current.number);
    }
    userRef.current = null;
    setUser(null);
    setPage("dashboard");
  }

  function addTx(tx){
    setTxs(prev => [tx, ...prev]);
  }
  addTxRef.current = addTx; // keep ref current

  function updateBalance(fn){
    setBalance(prev => Math.max(0, fn(prev)));
  }
  updBalRef.current = updateBalance; // keep ref current

  function resolveRequest(id, status){
    setRequests(prev => prev.map(r => r.id === id ? {...r, status} : r));
  }

  function updateUser(updates){
    setUser(prev => ({...prev, ...updates}));
  }

  function createTicket(tx, reason, note, currentUser, ticketId){
    const id = ticketId || ("PT-" + Math.floor(Math.random()*100000));
    const now = Date.now();
    const recipient = tx.toNum || tx.fromNum || "";
    const amount = tx.amt;
    const sev = getFraudSeverity(reason);
    const ticket = {
      id,
      transaction_id: tx.id,
      user: currentUser.number,
      recipient,
      recipientName: tx.to || tx.from || recipient,
      amount,
      reason,
      note,
      status: "Under Review",
      refund_status: "Pending",
      created_at: now,
      severity: sev,
      timeline: [{ status: "Submitted", time: now }, { status: "Sent to Bank", time: now + 5000 }, { status: "Sent to Cyber Cell", time: now + 10000 }]
    };
    // Integrate with existing recipient risk system
    reportRecipient(currentUser.number, recipient, amount, reason);
    setTickets(prev => [ticket, ...prev]);
    return id;
  }

  function updateTicketStatus(id, status, refund_status){
    setTickets(prev => prev.map(t => t.id === id ? {
      ...t, status, refund_status,
      timeline: [...t.timeline, { status, time: Date.now() }]
    } : t));
  }

  const pendingCount = requests.filter(r => r.status === "pending").length;

  if(!user) return <LoginPage onLogin={handleLogin}/>;

  const pp = {user, txs, balance, setPage, addTx, updateBalance, requests, resolveRequest, updateUser, tickets, createTicket, updateTicketStatus};

  return (
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"'Inter',sans-serif",
      background:"#f1f5f9",position:"relative"}}>
      <div style={{display:"flex",width:"100%"}}>
        <Sidebar page={page} setPage={setPage} user={user}
          onLogout={handleLogout} pendingCount={pendingCount}/>
        <main id="main-content" style={{flex:1,overflowY:"auto",maxHeight:"100vh",position:"relative"}}>
          <div key={page}>
            {page === "dashboard"     && <Dashboard {...pp}/>}
            {page === "send"          && <SendMoneyPage {...pp}/>}
            {page === "request-money" && <RequestMoneyPage {...pp}/>}
            {page === "requests"      && <RequestsPage {...pp}/>}
            {page === "history"       && <HistoryPage txs={txs} user={user} tickets={tickets} createTicket={createTicket}/>}
            {page === "finance"       && <FinanceAnalyticsPage txs={txs} user={user}/>}
            {page === "insights"      && <InsightsPage {...pp}/>}
            {page === "profile"       && <ProfilePage {...pp}/>}
            {page === "smartguard"   && <SmartGuardPage {...pp}/>}
            {page === "redeem"        && <RedeemPage {...pp}/>}
            {page === "rbi"           && <RBIGuidelinesPage {...pp}/>}
          </div>

          <button
            onClick={() => setShowAssistant(true)}
            style={{position:"fixed",bottom:28,right:28,zIndex:100,
              width:60,height:60,borderRadius:"50%",background:"#1A56DB",
              border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
              boxShadow:"0 4px 16px rgba(26,86,219,.35)"}}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </main>
        <BottomNav page={page} setPage={setPage} pendingCount={pendingCount}/>
      </div>

      {showAssistant && <SafePayAssistant user={user} txs={txs} onClose={() => setShowAssistant(false)}/>}

      {/* ── Real-time WebSocket toast (credit / fraud warning) ── */}
      {wsToast && (
        <div className="pt-toast" style={{
          background: wsToast.startsWith("💰") ? "#0f3d20" : "#3d0f0f",
          borderTop: `3px solid ${wsToast.startsWith("💰") ? "#22c55e" : "#ef4444"}`,
          color: "#fff",
          fontSize: 14,
          fontWeight: 700,
          padding: "12px 26px",
          borderRadius: 28,
          bottom: 100,
          letterSpacing: "-.1px",
          boxShadow: "0 8px 32px rgba(0,0,0,.32)",
        }}>
          {wsToast}
        </div>
      )}

      {/* ── WebSocket connection status pill (bottom-left corner) ── */}
      {(()=>{
        const cfg = {
          connected:  { dot:"#22c55e", bg:"#dcfce7", text:"#166534", label:"Live" },
          connecting: { dot:"#f59e0b", bg:"#fef3c7", text:"#92400e", label:"Connecting…" },
          error:      { dot:"#ef4444", bg:"#fef2f2", text:"#991b1b", label:"WS Offline" },
        }[wsStatus] || {};
        return (
          <div style={{
            position:"fixed", bottom:16, left:16, zIndex:9990,
            display:"flex", alignItems:"center", gap:6,
            padding:"5px 12px", borderRadius:20,
            background: cfg.bg,
            border:`1px solid ${cfg.dot}44`,
            boxShadow:"0 2px 10px rgba(0,0,0,.10)",
            fontSize:11, fontWeight:700, color: cfg.text,
            userSelect:"none",
          }}>
            <span style={{
              width:7, height:7, borderRadius:"50%",
              background: cfg.dot,
              display:"inline-block",
              boxShadow: wsStatus==="connected" ? `0 0 0 3px ${cfg.dot}44` : "none",
              animation: wsStatus==="connecting" ? "pulse 1.2s infinite" : "none",
            }}/>
            WS {cfg.label}
            {wsStatus==="error" && (
              <button onClick={()=>{
                if(socketRef.current){ socketRef.current.connect(); setWsStatus("connecting"); }
              }} style={{
                marginLeft:4, background:"none", border:"none",
                color:"#ef4444", fontWeight:800, fontSize:11, cursor:"pointer",
                padding:0, fontFamily:"'DM Sans',sans-serif",
              }}>↺</button>
            )}
          </div>
        );
      })()}
    </div>
  );
}
