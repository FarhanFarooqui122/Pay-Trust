  if (!city) {
    MockLocation.active = false;
    MockLocation.lat = null;
    MockLocation.lng = null;
    MockLocation.label = "";

// Generate a deterministic device fingerprint from browser signals
function getDeviceFingerprint() {
  const nav = window.navigator;
  const scr = window.screen;
  const signals = [
    nav.userAgent,
    nav.language,
    scr.width + "x" + scr.height,
    scr.colorDepth,
    new Date().getTimezoneOffset(),
    nav.hardwareConcurrency || 0,
    nav.platform || "",
  ].join("|");
  // Simple hash
  let hash = 0;
  for (let i = 0; i < signals.length; i++) {
    hash = ((hash << 5) - hash) + signals.charCodeAt(i);
    hash |= 0;
  }
  return "DEV-" + Math.abs(hash).toString(36).toUpperCase();
}

function getDeviceInfo() {
  const ua = navigator.userAgent;
  let browser = "Unknown", os = "Unknown";
  if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
  else if (ua.includes("Firefox")) browser = "Firefox";
  else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
  else if (ua.includes("Edg")) browser = "Edge";
  else if (ua.includes("OPR") || ua.includes("Opera")) browser = "Opera";

  if (ua.includes("Windows")) os = "Windows";
  else if (ua.includes("Android")) os = "Android";
  else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
  else if (ua.includes("Mac")) os = "macOS";
  else if (ua.includes("Linux")) os = "Linux";

  return {
    browser,
    os,
    screen: `${screen.width}x${screen.height}`,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    fingerprint: getDeviceFingerprint(),
  };
}

// Capture baseline on login — call this once when user logs in
function captureBaseline(onDone) {
  const deviceInfo = getDeviceInfo();
  const deviceId = deviceInfo.fingerprint;
  GeoDeviceBaseline.deviceId = deviceId;
  GeoDeviceBaseline.deviceInfo = deviceInfo;
  GeoDeviceBaseline.sessionStart = Date.now();

  // Load known device from localStorage
  const knownDevice = localStorage.getItem("pt_device_id");
  GeoDeviceBaseline.isNewDevice = !knownDevice || knownDevice !== deviceId;
  if (!knownDevice) localStorage.setItem("pt_device_id", deviceId);

  // Capture geo via browser API
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        GeoDeviceBaseline.location_enabled = true;
        GeoDeviceBaseline.location = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy,
          city: "Locating...",
          region: "",
        };
        // Reverse geocode using open API (no key needed)
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
          .then(r => r.json())
          .then(data => {
  const addr = data.address || {};

  // Most specific → least specific
  const area =
    addr.neighbourhood ||
    addr.quarter ||
    addr.suburb ||
    addr.residential ||
    addr.road ||
    addr.city_district ||
    null;

  const city =
    addr.city ||
    addr.town ||
    addr.municipality ||
    addr.village ||
    addr.county ||
    "Unknown";

  const state = addr.state || "";

  // Show: "Kothrud, Pune, Maharashtra" or just "Pune, Maharashtra"
  GeoDeviceBaseline.location.city = city;
  GeoDeviceBaseline.location.area = area;
  GeoDeviceBaseline.location.region = state;
  GeoDeviceBaseline.location.display = area
    ? `${area}, ${city}, ${state}`
    : `${city}, ${state}`;
})
          .catch(() => {
            GeoDeviceBaseline.location.city = "Unknown";
            GeoDeviceBaseline.location.display = "Location unavailable";
          })
          .finally(() => { if (onDone) onDone(); });
      },
      () => {
        GeoDeviceBaseline.location_enabled = false;
        GeoDeviceBaseline.location = { city: "Permission denied", display: "Location off", lat: null, lng: null };
        if (onDone) onDone();
      },
      { timeout: 8000 }
    );
  } else {
    GeoDeviceBaseline.location_enabled = false;
    GeoDeviceBaseline.location = { city: "Unsupported", display: "Not supported", lat: null, lng: null };
    if (onDone) onDone();
  }
}

// Haversine distance in km between two lat/lng points
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Check geo + device risk at transaction time
function checkGeoDeviceRisk() {
  let risk = 0;
  const signals = [];
  const meta = {};

  const baseline = GeoDeviceBaseline.location;
  const deviceInfo = GeoDeviceBaseline.deviceInfo;

  // ── Device checks ──
  if (GeoDeviceBaseline.isNewDevice) {
    risk += 30;
    signals.push(`⚠️ New/unrecognized device detected (${deviceInfo?.browser} on ${deviceInfo?.os})`);
    meta.newDevice = true;
  }

  // ── Geo checks ──
  if (baseline && baseline.lat !== null) {
    // Get current position quickly (cached from baseline for same session)
    meta.location = baseline.display || baseline.city;
    meta.city = baseline.city;
  } else if (baseline && baseline.city === "Permission denied") {
    risk += 20;
    signals.push("ℹ️ Location permission denied — cannot verify transaction origin");
    meta.location = "Location off";
  }

  // Session anomaly — transaction happening very soon after login (bot-like)
  const sessionAge = (Date.now() - GeoDeviceBaseline.sessionStart) / 1000;
  if (sessionAge < 8) {
    risk += 25;
    signals.push("⚠️ Transaction initiated within seconds of login — unusual behavior");
  }

  meta.deviceInfo = deviceInfo;
  return { risk: Math.min(risk, 35), signals, meta };
}

// Get display string for a transaction's device/location tags
function getTxGeoDeviceMeta() {
  const loc = GeoDeviceBaseline.location;
  const dev = GeoDeviceBaseline.deviceInfo;
  return {
    location: loc?.display || loc?.city || null,
    device: dev ? `${dev.browser} · ${dev.os}` : null,
    isNewDevice: GeoDeviceBaseline.isNewDevice || false,
  };
}

/* ═══ IMPOSSIBLE TRAVEL DETECTION ENGINE ═══ */

// Distance thresholds (km) — triggered regardless of speed
// These catch real-world location jumps between transactions
// even when the time gap makes the speed look "normal".
const TRAVEL_THRESHOLDS = {
  IMPOSSIBLE:  800,  // faster than commercial jet → block (speed-based)
  VERY_FAST:   500,  // fast jet speed             → block (speed-based)
  FAST:        300,  // subsonic aircraft           → OTP  (speed-based)
  SUSPICIOUS:  150,  // fast car/train              → warn (speed-based)
};

// Distance-only thresholds — fire even if the time gap is large
const DISTANCE_THRESHOLDS = {
  CITY_HOP:    10,   // different suburb/city      → info signal (+20)
  REGION_HOP:  50,   // different district/region  → warning     (+40)
  STATE_HOP:   300,  // different state            → strong warn (+65)
};

// Stores last successful transaction location per user
const LastTxLocation = new Map();

// Save location after every successful transaction
function recordTxLocation(userNum, lat, lng, timestamp) {
  if (lat == null || lng == null) return;
  LastTxLocation.set(userNum, { lat, lng, timestamp: timestamp || Date.now() });
}

/**
 * Fetch fresh GPS coordinates at transaction time.
 * Returns a Promise<{lat, lng}> — resolves quickly (cached by browser),
 * falls back to GeoDeviceBaseline if permission denied or timeout.
 */
function getFreshLocation() {
  // If a mock location is active (demo/testing), return it immediately.
  if (MockLocation.active && MockLocation.lat != null) {
    return Promise.resolve({ lat: MockLocation.lat, lng: MockLocation.lng });
  }
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({
        lat: GeoDeviceBaseline.location?.lat ?? null,
        lng: GeoDeviceBaseline.location?.lng ?? null,
      });
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve({
        lat: GeoDeviceBaseline.location?.lat ?? null,
        lng: GeoDeviceBaseline.location?.lng ?? null,
      }),
      { timeout: 5000, maximumAge: 0 } // always fetch fresh — no cache, so location changes are detected
    );
  });
}

// Core impossible travel check — only runs if location_enabled = true
function checkImpossibleTravel(userNum, currentLat, currentLng, currentTimestamp) {
  const result = {
    distance_km:        null,
    time_diff_minutes:  null,
    speed_kmh:          null,
    anomaly_score:      0,
    risk_level:         "normal",
    reason:             null,
    triggered:          false,
  };

  // Skip if user denied location permission
  if (!GeoDeviceBaseline.location_enabled) return result;

  // No current location → skip
  if (currentLat == null || currentLng == null) return result;

  const last = LastTxLocation.get(userNum);

  // No previous transaction on record → no penalty, just record
  if (!last || last.lat == null) return result;

  // ── Calculate distance ──
  const dist = haversineKm(last.lat, last.lng, currentLat, currentLng);

  // ── Calculate time difference in minutes ──
  const now = currentTimestamp || Date.now();
  const timeDiffMs = now - last.timestamp;
  const timeDiffMin = timeDiffMs / 60000;

  result.distance_km       = Math.round(dist * 10) / 10;
  result.time_diff_minutes = Math.round(timeDiffMin * 10) / 10;

  // Avoid divide-by-zero — if < 1 minute, treat as 1 min
  const safeTime = Math.max(timeDiffMin, 1);
  const speedKmh = (dist / safeTime) * 60;
  result.speed_kmh = Math.round(speedKmh);

  // ── Speed-based fraud logic ──
  let reason = null;
  let level  = "normal";

  if (speedKmh > TRAVEL_THRESHOLDS.IMPOSSIBLE) {
    level  = "popup";
    reason = `Unusual location change detected. Please confirm this activity. (${result.distance_km}km in ${result.time_diff_minutes}min, ${result.speed_kmh} km/h)`;
  } else if (speedKmh > TRAVEL_THRESHOLDS.VERY_FAST) {
    level  = "popup";
    reason = `Unusual location change detected. Please confirm this activity. (${result.distance_km}km in ${result.time_diff_minutes}min, ${result.speed_kmh} km/h)`;
  } else if (speedKmh > TRAVEL_THRESHOLDS.FAST) {
    level  = "popup";
    reason = `Unusual location change detected. Please confirm this activity. (${result.distance_km}km in ${result.time_diff_minutes}min, ${result.speed_kmh} km/h)`;
  } else if (speedKmh > TRAVEL_THRESHOLDS.SUSPICIOUS) {
    level  = "popup";
    reason = `Unusual location change detected. Please confirm this activity. (${result.distance_km}km in ${result.time_diff_minutes}min, ${result.speed_kmh} km/h)`;
  }

  // ── Distance-based logic (fires even when speed looks normal) ──
  // Only applies when speed check didn't already fire a signal.
  // Location jump triggers a popup ONLY — does NOT change risk score.
  if (level === "normal") {
    if (dist >= DISTANCE_THRESHOLDS.STATE_HOP) {
      level  = "popup";
      reason = `Unusual location change detected. Please confirm this activity. (${result.distance_km}km from previous transaction)`;
    } else if (dist >= DISTANCE_THRESHOLDS.REGION_HOP) {
      level  = "popup";
      reason = `Unusual location change detected. Please confirm this activity. (${result.distance_km}km from previous transaction)`;
    } else if (dist >= DISTANCE_THRESHOLDS.CITY_HOP) {
      level  = "popup";
      reason = `Unusual location change detected. Please confirm this activity. (${result.distance_km}km from previous transaction)`;
    }
  }

  result.anomaly_score = 0; // Location jump NEVER contributes to risk score
  result.risk_level    = level;
  result.reason        = level !== "normal" ? reason : null;
  result.triggered     = level === "popup";

  return result;
}

// Final score combiner — merges ML score + travel anomaly
function combineWithTravelScore(mlScore, userNum, currentLat, currentLng) {
  const travel = checkImpossibleTravel(
    userNum,
    currentLat,
    currentLng,
    Date.now()
  );

  const finalScore = Math.min(100, mlScore + travel.anomaly_score);

  return {
    ...travel,
    ml_score:    mlScore,
    final_score: finalScore,
  };
}

/* ═══ RECIPIENT RISK REGISTRY (Network-wide) ═══ */
const RecipientRiskRegistry = new Map(); // number -> {count: 0, reports: []}

function incRecipientRisk(number) {
  if (!RecipientRiskRegistry.has(number)) {
    RecipientRiskRegistry.set(number, { count: 0, reports: [] });
  }
  RecipientRiskRegistry.get(number).count += 1;
}

function getRecipientRisk(number) {
  return RecipientRiskRegistry.get(number)?.count || 0;
}

function getRecipientReportReason(number) {
  const entry = RecipientRiskRegistry.get(number);
  if (!entry || !entry.reports || entry.reports.length === 0) return null;
  // Return the most recent report reason
  return entry.reports[entry.reports.length - 1].reason || null;
}

function reportRecipient(reporter, target, amount, reason) {
  if (!RecipientRiskRegistry.has(target)) {
    RecipientRiskRegistry.set(target, { count: 0, reports: [] });
  }
  const entry = RecipientRiskRegistry.get(target);
  entry.count += 2;
  entry.reports.push({ reporter, amount, reason, time: new Date() });
}

/* ═══ LIGHTWEIGHT FRAUD SCORER ═══
   Weights derived from feature importances of the original model:
   Large Balance Drain 87.58% · Daily Spend 6.36% · Recipient Risk 3.01%
   Z-Score Dev 2.34% · Amt/Bal 0.62% · Odd Hour 0.06% · Freq 0.02%

   CALIBRATION POLICY (v2):
   · Normal new recipient + high amount  → 75–84 (Suspicious)
   · Score of 95–100 RESERVED exclusively for recipients in RecipientRiskRegistry (Blacklist)
   · This prevents spurious 100/100 spikes from everyday large transfers
   =========================================================== */

function mlFraudScore(user, amount, receiverNum) {
  try {
    const bal        = Math.max(user.balance || 1, 1);
    const avg        = calculateAvgTransaction(user);
    const std        = calculateStdDeviation(user, avg);
    const hour       = new Date().getHours();
    const inContacts = receiverNum in (user.contacts || {});
    const inHistory  = user.known_recipients?.has(receiverNum) || false;
    const inUPI      = receiverNum in USERS;
    const spentToday = getDailySpent(user);
    const startBal   = Math.max(bal + spentToday, 1);
    const z          = std > 0 ? Math.abs(amount - avg) / std : 0;

    // ── Feature vector ──
    const f0 = Math.min(amount / bal, 1.0);                               // amt/bal ratio
    const f1 = (hour>=1&&hour<5)?1.0:(hour>=22||hour<7)?0.5:0.0;         // odd hour
    const f2 = (!inContacts && !inHistory) ? 1.0 : 0.0;                  // unknown recip
    const f3 = Math.min(getRecentTransactions(user,5).length / 10, 1.0); // tx frequency
    const f4 = Math.min((spentToday + amount) / startBal, 1.0);          // daily spend
    const f6 = Math.min(getRecipientRisk(receiverNum) / 10, 1.0);        // recipient risk (registry)
    const f7 = Math.min(z / 4, 1.0);                                     // z-score dev
    const f8 = inUPI ? 0.0 : 1.0;                                        // off-network

    // ── Weighted linear combination ──
    const rawScore = (
      0.8758 * f4 +
      0.0636 * f4 * (f0 > 0.5 ? 1.5 : 1.0) +  // daily spend × balance pressure
      0.0301 * f6 +
      0.0234 * f7 +
      0.0062 * f0 +
      0.0006 * f1 +
      0.0002 * f3 +
      0.05   * f2 +   // unknown recipient signal
      0.03   * f8     // off-network penalty
    );

    // ── Sigmoid ──
    const logit = -1.77185 + 8.5 * rawScore;
    let prob = 1 / (1 + Math.exp(-logit));

    // ── CALIBRATION CAP: non-blacklisted recipients are capped at 0.84 ──
    // This ensures a new recipient + large amount lands in Suspicious (75–84),
    // not at 100. A score of 0.95+ is reserved for confirmed registry entries.
    const isBlacklisted = getRecipientRisk(receiverNum) >= 1;
    if (!isBlacklisted) {
      // Soft-cap at 0.84 using a compression curve
      prob = Math.min(prob, 0.84);
    } else {
      // Blacklisted: allow full range; boost proportional to registry count
      const registryBoost = Math.min(getRecipientRisk(receiverNum) / 5, 1.0) * 0.15;
      prob = Math.min(prob + registryBoost, 1.0);
    }

    return prob;
  } catch(e) {
    console.warn('[PayTrust ML] scoring error:', e);
    return null;
  }
}


/* ═══ RISK EXPLANATION ENGINE ═══
   getRiskExplanation(user, receiverNum, amount)
   Returns { score, level, insights:[], reasons:[], tags:[] }
   THREE CLEAN LAYERS — no cross-layer duplication:
     insights = full sentences for Engine Insights
     reasons  = short phrases for "Why is this risky?"
     tags     = 1-2 word chip labels
   Uses existing helpers only — does NOT touch mlFraudScore scoring.
   =========================================================== */
function getRiskExplanation(user, receiverNum, amount) {
  const probRaw = mlFraudScore(user, amount, receiverNum);
  const score   = probRaw !== null ? Math.round(probRaw * 100) : 0;

  let level = "Safe";
  if (score >= 85)      level = "OTP Required";
  else if (score >= 60) level = "Caution";

  const insights = [];  // full sentences → Engine Insights
  const reasons  = [];  // short phrases  → Why is this risky?
  const tags     = [];  // 1-2 word chips → chip row

  const rr          = getRecipientRisk(receiverNum);
  const inContacts  = receiverNum in (user.contacts || {});
  const inHistory   = user.known_recipients?.has(receiverNum) || false;
  const avg         = calculateAvgTransaction(user);
  const bal         = Math.max(user.balance || 1, 1);
  const spentToday  = getDailySpent(user);
  const startBal    = Math.max(bal + spentToday, 1);
  const hour        = new Date().getHours();
  const inNetwork   = receiverNum in USERS;

  // A) NETWORK REPORTS
  if (rr > 0) {
    insights.push(`Recipient has been reported by ${rr} user${rr > 1 ? "s" : ""} for suspicious activity`);
    reasons.push(`Reported by ${rr} user${rr > 1 ? "s" : ""}`);
    tags.push("Reported");
  }

  // B) NEW RECIPIENT
  if (!inContacts && !inHistory) {
    insights.push("Recipient is not in your contacts or transaction history");
    reasons.push("New recipient");
    tags.push("New");
  }

  // C) HIGH AMOUNT
  if (amount > avg * 2) {
    insights.push(`Amount ₹${amount.toLocaleString("en-IN")} is unusually high compared to your typical transactions`);
    reasons.push("High amount");
    tags.push("High Amount");
  }

  // D) LARGE BALANCE USAGE
  if (startBal > 0 && (spentToday + amount) / startBal > 0.5) {
    insights.push("This transaction uses a large portion of your balance");
    reasons.push("Large spend");
    tags.push("Large Spend");
  }

  // E) ODD HOUR
  if (hour >= 1 && hour < 5) {
    insights.push("Transaction initiated at an unusual time (1–5 AM)");
    reasons.push("Odd hour");
    tags.push("Odd Hour");
  }

  // F) OFF-NETWORK
  if (!inNetwork) {
    insights.push("Recipient is outside the trusted UPI network");
    reasons.push("Off-network account");
    tags.push("Off-Network");
  }

  // Deduplicate
  return {
    score,
    level,
    insights: [...new Set(insights)],
    reasons:  [...new Set(reasons)],
    tags:     [...new Set(tags)],
  };
}

   URGENCY / PANIC DETECTION ENGINE
   Scans payment note and UPI ID for urgency-loaded language commonly used
   in social-engineering scams. Returns a normalized score 0–1.
   This score is then blended into the main risk scoring pipeline with a
   small weight (+0.08 * urgencyScore) so it nudges the total without
   dominating legitimate urgent transfers.
   ───────────────────────────────────────────────────────────────────────── */

// Curated urgency keyword list — words scammers use to create time pressure
const URGENCY_KEYWORDS = [
  "urgent", "urgently", "immediately", "now", "asap", "fast", "last chance",
  "expire", "expires", "expiring", "limited", "today only", "hurry", "quick",
  "quickly", "deadline", "do it now", "right now", "no delay", "time sensitive",
  "act now", "running out", "don't wait", "instant", "immediately required"
];

/**
 * detectUrgency(note, upiId)
 * Checks both payment note and UPI ID for urgency language.
 * @param {string} note     - Payment note/description entered by user
 * @param {string} upiId    - Recipient UPI ID string
 * @returns {{ urgencyScore: number, urgencyHits: string[] }}
 *   urgencyScore: 0 (none) to 1 (maximum urgency detected)
 *   urgencyHits:  array of matched urgency keywords for display
 */
function detectUrgency(note, upiId) {
  // Combine both inputs into a single lowercase search space
  const searchText = `${note || ""} ${upiId || ""}`.toLowerCase();

  const matched = [];

  // Check each urgency keyword against the combined text
  for (const kw of URGENCY_KEYWORDS) {
    if (searchText.includes(kw)) {
      matched.push(kw);
    }
  }

  if (matched.length === 0) {
    return { urgencyScore: 0, urgencyHits: [] };
  }

  // Normalize: 1 hit → ~0.4, 2 hits → ~0.7, 3+ hits → 1.0
  // Uses a soft saturation curve so a single mild keyword doesn't over-penalize
  const rawScore = Math.min(matched.length / 2.5, 1.0);

  return {
    urgencyScore: rawScore,
    urgencyHits: matched
  };
}

// ── Scam UPI structural patterns ──
// Returns a score 0-50 based on how suspicious the full UPI structure looks.
function scoreUPIStructure(localPart, handle) {
  let structScore = 0;
  const signals = [];

  // 1. Suspicious handle (domain after @)
  if (SCAM_HANDLES.has(handle)) {
    structScore += 30;
    signals.push(`⚠️ VPA handle "@${handle}" is a known scam-associated domain`);
  }

  // 2. Trusted handle = strong negative signal (reduces risk)
  if (TRUSTED_HANDLES.has(handle)) {
    structScore -= 20; // legitimate company UPI
  }

  // 3. Impersonation patterns — brand names in local part but non-brand handle
  const BRAND_NAMES = ["amazon","flipkart","paytm","phonepe","google","microsoft","apple",
    "sbi","hdfc","icici","kotak","airtel","jio","irdai","sebi","rbi","npci",
    "uidai","irctc","nsdl","epfo","trai","meesho","snapdeal","myntra","ola","uber",
    "zomato","swiggy","dunzo","blinkit","zepto","bigbasket","cred","slice","navi"];
  for (const brand of BRAND_NAMES) {
    if (localPart.includes(brand) && !TRUSTED_HANDLES.has(handle)) {
      structScore += 35;
      signals.push(`⚠️ Impersonates "${brand}" but uses unverified handle "@${handle}"`);
      break;
    }
  }

  // 4. Government impersonation
  const GOV_TERMS = ["govt","gov","government","income","tax","irdai","sebi","rbi","uidai",
    "aadhar","aadhaar","epfo","pf","pension","subsidy","pm","modi","yojana","relief"];
  for (const t of GOV_TERMS) {
    if (localPart.includes(t)) {
      structScore += 40;
      signals.push(`🚨 Impersonates government/regulatory body — extremely common scam tactic`);
      break;
    }
  }

  // 5. Numeric padding (scammers add digits to look unique: support123, refund9087)
  const numMatch = localPart.match(/\d+/);
  if (numMatch && numMatch[0].length >= 3 && structScore > 0) {
    structScore += 8;
    signals.push(`⚠️ Suspicious numeric suffix in UPI ID (common scam pattern)`);
  }

  // 6. Overly long local part with suspicious combo (>18 chars)
  if (localPart.length > 18 && structScore > 10) {
    structScore += 6;
  }

  return { structScore: Math.max(0, Math.min(50, structScore)), structSignals: signals };
}

function categorizeTx(tx){
  if(!tx||tx.type==="credit") return null;
  const text=((tx.note||"")+" "+(tx.to||"")).toLowerCase();
  for(const[cat,data] of Object.entries(TX_CATEGORIES)){
    if(cat==="other") continue;
    if(data.kw.some(k=>text.includes(k))) return cat;
  }
  return "other";
}

function getFinanceInsights(txs){
  const debits=txs.filter(t=>t.type==="debit"&&t.status!=="blocked");
  const now=new Date();
  const curM=now.getMonth(), curY=now.getFullYear();
  const prevM=curM===0?11:curM-1, prevY=curM===0?curY-1:curY;
  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

  function parseTxDate(tx){
    const p=tx.date?.split(" ");
    if(!p||p.length<3) return null;
    return {m:MONTHS[p[1]],y:2000+parseInt(p[2])};
  }

  const thisMonth=debits.filter(t=>{const d=parseTxDate(t);return d&&d.m===curM&&d.y===curY;});
  const lastMonth=debits.filter(t=>{const d=parseTxDate(t);return d&&d.m===prevM&&d.y===prevY;});

  function sumByCat(txList){
    const m={};
    for(const tx of txList){const c=categorizeTx(tx)||"other";m[c]=(m[c]||0)+tx.amt;}
    return m;
  }

  const catThis=sumByCat(thisMonth);
  const catLast=sumByCat(lastMonth);
  const totalThis=Object.values(catThis).reduce((s,v)=>s+v,0);
  const totalLast=Object.values(catLast).reduce((s,v)=>s+v,0);
  const sorted=Object.entries(catThis).sort((a,b)=>b[1]-a[1]);

  const insights=[];
  if(sorted.length>0&&sorted[0][1]>0){
    const[cat,amt]=sorted[0];
    const pct=Math.round((amt/Math.max(totalThis,1))*100);
    insights.push({text:`Your highest spending category is ${TX_CATEGORIES[cat]?.label} — ₹${amt.toLocaleString("en-IN")} (${pct}% of total)`,type:"top",icon:"🏆"});
  }
  if(totalThis>0&&totalLast>0){
    const diff=Math.round(((totalThis-totalLast)/totalLast)*100);
    if(diff>0) insights.push({text:`You spent ${diff}% more this month vs last month`,type:"up",icon:"📈"});
    else if(diff<0) insights.push({text:`You spent ${Math.abs(diff)}% less this month — great discipline!`,type:"down",icon:"📉"});
  }
  for(const[cat,amt] of sorted.slice(0,3)){
    const last=catLast[cat]||0;
    if(last>0&&amt>0){
      const d=Math.round(((amt-last)/last)*100);
      if(Math.abs(d)>=20){
        insights.push({text:`You spent ${Math.abs(d)}% ${d>0?"more":"less"} on ${TX_CATEGORIES[cat]?.label} this month`,type:d>0?"up":"down",icon:d>0?"⚠️":"✅"});
      }
    }
  }
  if(thisMonth.length===0) insights.push({text:"No transactions this month yet — your slate is clean!",type:"info",icon:"ℹ️"});

  return{catThis,catLast,totalThis,totalLast,insights,thisMonth,lastMonth,sorted};
}

/**
 * Levenshtein distance — fallback fuzzy match.
 */
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) =>
    Array.from({length: n + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

/**
 * Resolve a token to a canonical suspicious keyword.
 * Order: exact → typo map → Levenshtein ≤ 2 (length-gated for speed).
 */
function resolveToken(token) {
  if (KEYWORD_WEIGHTS[token]) return token;
  if (TYPO_MAP[token] && KEYWORD_WEIGHTS[TYPO_MAP[token]]) return TYPO_MAP[token];
  for (const kw of Object.keys(KEYWORD_WEIGHTS)) {
    if (Math.abs(token.length - kw.length) <= 2 && levenshtein(token, kw) <= 2)
      return kw;
  }
  return null;
}

/**
 * Split a UPI local-part into tokens:
 *   - camelCase split first: "amazonSupport" → ["amazon","Support"]
 *   - then split on digits, underscores, dots, hyphens
 */
function tokenizeUPI(localPart) {
  const camelSplit = localPart.replace(/([a-z])([A-Z])/g, '$1 $2');
  const raw = camelSplit.split(/[\d_.\-\s]+/).filter(Boolean);
  return raw.map(t => t.toLowerCase()).filter(t => t.length >= 2);
}

/**
 * FALSE-POSITIVE GUARD: returns true if this UPI looks like a real person/business.
 * Used to suppress low-tier keyword hits on innocent IDs.
 * e.g. "service" in "suresh.services@oksbi" should not trigger — it's a business name
 * on a trusted handle.
 */
function isBenignContext(localPart, handle, tokens, matchedKeywords) {
  // Trusted handle → only block critical/high, suppress low/medium
  if (TRUSTED_HANDLES.has(handle)) return true;
  // If the ONLY hit is low-tier and the local part looks like a real name + word, suppress
  const allLow = matchedKeywords.every(m => m.tier === "low");
  if (allLow && tokens.some(t => COMMON_NAMES.has(t))) return true;
  return false;
}

/**
 * Main UPI analysis function.
 * Combines: keyword scan + structural pattern scoring + domain analysis.
 * @param {string} upiId  full UPI ID e.g. "amazon-support9087@lucky"
 * @returns {{ keywordScore: number, signals: string[], matchedKeywords: object[] }}
 */
function analyzeUPIKeywords(upiId) {
  if (!upiId || !upiId.includes("@"))
    return { keywordScore: 0, signals: [], matchedKeywords: [] };

  const [localRaw, handle] = upiId.split("@");
  const localPart = localRaw.toLowerCase();
  const tokens = tokenizeUPI(localPart);

  // ── 1. Keyword scan ──
  const seen = new Set();
  const matched = [];
  let rawKwScore = 0;

  for (const token of tokens) {
    if (COMMON_NAMES.has(token)) continue;
    const canonical = resolveToken(token);
    if (canonical && !seen.has(canonical)) {
      seen.add(canonical);
      const meta = KEYWORD_WEIGHTS[canonical];
      matched.push({ word: token, canonical, tier: meta.tier, score: meta.score, desc: meta.desc });
      rawKwScore += meta.score;
    }
  }

  // ── 2. False-positive guard ──
  // Suppress benign contexts (real person on trusted handle, lone low-tier hit)
  if (matched.length > 0 && isBenignContext(localPart, handle, tokens, matched)) {
    return { keywordScore: 0, signals: [], matchedKeywords: [] };
  }

  // ── 3. Structural / domain pattern score ──
  const { structScore, structSignals } = scoreUPIStructure(localPart, handle);

  // ── 4. Combine — keyword capped at 50, struct capped at 50, total capped at 80 ──
  const kwScore  = Math.min(rawKwScore, 50);
  const combined = Math.min(kwScore + structScore, 80);

  // ── 5. Build user-facing signals ──
  const signals = [...structSignals];

  if (matched.length === 0 && structSignals.length === 0)
    return { keywordScore: 0, signals: [], matchedKeywords: [] };

  const critical = matched.filter(m => m.tier === "critical");
  const high     = matched.filter(m => m.tier === "high");
  const medium   = matched.filter(m => m.tier === "medium");

  if (critical.length > 0) {
    const names = critical.map(m => `"${m.canonical}"`).join(", ");
    signals.push(`🚨 Critical scam keyword(s) in UPI ID: ${names} — this is a near-certain fraud pattern`);
  } else if (matched.length >= 3) {
    const names = matched.slice(0,3).map(m => `"${m.canonical}"`).join(", ");
    signals.push(`🚨 Multiple scam keywords detected: ${names} — highly suspicious UPI ID`);
  } else if (matched.length === 2) {
    const names = matched.map(m => `"${m.canonical}"`).join(" + ");
    signals.push(`⚠️ Two suspicious keywords in UPI ID: ${names}`);
  } else if (high.length === 1) {
    const kw = high[0];
    const display = kw.word !== kw.canonical ? `"${kw.word}" (≈${kw.canonical})` : `"${kw.canonical}"`;
    signals.push(`⚠️ High-risk keyword in UPI ID: ${display} — ${kw.desc}`);
  } else if (medium.length >= 1) {
    const kw = medium[0];
    const display = kw.word !== kw.canonical ? `"${kw.word}" (≈${kw.canonical})` : `"${kw.canonical}"`;
    signals.push(`⚠️ Suspicious term in UPI ID: ${display} — ${kw.desc}`);
  } else if (matched.length >= 1 && structScore === 0) {
    // Low-tier only, no structural red flags → very mild signal
    const kw = matched[0];
    signals.push(`ℹ️ UPI ID contains term "${kw.canonical}" — verify recipient before paying`);
  }

  return { keywordScore: combined, signals, matchedKeywords: matched };
}

/* ═══ FRAUD DETECTION ENGINE ═══ */
const ODD_HOUR_START = 1;
const ODD_HOUR_END = 5;
const FREEZE_BLOCK_COUNT = 10;
const FREEZE_WINDOW_SEC = 180;
const COOLDOWN_SEC = 60;
const MAX_DAILY_FREEZE = 5;
const OTP_DISCOUNT = 15;

function isOddHour(date = new Date()) {
  const hour = date.getHours();
  return hour >= ODD_HOUR_START && hour < ODD_HOUR_END;
}

function getRecentTransactions(user, minutes) {
  const now = new Date();
  const cutoff = new Date(now.getTime() - minutes * 60000);
  return (user.transactions || []).filter(tx => {
    if (!tx.date || !tx.time) return false;
    const txDate = new Date(`${tx.date} ${tx.time}`);
    return txDate > cutoff;
  });
}

function calculateAvgTransaction(user) {
  const txs = user.transactions || [];
  if (txs.length === 0) return 1000;
  const sum = txs.reduce((s, t) => s + t.amt, 0);
  return sum / txs.length;
}

function calculateStdDeviation(user, avg) {
  const txs = user.transactions || [];
  if (txs.length < 2) return avg * 0.5;
  const squaredDiffs = txs.map(t => Math.pow(t.amt - avg, 2));
  const variance = squaredDiffs.reduce((s, d) => s + d, 0) / txs.length;
  return Math.sqrt(variance);
}

function getDailySpent(user) {
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'2-digit'}).replace(/ /g,' ');
  return (user.transactions || [])
    .filter(tx => tx.date === today && tx.type === 'debit' && tx.status !== 'blocked')
    .reduce((s, t) => s + t.amt, 0);
}

function behaviouralDeviation(user, amount) {
  const avg = calculateAvgTransaction(user);
  const std = calculateStdDeviation(user, avg);
  if (std === 0) return { risk: 0, signals: [] };
  
  const zScore = Math.abs(amount - avg) / std;
  if (zScore > 3.5) {
    return {
      risk: 12,
      signals: [`Amount ₹${amount.toLocaleString()} is unusually far outside your typical range (avg ₹${avg.toLocaleString()} ± ₹${std.toLocaleString()})`]
    };
  }
  return { risk: 0, signals: [] };
}

function scamPatternCheck(user, amount, receiverNum) {
  const avg = calculateAvgTransaction(user);
  const bal = user.balance;
  const inContacts = receiverNum in (user.contacts || {});
  const inHistory = user.known_recipients?.has(receiverNum) || false;
  const inUPI = receiverNum in USERS;
  
  const isUnknown = !inContacts && !inHistory;
  const isLarge = amount > 8 * avg;
  const drainsBalance = amount > 0.65 * bal;
  const oddHour = isOddHour();
  
  let signals = 0;
  const reasons = [];
  
  if (isUnknown) { signals++; reasons.push("Recipient is not in your contacts or transaction history."); }
  if (isLarge) { signals++; reasons.push(`Amount ₹${amount.toLocaleString()} is much higher than your usual payments.`); }
  if (drainsBalance) { signals++; reasons.push(`This would use ${Math.round(amount/bal*100)}% of your current balance.`); }
  if (!inUPI) { signals += 1; reasons.push("⚠️ Recipient UPI ID is not registered in the network — verify before paying."); }
  if (oddHour) { signals++; reasons.push("Transaction attempted during late-night hours."); }
  
  if (signals >= 3) {
    reasons.push("If someone asked you to make this payment, please verify first.");
    return { risk: 15, autoBlock: true, signals: reasons };
  }
  if (signals === 2 && amount > 0.5 * bal) {
    return { risk: 10, autoBlock: false, signals: ["Multiple risk signals active on this payment — please review carefully."] };
  }
  return { risk: 0, autoBlock: false, signals: [] };
}

function checkMicroPaymentAttack(user) {
  const recent1min = getRecentTransactions(user, 1).filter(tx => tx.amt >= 1 && tx.amt <= 50);
  const recent2min = getRecentTransactions(user, 2).filter(tx => tx.amt >= 1 && tx.amt <= 50);
  
  if (recent1min.length >= 10) {
    return {
      attack: true,
      risk: 60,
      signal: `🚨 ${recent1min.length} rapid small payments (₹1–₹50) in 1 minute.`
    };
  }
  if (recent2min.length >= 12) {
    return {
      attack: true,
      risk: 55,
      signal: `🚨 ${recent2min.length} rapid small payments in 2 minutes.`
    };
  }
  return { attack: false, risk: 0, signal: null };
}

function checkRapidLargeTransfers(user, amount) {
  const avg = calculateAvgTransaction(user);
  const recent2min = getRecentTransactions(user, 2).filter(tx => tx.amt > avg * 1.4);
  const recent3min = getRecentTransactions(user, 3).filter(tx => tx.amt > avg * 1.4);
  const total3min = recent3min.reduce((s, t) => s + t.amt, 0);
  const bal = user.balance;
  
  if (recent3min.length >= 4 && total3min > bal * 0.4) {
    return {
      risk: 38,
      signal: `Multiple rapid transfers: ${recent3min.length} large payments totalling ₹${total3min.toLocaleString()} in 3 minutes.`
    };
  }
  if (recent2min.length >= 3 && total3min > bal * 0.35) {
    return {
      risk: 22,
      signal: `${recent2min.length} large payments in 2 minutes — monitoring.`
    };
  }
  return { risk: 0, signal: null };
}

function calculateRisk(user, amount, receiverNum) {
  let risk = 0;
  const signals = [];
  const bal = user.balance;
  const avg = calculateAvgTransaction(user);

  // 1. Micro-payment attack
  const micro = checkMicroPaymentAttack(user);
  if (micro.attack) {
    risk += micro.risk;
    signals.push(micro.signal);
    incRecipientRisk(receiverNum);
    return { risk, signals, action: 'cooldown' };
  }

  // 2. Rapid large transfers
  const rapid = checkRapidLargeTransfers(user, amount);
  if (rapid.risk > 0) {
    risk += rapid.risk;
    signals.push(rapid.signal);
    incRecipientRisk(receiverNum);
  }

  // 3. Balance drain
  const balPct = (amount / Math.max(bal, 1)) * 100;
  if (balPct > 80) {
    risk += 30;
    signals.push(`This transaction drains ${balPct.toFixed(0)}% of your balance.`);
  } else if (balPct > 65) {
    risk += 16;
    signals.push(`Large transfer: ${balPct.toFixed(0)}% of your current balance.`);
  }

  // 4. Recipient checks
  const inUPI = receiverNum in USERS;
  const inContacts = receiverNum in (user.contacts || {});
  const inHistory = user.known_recipients?.has(receiverNum) || false;

  if (!inUPI) {
    signals.push("ℹ️ Sending to a number outside the UPI network — verify before proceeding.");
  } else if (!inContacts && !inHistory) {
    risk += 8;
    signals.push("New recipient — not seen in your contacts or history.");
  }

  // ===== NEW: Verified identity trust bonus =====
  if (inUPI && USERS[receiverNum] && USERS[receiverNum].verified) {
    risk = Math.max(0, risk - 5);
  }

  // 5. Daily spending
  const spentToday = getDailySpent(user);
  const startBal = Math.max(bal + spentToday, 1);
  const dailyPct = ((spentToday + amount) / startBal) * 100;
  if (dailyPct >= 88) {
    risk += 15;
    signals.push(`Daily spending would reach ${dailyPct.toFixed(0)}% of your starting balance.`);
  } else if (dailyPct >= 75) {
    risk += 7;
    signals.push(`Daily spending at ${dailyPct.toFixed(0)}% of starting balance.`);
  }

  // 6. Recipient risk registry
  const recRisk = getRecipientRisk(receiverNum);
  if (recRisk >= 4) {
    risk += 18;
    signals.push(`⚠️ Recipient flagged in ${recRisk} suspicious patterns network-wide.`);
  } else if (recRisk >= 2) {
    risk += 8;
    signals.push(`Recipient has ${recRisk} previous flagged pattern(s).`);
  }

  // 7. Odd hour
  if (isOddHour() && risk > 0) {
    risk += 8;
    signals.push(`Late-night transaction (${ODD_HOUR_START}AM–${ODD_HOUR_END}AM).`);
  }

  // 8. Behavioural deviation
  const behav = behaviouralDeviation(user, amount);
  risk += behav.risk;
  signals.push(...behav.signals);

  // ===== NEW: Dynamic High-Value Detection (age-based threshold) =====
  const hv = checkHighValueTransaction(user, amount);
  if (hv.isHighValue) {
    risk += hv.risk;
    signals.push(hv.signal);
  }

  // ===== NEW: Behavioral Biometrics signal =====
  const bio = getBiometricRisk(user.number);
  if (bio.risk > 0) {
    risk += bio.risk;
    if (bio.signal) signals.push(bio.signal);
  }

  // ===== NEW: Context-Aware Score Modifier =====
  const ctx = getContextScore(user, amount, receiverNum);
  risk += ctx.contextScore;
  signals.push(...ctx.contextSignals);

  // 9. Trust reduction for contacts
  let finalRisk = risk;
  if (receiverNum in (user.contacts || {})) {
    finalRisk = Math.floor(risk * 0.75);
  } else if (user.known_recipients?.has(receiverNum)) {
    finalRisk = Math.floor(risk * 0.88);
  }

  // 10. Scam pattern
  const scam = scamPatternCheck(user, amount, receiverNum);
  finalRisk += scam.risk;
  signals.push(...scam.signals);

  const totalRisk = user.risk_score + finalRisk;

  if (totalRisk >= RISK_OTP) {
    return { risk: finalRisk, signals, action: 'otp', requiresDelay: needsSmartDelay(user, amount) };
  }
  if (totalRisk >= RISK_INFO) {
    return { risk: finalRisk, signals, action: 'info', requiresDelay: needsSmartDelay(user, amount) };
  }
  return { risk: finalRisk, signals, action: 'allow', requiresDelay: needsSmartDelay(user, amount) };
}

/* ═══ FREEZE MANAGEMENT ═══ */
function checkFrozen(user) {
  if (user.permanent_frozen) {
    return { frozen: true, message: "Your account is locked. Please visit a branch to reactivate." };
  }
  if (user.frozen_until && new Date() < new Date(user.frozen_until)) {
    const remaining = Math.ceil((new Date(user.frozen_until) - new Date()) / 1000);
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    return { frozen: true, message: `Account paused for your safety. Try again in ${mins}m ${secs}s.`, remaining };
  }
  return { frozen: false };
}

function checkCooldown(user) {
  if (user.cooldown_until && new Date() < new Date(user.cooldown_until)) {
    const remaining = Math.ceil((new Date(user.cooldown_until) - new Date()) / 1000);
    return { cooldown: true, remaining };
  }
  return { cooldown: false };
}

function applyCooldown(user, reason) {
  user.cooldown_until = new Date(Date.now() + COOLDOWN_SEC * 1000).toISOString();
  user.blocked_attempts = (user.blocked_attempts || 0) + 1;
  return { cooldown: true, remaining: COOLDOWN_SEC, reason };
}

function recordBlock(user) {
  const now = new Date();
  if (!user.recent_blocks) user.recent_blocks = [];
  user.recent_blocks.push(now);
  user.recent_blocks = user.recent_blocks.filter(t => 
    (now - new Date(t)) / 1000 <= FREEZE_WINDOW_SEC
  );
  return user.recent_blocks.length >= FREEZE_BLOCK_COUNT;
}

function recordBypassAttempt(user) {
  user.bypass_attempts = (user.bypass_attempts || 0) + 1;
  return user.bypass_attempts >= 3;
}

function freezeAccount(user, reason, minutes = 5) {
  const today = new Date().toDateString();
  if (!user.daily_freeze_log) user.daily_freeze_log = [];
  
  const todayFreezes = user.daily_freeze_log.filter(d => 
    new Date(d).toDateString() === today
  ).length;
  
  if (todayFreezes >= MAX_DAILY_FREEZE) {
    user.permanent_frozen = true;
    return { frozen: true, permanent: true, message: "Multiple suspicious activities detected today. Please visit your nearest branch." };
  }
  
  user.daily_freeze_log.push(new Date().toISOString());
  user.freeze_count = (user.freeze_count || 0) + 1;
  user.frozen_until = new Date(Date.now() + minutes * 60000).toISOString();
  user.blocked_attempts = (user.blocked_attempts || 0) + 1;
  
  return { 
    frozen: true, 
    minutes, 
    message: reason,
    remainingToday: MAX_DAILY_FREEZE - todayFreezes - 1
  };
}

function emergencyLock(user) {
  user.permanent_frozen = true;
  user.freeze_count = (user.freeze_count || 0) + 1;
  if (!user.daily_freeze_log) user.daily_freeze_log = [];
  user.daily_freeze_log.push(new Date().toISOString());
  return { locked: true };
}

// ===== NEW FEATURE: Behavioral Biometrics Tracker =====
// Passively tracks typing speed, click intervals, session timing
// Stores baseline per user and detects deviations silently
const BiometricBaseline = new Map();

function recordInteraction(userNum, type = 'click') {
  const now = Date.now();
  if (!BiometricBaseline.has(userNum)) {
    BiometricBaseline.set(userNum, { interactions: [], sessionStart: now, avgInterval: null, lastInteraction: null });
  }
  const b = BiometricBaseline.get(userNum);
  if (b.lastInteraction) {
    const interval = now - b.lastInteraction;
    b.interactions.push({ type, interval, ts: now });
    if (b.interactions.length > 30) b.interactions.shift();
    const ints = b.interactions.map(i => i.interval).filter(i => i > 0 && i < 30000);
    b.avgInterval = ints.length ? ints.reduce((s, x) => s + x, 0) / ints.length : null;
  }
  b.lastInteraction = now;
}

function getBiometricRisk(userNum) {
  const b = BiometricBaseline.get(userNum);
  if (!b || b.interactions.length < 5 || !b.avgInterval) return { risk: 0, signal: null };
  const recent = b.interactions.slice(-5);
  const recentAvg = recent.reduce((s, i) => s + i.interval, 0) / recent.length;
  const deviation = Math.abs(recentAvg - b.avgInterval) / Math.max(b.avgInterval, 1);
  if (deviation > 2.0) return { risk: 8, signal: "Unusual interaction pattern detected (behavioral biometrics)" };
  if (deviation > 1.2) return { risk: 5, signal: null };
  return { risk: 0, signal: null };
}

// ===== NEW FEATURE: Dynamic High-Value Transaction Detection (Age-Based) =====
// Age 20–60: 5× avg threshold. Others (seniors/young): 3× avg threshold
function getHighValueThreshold(user) {
  const avg = calculateAvgTransaction(user);
  const age = user.age || 30;
  return (age >= 20 && age <= 60) ? avg * 5 : avg * 3;
}

function checkHighValueTransaction(user, amount) {
  const avg = calculateAvgTransaction(user);
  const threshold = getHighValueThreshold(user);
  if (amount > threshold) {
    const mult = (amount / Math.max(avg, 1)).toFixed(1);
    return {
      isHighValue: true,
      risk: 20,
      signal: `This transaction (₹${amount.toLocaleString()}) is ${mult}× higher than your usual amount — significantly above your normal behaviour`
    };
  }
  return { isHighValue: false, risk: 0, signal: null };
}

// ===== NEW FEATURE: Smart Delay (10s countdown for high-value) =====
function needsSmartDelay(user, amount) {
  return checkHighValueTransaction(user, amount).isHighValue;
}

// ===== NEW FEATURE: Smart OTP Logic (Adaptive Authentication) =====
function shouldTriggerOTP(user, amount, receiverNum, riskScore) {
  const highValue = checkHighValueTransaction(user, amount).isHighValue;
  const isNewRecipient = !user.known_recipients?.has(receiverNum) && !(receiverNum in (user.contacts || {}));
  const highRisk = riskScore >= 70;
  const biometric = getBiometricRisk(user.number).risk > 0;
  const flaggedRecipient = getRecipientRisk(receiverNum) >= 3;
  // Trusted contact + low risk = reduce OTP requirement
  const isTrusted = (receiverNum in (user.contacts || {})) && riskScore < 50;
  if (isTrusted) return false;
  return highValue || isNewRecipient || highRisk || biometric || flaggedRecipient;
}

// ===== NEW FEATURE: Enhanced Freeze Level System =====
function getFreezeLevel(user) {
  if (user.permanent_frozen) return 5;
  if (user.frozen_until && new Date() < new Date(user.frozen_until)) return 4;
  if ((user.bypass_attempts || 0) >= 2) return 3;
  if ((user.blocked_attempts || 0) >= 3) return 2;
  if ((user.risk_score || 0) >= 60) return 1;
  return 0;
}

function getFreezeLevelLabel(level) {
  const labels = ["Safe","⚠️ Warning","⏳ Delay Active","🔐 OTP Enforced","🚫 Temp Blocked","❄️ Account Frozen"];
  return labels[level] || "Safe";
}

// ===== NEW FEATURE: Context-Aware Score Modifier =====
// Combines time, frequency spike, new recipient, amount anomaly, biometrics
function getContextScore(user, amount, receiverNum) {
  let score = 0;
  const signals = [];
  const hour = new Date().getHours();

  // Time of day (enhanced weight)
  if (hour >= 1 && hour < 5) { score += 12; signals.push("Late-night transaction (1AM–5AM)"); }
  else if (hour >= 22 || hour < 7) { score += 5; }

  // Transaction frequency spike (5 txns in 5 min)
  const recent5 = getRecentTransactions(user, 5);
  if (recent5.length >= 5) { score += 15; signals.push(`Frequency spike: ${recent5.length} transactions in 5 minutes`); }
  else if (recent5.length >= 3) { score += 5; }

  // New recipient flag
  const isNew = !user.known_recipients?.has(receiverNum) && !(receiverNum in (user.contacts || {}));
  if (isNew && !(receiverNum in USERS)) { score += 10; signals.push("New unverified recipient"); }

  // Amount anomaly integration — NOTE: checkHighValueTransaction already adds risk
  // in calculateRisk directly; we do NOT add it again here to avoid double-counting.

  // Biometric signal
  const bio = getBiometricRisk(user.number);
  if (bio.risk > 0) score += bio.risk;

  // Verified recipient trust reduction
  if (receiverNum in USERS && USERS[receiverNum].verified) score = Math.max(0, score - 8);

  return { contextScore: Math.min(score, 35), contextSignals: signals };
}

/* ═══ LOGIN PAGE ═══ */
function LoginPage({onLogin}){
  const[mobile,setMobile]=useState("");
  const[pin,setPin]=useState("");
  const[showPin,setShowPin]=useState(false);
  const[otp,setOtp]=useState("");
  const[otpMode,setOtpMode]=useState(false);
  const[msg,setMsg]=useState({text:"",ok:false});
  const[loading,setLoading]=useState(false);
  const[timer,setTimer]=useState(0);
  const[resend,setResend]=useState(false);
  const[pinAttempts,setPinAttempts]=useState(0);
  const[pinLockedUntil,setPinLockedUntil]=useState(null);
  const[mobileErr,setMobileErr]=useState(""); // FEATURE: mobile validation error

  useEffect(()=>{
    if(timer<=0){setResend(true);return;}
    const t=setTimeout(()=>setTimer(p=>p-1),1000);
    return()=>clearTimeout(t);
  },[timer]);

  useEffect(()=>{
    if (pinLockedUntil && new Date() < new Date(pinLockedUntil)) {
      const timer = setInterval(() => {
        if (new Date() >= new Date(pinLockedUntil)) {
          setPinLockedUntil(null);
          setPinAttempts(0);
        }
      }, 1000);
      return () => clearInterval(timer);
    }
  }, [pinLockedUntil]);

  async function handleLogin(){
    setMsg({text:"",ok:false});
    
    if (pinLockedUntil && new Date() < new Date(pinLockedUntil)) {
      const remaining = Math.ceil((new Date(pinLockedUntil) - new Date()) / 1000);
      setMsg({text:`Too many attempts. Try again in ${remaining}s`, ok:false});
      return;
    }
    
    if(!otpMode){
      // FEATURE: Validate mobile is exactly 10 digits before proceeding
      const cleanMobile = mobile.replace(/\D/,"");
      if (cleanMobile.length !== 10) {
        setMobileErr("Enter a valid 10-digit mobile number");
        return;
      }
      setMobileErr("");
      const u=Object.entries(USERS).find(([,v])=>v.number===mobile);
      if(!u){setMsg({text:"Invalid Mobile",ok:false}); return;}
      
      if (pin !== u[1].pin) {
        const newAttempts = pinAttempts + 1;
        setPinAttempts(newAttempts);
        if (newAttempts >= 3) {
          setPinLockedUntil(new Date(Date.now() + 7 * 60000).toISOString());
          setMsg({text:"Too many incorrect PINs. Try again in 7 minutes.", ok:false});
        } else {
          setMsg({text:`Incorrect PIN. ${3 - newAttempts} attempt(s) left.`, ok:false});
        }
        return;
      }

      // Admin user - skip OTP server call, accept constant OTP 000000
      if (u[1].isAdmin) {
        setOtpMode(true); setTimer(999); setResend(true);
        setMsg({text:"Admin login — OTP 000000 will be accepted ✔", ok:true});
        setPinAttempts(0);
        return;
      }

      setLoading(true);
      try{
        await fetch(`${API}/send-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile})});
        setOtpMode(true);setTimer(30);setResend(false);
        setMsg({text:"OTP sent to your registered mobile 📲",ok:true});
        setPinAttempts(0);
      }catch(e){setMsg({text:"Backend unreachable. Is server running?",ok:false});}
      finally{setLoading(false);}
    }else{
      // Admin user - skip OTP server call, accept constant OTP 000000
      if (mobile === "1234567890" && otp === "000000") {
        setMsg({text:"Login Successful ✔",ok:true});
        const u=Object.entries(USERS).find(([,v])=>v.number===mobile);
        setTimeout(()=>onLogin({...u[1]}),500);
        return;
      }
      setLoading(true);
      try{
        const res=await fetch(`${API}/verify-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile,otp})});
        const data=await res.json();
        if(data.status==="SUCCESS"){
          setMsg({text:"Login Successful ✔",ok:true});
          const u=Object.entries(USERS).find(([,v])=>v.number===mobile);
          setTimeout(()=>onLogin({...u[1]}),500);
        }else if(data.status==="OTP_EXPIRED"){setMsg({text:"OTP expired. Resend.",ok:false});}
        else{setMsg({text:"Invalid OTP. Try again.",ok:false});}
      }catch(e){setMsg({text:"Backend unreachable. Is server running?",ok:false});}
      finally{setLoading(false);}
    }
  }

  async function handleResend(){
    setTimer(30);setResend(false);
    try{await fetch(`${API}/send-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile})});
      setMsg({text:"OTP resent 📲",ok:true});}
    catch(e){setMsg({text:"Server unreachable.",ok:false});}
  }

  const ready=!loading&&((!otpMode&&mobile.length===10&&pin.length===4)||(otpMode&&otp.length===6));

  return(
    <div style={{minHeight:"100vh",backgroundImage:"url('loginbg.jpg')",backgroundSize:"cover",
      backgroundPosition:"center",display:"flex",alignItems:"center",justifyContent:"center",
      position:"relative",fontFamily:"'DM Sans',sans-serif",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(0,25,80,.75) 0%,rgba(0,80,200,.55) 100%)"}}/>
      <div style={{position:"absolute",top:"6%",right:"10%",width:240,height:240,borderRadius:"50%",
        background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",
        animation:"float 7s ease-in-out infinite"}}/>
      <div style={{position:"absolute",bottom:"10%",left:"6%",width:160,height:160,borderRadius:"50%",
        background:"rgba(0,120,255,.1)",border:"1px solid rgba(0,120,255,.18)",
        animation:"float 9s ease-in-out infinite .6s"}}/>

      <div style={{width:"100%",maxWidth:420,padding:"24px 18px",position:"relative",zIndex:1,animation:"scaleIn .5s cubic-bezier(.16,1,.3,1)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
            width:80,height:80,borderRadius:24,
            background:"rgba(255,255,255,.95)",
            boxShadow:"0 10px 36px rgba(0,0,0,.22)",marginBottom:14}}>
            <img src="favicon.png" alt="PayTrust" style={{width:58,height:58,objectFit:"contain",display:"block"}}/>
          </div>
          <h1 style={{color:"#fff",fontSize:32,fontWeight:800,letterSpacing:"-.5px",marginBottom:5}}>PayTrust</h1>
          <p style={{color:"rgba(255,255,255,.6)",fontSize:15}}>India's most secure payment gateway</p>
        </div>

        <div className="glass" style={{borderRadius:24,padding:"30px 26px"}}>
          <h2 style={{fontSize:19,fontWeight:800,color:"#0f172a",marginBottom:3}}>
            {otpMode?"Verify Identity":"Welcome back"}
          </h2>
          <p style={{fontSize:13,color:"#64748b",marginBottom:22}}>
            {otpMode?"Enter the OTP sent to your mobile":"Sign in to your PayTrust account"}
          </p>

          {!otpMode&&(<>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Mobile Number</label>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",
                  fontSize:14,color:"#94a3b8",fontWeight:700,userSelect:"none"}}>+91</span>
                <input type="tel" value={mobile} maxLength={10}
                  onChange={e=>{ setMobile(e.target.value.replace(/\D/,"").slice(0,10)); setMobileErr(""); }} // FEATURE: digit-only + clear error on type
                  placeholder="10-digit number"
                  style={{width:"100%",padding:"11px 12px 11px 44px",borderRadius:10,
                    border:`1.5px solid ${mobile.length===10?"#93c5fd":"#e2e8f0"}`,
                    fontSize:15,outline:"none",boxSizing:"border-box",color:"#0f172a",
                    background:"#f8faff",transition:"border-color .2s",fontFamily:"'DM Sans',sans-serif"}}/>
              </div>
              {/* FEATURE: Mobile validation error */}
              {mobileErr && (
                <div style={{marginTop:6,fontSize:12,color:"#dc2626",fontWeight:600,animation:"slideDown .2s ease"}}>
                  {mobileErr}
                </div>
              )}
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>PIN</label>
              <div style={{position:"relative"}}>
                <input type={showPin?"text":"password"} value={pin} maxLength={4}
                  onChange={e=>setPin(e.target.value.replace(/\D/,"").slice(0,4))}
                  onKeyDown={e=>{ if(e.key==="Enter"&&ready) handleLogin(); }} // FEATURE: Enter key triggers login
                  placeholder="••••"
                  style={{width:"100%",padding:"11px 40px 11px 12px",borderRadius:10,
                    border:`1.5px solid ${pin.length===4?"#93c5fd":"#e2e8f0"}`,
                    fontSize:22,letterSpacing:8,outline:"none",boxSizing:"border-box",
                    color:"#0f172a",background:"#f8faff",fontFamily:"'DM Sans',sans-serif"}}/>
                <button onClick={()=>setShowPin(p=>!p)} style={{position:"absolute",right:12,top:"50%",
                  transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",padding:0}}>
                  {showPin?Ic.eyeOff():Ic.eye()}
                </button>
              </div>
            </div>
          </>)}

          {otpMode&&(
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>6-Digit OTP</label>
              <input type="text" value={otp} maxLength={6}
                onChange={e=>setOtp(e.target.value.replace(/\D/,"").slice(0,6))}
                placeholder="000000"
                style={{width:"100%",padding:"12px 14px",borderRadius:10,
                  border:`1.5px solid ${otp.length===6?"#93c5fd":"#e2e8f0"}`,
                  fontSize:24,letterSpacing:10,outline:"none",boxSizing:"border-box",
                  color:"#0f172a",textAlign:"center",background:"#f8faff",fontFamily:"'DM Sans',sans-serif"}}/>
              <div style={{textAlign:"center",marginTop:10,fontSize:13,color:"#94a3b8"}}>
                {resend
                  ?<button onClick={handleResend} style={{background:"none",border:"none",color:"#0078FF",
                    fontSize:13,cursor:"pointer",fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>
                    Resend OTP →</button>
                  :`Resend in ${timer}s`}
              </div>
            </div>
          )}

          {msg.text&&(
            <div style={{padding:"10px 14px",borderRadius:10,marginBottom:14,fontSize:13,fontWeight:600,
              background:msg.ok?"#f0fdf4":"#fef2f2",color:msg.ok?"#166534":"#dc2626",
              border:`1px solid ${msg.ok?"#bbf7d0":"#fca5a5"}`,animation:"slideDown .25s ease"}}>
              {msg.text}
            </div>
          )}

          <button onClick={handleLogin} disabled={!ready} className="btn-primary"
            style={{width:"100%",padding:"13px",borderRadius:12,border:"none",
              background:ready?`linear-gradient(135deg,#0078FF,#0055cc)`:"#93c5fd",
              color:"#fff",fontWeight:700,fontSize:16,cursor:ready?"pointer":"not-allowed",
              fontFamily:"'DM Sans',sans-serif",letterSpacing:".2px",
              boxShadow:ready?"0 4px 18px rgba(0,120,255,.32)":"none",transition:"all .2s"}}>
            {loading?"Please wait…":otpMode?"Verify & Login →":"Continue →"}
          </button>

          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            marginTop:16,fontSize:12,color:"#94a3b8"}}>
            {Ic.shield("#93c5fd")}
            <span>256-bit encrypted · RBI compliant · 2FA secured</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ OTP MODAL ═══ */
function OTPModal({mobile,onSuccess,onCancel}){
  const[digits,setDigits]=useState(["","","","","",""]);
  const[error,setError]=useState(false);
  const[errMsg,setErrMsg]=useState("Invalid OTP.");
  const[timer,setTimer]=useState(30);
  const[resend,setResend]=useState(false);
  const[loading,setLoad]=useState(false);
  const refs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  useEffect(()=>{refs[0].current&&refs[0].current.focus();},[]);
  useEffect(()=>{
    if(timer<=0){setResend(true);return;}
    const t=setTimeout(()=>setTimer(p=>p-1),1000);
    return()=>clearTimeout(t);
  },[timer]);
  /* Auto-send OTP as soon as this modal opens (skip for admin - uses static OTP) */
  useEffect(()=>{
    if (mobile === "1234567890") return;
    fetch(`${API}/send-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile})}).catch(()=>{});
  },[]);

  function type(i,e){
    const v=e.target.value.replace(/\D/,"");
    const d=[...digits];d[i]=v;setDigits(d);
    if(v&&i<5)refs[i+1].current&&refs[i+1].current.focus();
    if(d.every(x=>x))submit(d.join(""));
  }
  function bk(i,e){
    if(e.key==="Backspace"&&!digits[i]&&i>0){
      refs[i-1].current&&refs[i-1].current.focus();
      const d=[...digits];d[i-1]="";setDigits(d);
    }
  }
  async function submit(code){
    // Admin user - skip OTP server call, accept constant OTP 000000
    if (mobile === "1234567890" && code === "000000") {
      onSuccess();
      return;
    }
    setLoad(true);
    try{
      const res=await fetch(`${API}/verify-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile,otp:code})});
      const data=await res.json();
      if(data.status==="SUCCESS"){onSuccess();}
      else{
        setErrMsg(data.status==="OTP_EXPIRED"?"OTP expired. Resend.":"Invalid OTP.");
        setError(true);
        setTimeout(()=>{setError(false);setDigits(["","","","","",""]);refs[0].current&&refs[0].current.focus();},750);
      }
    }catch(e){
      setErrMsg("Server unreachable.");setError(true);
      setTimeout(()=>{setError(false);setDigits(["","","","","",""]);},750);
    }finally{setLoad(false);}
  }
  async function resendOTP(){
    if (mobile === "1234567890") return;
    setTimer(999); setResend(true);
    try{await fetch(`${API}/send-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile})});}catch(e){}

  useEffect(()=>{
    document.body.style.overflow="hidden";
    return()=>{document.body.style.overflow="";};
  },[]);

  return(
    <Modal>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,
        overflowY:"auto",overscrollBehavior:"contain",
        background:"rgba(10,25,70,.65)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"}}>

                  <polyline points="16 24 22 30 34 18"fill="none"stroke="#fff"strokeWidth="2.8"strokeLinecap="round"strokeLinejoin="round"/>
                </svg>
              </div>
              <h3 style={{fontWeight:800,fontSize:18,color:"#fff",marginBottom:3}}>OTP Verification</h3>

            </div>
            <div style={{padding:"20px 22px 22px"}}>
              <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:12,
                animation:error?"shake .4s ease":"none"}}>
                {digits.map((d,i)=>(
                  <input key={i} ref={refs[i]} maxLength={1} value={d}
                    onChange={e=>type(i,e)} onKeyDown={e=>bk(i,e)}
                    style={{width:44,height:52,textAlign:"center",fontSize:22,fontWeight:700,

/* ═══ PIN MODAL ═══ */
/* ===== ENHANCED PINModal: 3 wrong attempts → 5-min account freeze ===== */
function PINModal({userPin, onSuccess, onCancel, user}){
  const[digits,setDigits]=useState(["","","",""]);
  const[error,setError]=useState(false);
  const[loading,setLoad]=useState(false);
  const[attempts,setAttempts]=useState(0);
  const[pinFrozen,setPinFrozen]=useState(false);
  const[freezeSecs,setFreezeSecs]=useState(300);
  const[errMsg,setErrMsg]=useState("Incorrect PIN. Try again.");
  const refs=[useRef(),useRef(),useRef(),useRef()];
  const MAX_ATTEMPTS=3;
  const FREEZE_SECS=300;

  useEffect(()=>{
    if(refs[0].current) refs[0].current.focus();
  },[]);

  // Countdown when frozen
  useEffect(()=>{
    if(!pinFrozen) return;
    if(freezeSecs<=0){setPinFrozen(false);setAttempts(0);setFreezeSecs(FREEZE_SECS);return;}
    const t=setTimeout(()=>setFreezeSecs(s=>s-1),1000);
    return()=>clearTimeout(t);
  },[pinFrozen,freezeSecs]);

  function type(i,e){
    if(pinFrozen) return;
    const v=e.target.value.replace(/\D/,"");
    const d=[...digits];d[i]=v;setDigits(d);
    if(v&&i<3)refs[i+1].current&&refs[i+1].current.focus();
    if(d.every(x=>x))submit(d.join(""));
  }
  function bk(i,e){
    if(pinFrozen) return;
    if(e.key==="Backspace"&&!digits[i]&&i>0){
      refs[i-1].current&&refs[i-1].current.focus();
      const d=[...digits];d[i-1]="";setDigits(d);
    }
  }
  function submit(code){
    setLoad(true);
    setTimeout(()=>{
      if(code===String(userPin)){
        onSuccess();
      } else {
        const newAttempts=attempts+1;
        setAttempts(newAttempts);
        setError(true);
        if(newAttempts>=MAX_ATTEMPTS){
          if(user) freezeAccount(user,"3 incorrect PIN attempts — account paused for 5 minutes.",5);
          setPinFrozen(true);
          setFreezeSecs(FREEZE_SECS);
          setErrMsg("3 wrong PINs — account frozen for 5 minutes");
        } else {
          setErrMsg(`Incorrect PIN. ${MAX_ATTEMPTS-newAttempts} attempt${MAX_ATTEMPTS-newAttempts===1?"":"s"} left.`);
        }
        setTimeout(()=>{
          setError(false);
          setDigits(["","","",""]);
          if(!pinFrozen) refs[0].current&&refs[0].current.focus();
        },700);
      }
      setLoad(false);
    },600);
  }
  useEffect(()=>{
    document.body.style.overflow="hidden";
    return()=>{document.body.style.overflow="";};
  },[]);

  const mins=Math.floor(freezeSecs/60);
  const secs=freezeSecs%60;
  const pct=((FREEZE_SECS-freezeSecs)/FREEZE_SECS)*100;

  return(
    <Modal>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,
        overflowY:"auto",overscrollBehavior:"contain",
        background:"rgba(10,25,70,.65)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"}}>
        <div style={{minHeight:"100%",display:"flex",alignItems:"center",justifyContent:"center",
          padding:"20px",boxSizing:"border-box"}}>
          <div style={{background:"#fff",borderRadius:24,width:"100%",maxWidth:320,flexShrink:0,
            boxShadow:"0 30px 70px rgba(0,0,0,.26)",animation:"scaleIn .28s cubic-bezier(.16,1,.3,1)",overflow:"hidden"}}>
            {pinFrozen ? (
              <>
                <div style={{background:"linear-gradient(135deg,#dc2626,#991b1b)",padding:"20px 24px 16px",textAlign:"center"}}>
                  <div style={{width:54,height:54,borderRadius:"50%",background:"rgba(255,255,255,.15)",
                    display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",fontSize:26}}>
                    ❄️
                  </div>
                  <h3 style={{fontWeight:800,fontSize:17,color:"#fff",marginBottom:3}}>Account Frozen</h3>
                  <p style={{fontSize:12,color:"rgba(255,255,255,.8)"}}>3 incorrect PIN attempts detected</p>
                </div>
                <div style={{padding:"24px 22px",textAlign:"center"}}>
                  <p style={{fontSize:13,color:"#64748b",marginBottom:16,lineHeight:1.5}}>
                    Your account is paused for <strong>5 minutes</strong> to protect against unauthorised access.
                  </p>
                  <div style={{fontSize:44,fontWeight:800,color:"#dc2626",fontFamily:"monospace",marginBottom:14}}>
                    {mins}:{secs.toString().padStart(2,"0")}
                  </div>
                  <div style={{height:6,background:"#f1f5f9",borderRadius:4,overflow:"hidden",marginBottom:16}}>
                    <div style={{height:"100%",width:`${pct}%`,
                      background:"linear-gradient(90deg,#dc2626,#f97316)",
                      borderRadius:4,transition:"width 1s linear"}}/>
                  </div>
                  <p style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>You can cancel and try again after the timer ends</p>
                  <Btn onClick={onCancel} variant="ghost" fullWidth>Cancel Payment</Btn>
                </div>
              </>
            ) : (
              <>
                <div style={{background:`linear-gradient(135deg,#0078FF,#0055cc)`,padding:"20px 24px 16px",textAlign:"center"}}>
                  <div style={{width:50,height:50,borderRadius:"50%",background:"rgba(255,255,255,.2)",
                    display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>
                    {Ic.lock("#fff")}
                  </div>
                  <h3 style={{fontWeight:800,fontSize:18,color:"#fff",marginBottom:3}}>Enter PIN</h3>
                  <p style={{fontSize:12,color:"rgba(255,255,255,.75)"}}>Confirm your 4-digit PayTrust PIN</p>
                </div>
                <div style={{padding:"20px 22px 22px"}}>
                  {/* Attempt dots */}
                  {attempts>0&&(
                    <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:10}}>
                      {Array.from({length:MAX_ATTEMPTS}).map((_,i)=>(
                        <div key={i} style={{width:8,height:8,borderRadius:"50%",
                          background:i<attempts?"#dc2626":"#e2e8f0",transition:"background .3s"}}/>
                      ))}
                    </div>
                  )}
                  <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:14,
                    animation:error?"shake .4s ease":"none"}}>
                    {digits.map((d,i)=>(
                      <input key={i} ref={refs[i]} maxLength={1} type="password" value={d}
                        onChange={e=>type(i,e)} onKeyDown={e=>bk(i,e)}
                        style={{width:54,height:60,textAlign:"center",fontSize:28,fontWeight:700,
                          border:`2px solid ${error?"#fca5a5":d?"#93c5fd":"#e2e8f0"}`,
                          borderRadius:14,outline:"none",color:"#0f172a",fontFamily:"'DM Sans',sans-serif",
                          background:error&&!d?"#fef2f2":d?"#f0f6ff":"#f8faff",transition:"all .15s",boxSizing:"border-box"}}/>
                    ))}
                  </div>
                  {error&&<p style={{color:"#dc2626",textAlign:"center",fontSize:13,marginBottom:12,fontWeight:600}}>{errMsg}</p>}
                  {loading&&<p style={{textAlign:"center",fontSize:13,color:"#0078FF",marginBottom:12,fontWeight:600,animation:"pulse 1s infinite"}}>Verifying…</p>}
                  <Btn onClick={onCancel} variant="ghost" fullWidth>Cancel</Btn>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ FRAUD RISK CARD with PIN+OTP for suspicious ═══ */
function FraudRiskCard({score, recipient, recipientNum, amount, signals, onVerify, onCancel, onReport, tier, kwMatched=[], urgencyHits=[], urgencyScore=0}){
  const [countdown, setCountdown] = useState(10);
  const [timerActive, setTimerActive] = useState(false);

  useEffect(() => {
    if (score >= 90) {
      setCountdown(10);
      setTimerActive(true);
    } else {
      setTimerActive(false);
    }
  }, [score]);

  useEffect(() => {
    if (!timerActive) return;
    if (countdown <= 0) { setTimerActive(false); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [timerActive, countdown]);

  const m=riskMeta(score);
  const R=36,cx=52,cy=52;
  const sa=Math.PI*.75,sw=Math.PI*1.5*(score/100);
  function p2r(a){return{x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)};}
  function arc(from,to){
    const f=p2r(from),t=p2r(to),lg=(to-from)>Math.PI?1:0;
    return`M ${f.x} ${f.y} A ${R} ${R} 0 ${lg} 1 ${t.x} ${t.y}`;
  }

  // 90+ score → button becomes "Verify with OTP"
  // Below 90 → "Pay with PIN →"  (OTP is still triggered internally for otp/high_risk tier)
  const useOTPButton = score >= 90;

  // Determine the correct title based on tier
  let title = '';
  if (tier === 'normal') title = '🟢 Safe Transaction';
  else if (tier === 'info') title = '🟡 Caution — Low Risk';
  else if (tier === 'otp') title = '🟠 Suspicious Payment Detected';
  else if (tier === 'high_risk') title = '🔴 High Risk Transaction';

  return(
    <Card style={{padding:0,overflow:"hidden",border:`1.5px solid ${m.border}`}}>
      <div style={{height:4,background:`linear-gradient(90deg,${m.dot},${m.color})`,borderRadius:"18px 18px 0 0"}}/>
      <div style={{padding:"20px 22px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              {Ic.warn(m.dot)}
              <span style={{fontWeight:800,fontSize:15,color:m.color}}>
                {title}
              </span>
            </div>
            <p style={{fontSize:12,color:"#94a3b8"}}>AI Fraud Risk Score</p>
          </div>
          <svg width="88"height="74"viewBox="0 0 104 80">

          </div>
