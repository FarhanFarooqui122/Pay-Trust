        {/* ===== Network Fraud Intelligence — recipient report count ===== */}
        {recipientNum&&getRecipientRisk(recipientNum)>=1&&(
          <div style={{marginBottom:12}}>
            <div style={{padding:"10px 14px",background:"#fef2f2",border:"1px solid #fca5a5",
              borderRadius:10,display:"flex",alignItems:"center",gap:8,marginBottom:getRecipientRisk(recipientNum)>3?6:0}}>
              {Ic.warn("#dc2626")}
              <span style={{fontSize:13,color:"#dc2626",fontWeight:600}}>
                ⚠ Reported {getRecipientRisk(recipientNum)} time{getRecipientRisk(recipientNum)>1?"s":""} in our network
              </span>
            </div>
            {getRecipientRisk(recipientNum)>3&&(
              <div style={{padding:"8px 14px",background:"#450a0a",border:"1.5px solid #dc2626",
                borderRadius:10,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14}}>🚨</span>
                <span style={{fontSize:13,color:"#fca5a5",fontWeight:700}}>
                  High-risk recipient — multiple users have flagged this account
                </span>
              </div>
            )}
          </div>
        )}

        {/* ===== ENGINE INSIGHTS + WHY IS THIS RISKY — clean 3-layer separation ===== */}
        {(()=>{
          // Build explanation from getRiskExplanation (if user context available via recipientNum)
          // We also incorporate the existing signals[] for full engine detail
          // LAYER 1 — Engine Insights: full technical sentences from the fraud engine
          // LAYER 2 — Why is this risky?: short human reasons from getRiskExplanation
          // LAYER 3 — Tags: 1-2 word chips
          // No signal repeats across layers.

          // Collect all engine insight sentences (existing signals array, deduplicated)
          const engineInsights = signals ? [...new Set(signals)] : [];

          // Build explanation layers from recipientNum context
          const rr = recipientNum ? getRecipientRisk(recipientNum) : 0;
          const whyReasons = [];
          const whyTags    = [];

          // Network
          if (rr > 0) {
            whyReasons.push(`Reported by ${rr} user${rr > 1 ? "s" : ""}`);
            whyTags.push("Reported");
          }

          // Parse short reasons from signals — avoid duplicating what engine insights say
          if (signals) {
            signals.forEach(s => {
              const sl = s.toLowerCase();
              if ((sl.includes("new recipient") || sl.includes("not seen in your contacts")) &&
                  !whyReasons.some(r => r.toLowerCase().includes("new recipient"))) {
                whyReasons.push("New recipient");
                whyTags.push("New");
              }
              if ((sl.includes("drain") || sl.includes("large transfer") || sl.includes("higher than your usual") || sl.includes("unusually far outside")) &&
                  !whyReasons.some(r => r.toLowerCase().includes("amount") || r.toLowerCase().includes("spend"))) {
                whyReasons.push("High amount");
                if (!whyTags.includes("High Amount")) whyTags.push("High Amount");
              }
              if ((sl.includes("daily spending") || sl.includes("starting balance") || sl.includes("portion")) &&
                  !whyReasons.some(r => r.toLowerCase().includes("spend") || r.toLowerCase().includes("balance"))) {
                whyReasons.push("Large spend");
                if (!whyTags.includes("Large Spend")) whyTags.push("Large Spend");
              }
              if ((sl.includes("off-network") || sl.includes("outside the upi network") || sl.includes("outside the trusted")) &&
                  !whyReasons.some(r => r.toLowerCase().includes("off-network") || r.toLowerCase().includes("network"))) {
                whyReasons.push("Off-network account");
                if (!whyTags.includes("Off-Network")) whyTags.push("Off-Network");
              }
              if ((sl.includes("late-night") || sl.includes("odd hour") || sl.includes("unusual time") || sl.includes("1–5")) &&
                  !whyReasons.some(r => r.toLowerCase().includes("hour"))) {
                whyReasons.push("Odd hour");
                if (!whyTags.includes("Odd Hour")) whyTags.push("Odd Hour");
              }
            });
          }

          const dedupeReasons = [...new Set(whyReasons)];
          const dedupeTags    = [...new Set(whyTags)];

          const TAG_STYLE = (tag) => {
            const map = {
              "Reported":    {c:"#dc2626", bg:"#fef2f2", bd:"#fca5a5"},
              "New":         {c:"#f59e0b", bg:"#fef3c7", bd:"#fcd34d"},
              "High Amount": {c:"#f97316", bg:"#fff7ed", bd:"#fdba74"},
              "Large Spend": {c:"#ea580c", bg:"#fff7ed", bd:"#fb923c"},
              "Odd Hour":    {c:"#7c3aed", bg:"#f5f3ff", bd:"#c4b5fd"},
              "Off-Network": {c:"#0369a1", bg:"#e0f2fe", bd:"#7dd3fc"},
            };
            return map[tag] || {c:"#64748b", bg:"#f8faff", bd:"#e2e8f0"};
          };

          return (
            <>
              {/* 10-SECOND COUNTDOWN TIMER — shown when risk score >= 85 */}
              {score >= 85 && (
                <div style={{
                  padding:"12px 16px",
                  background:"linear-gradient(135deg, #fff7ed 0%, #fef3c7 100%)",
                  border:"2px solid #f97316",
                  borderRadius:12,
                  marginBottom:16,
                  display:"flex",
                  alignItems:"center",
                  justifyContent:"space-between",
                  gap:12,
                  animation:"slideInL .3s ease both"
                }}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:22}}>⏱️</span>
                    <div>
                      <p style={{fontSize:13,fontWeight:800,color:"#9a3412",margin:0,lineHeight:1.3}}>
                        High Risk — 10 Second Review Required
                      </p>
                      <p style={{fontSize:11,color:"#92400e",margin:"3px 0 0",fontWeight:500}}>
                        Please review all details carefully before proceeding
                      </p>
                    </div>
                  </div>
                  <div style={{
                    width:48,height:48,borderRadius:"50%",
                    background:"#fff",
                    border:"3px solid #f97316",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:22,fontWeight:900,color:"#f97316",
                    boxShadow:"0 2px 8px rgba(249,115,22,.3)",
                    flexShrink:0
                  }}>
                    {countdown}
                  </div>
                </div>
              )}

              {/* SECTION 1: Engine Insights — full technical sentences */}
              {engineInsights.length > 0 && (
                <div style={{marginBottom:14}}>
                  <p style={{fontSize:11,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",
                    letterSpacing:.8,marginBottom:8}}>
                    🔍 Engine Insights
                  </p>
                  {engineInsights.slice(0,6).map((s,i)=>{
                    const isKW = s.startsWith("⚠️") || s.startsWith("🚨");
                    return(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6,
                        padding:"7px 10px",
                        background:isKW?"#fff7ed":m.bg,
                        borderRadius:8,border:`1px solid ${isKW?"#fdba74":m.border}`,
                        animation:`slideInL .2s ${i*.06}s ease both`}}>
                        <svg width="6"height="6"style={{flexShrink:0,marginTop:5}}>
                          <circle cx="3"cy="3"r="3"fill={isKW?"#f59e0b":m.dot}/>
                        </svg>
                        <span style={{fontSize:13,color:isKW?"#92400e":m.color,
                          fontWeight:isKW?600:500,lineHeight:1.4}}>{s}</span>
                      </div>
                    );
                  })}

                  {/* Urgency Detection — kept inside Engine Insights, no duplication */}
                  {urgencyHits.length>0&&(
                    <div style={{marginTop:8,padding:"10px 14px",background:"#fff7ed",
                      border:"1.5px solid #f97316",borderRadius:10,
                      display:"flex",alignItems:"flex-start",gap:10,
                      animation:"slideInL .25s ease both"}}>
                      <span style={{fontSize:18,flexShrink:0}}>⚡</span>
                      <div>
                        <p style={{fontSize:13,fontWeight:700,color:"#9a3412",marginBottom:4,lineHeight:1.4}}>
                          ⚠️ This request uses urgency tactics often seen in scams
                        </p>
                        <p style={{fontSize:11,color:"#92400e",fontWeight:500,lineHeight:1.4,margin:0}}>
                          Detected: {urgencyHits.slice(0,4).map(h=>`"${h}"`).join(", ")}
                          {urgencyHits.length>4?` +${urgencyHits.length-4} more`:""}
                          {" "}— Scammers often create false urgency to bypass your judgement.
                        </p>
                      </div>
                    </div>
                  )}

                  {/* UPI Keyword badges — kept inside Engine Insights */}
                  {kwMatched.length>0&&(
                    <div style={{marginTop:10,padding:"10px 12px",
                      background:kwMatched.some(k=>k.tier==="critical")?"#fff1f2":"#fff7ed",
                      borderRadius:10,
                      border:kwMatched.some(k=>k.tier==="critical")?"1px solid #fda4af":"1px solid #fdba74"}}>
                      <p style={{fontSize:10,fontWeight:800,
                        color:kwMatched.some(k=>k.tier==="critical")?"#881337":"#92400e",
                        textTransform:"uppercase",letterSpacing:.7,marginBottom:7}}>
                        🔍 Flagged UPI Keywords
                      </p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {kwMatched.map((kw,i)=>{
                          const chipColor=kw.tier==="critical"?"#9f1239":kw.tier==="high"?"#dc2626":kw.tier==="medium"?"#f97316":"#f59e0b";
                          const chipBg=kw.tier==="critical"?"#fff1f2":kw.tier==="high"?"#fef2f2":kw.tier==="medium"?"#fff7ed":"#fefce8";
                          const chipBord=kw.tier==="critical"?"#fda4af":kw.tier==="high"?"#fca5a5":kw.tier==="medium"?"#fdba74":"#fde68a";
                          const tierLabel=kw.tier==="critical"?"🚨 CRIT":kw.tier==="high"?"HIGH":kw.tier==="medium"?"MED":"LOW";
                          return(
                            <span key={i} title={kw.desc} style={{display:"inline-flex",alignItems:"center",gap:4,
                              padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,
                              background:chipBg,color:chipColor,border:`1.5px solid ${chipBord}`}}>
                              <svg width="7"height="7"><circle cx="3.5"cy="3.5"r="3.5"fill={chipColor}/></svg>
                              {kw.canonical}
                              <span style={{fontSize:10,opacity:.75,fontWeight:600}}>{tierLabel}</span>
                            </span>
                          );
                        })}
                      </div>
                      <p style={{fontSize:10,color:"#94a3b8",marginTop:7,lineHeight:1.4}}>
                        Hover a badge for scam description · Keywords are weighted by fraud frequency
                      </p>
                    </div>
                  )}
                </div>
              )}

              {/* SECTION 2: Why is this risky? — short human reasons only */}
              {dedupeReasons.length > 0 && score >= 60 && (
                <div style={{marginBottom:14,padding:"12px 14px",background:"#fff7ed",
                  border:"1.5px solid #fdba74",borderRadius:12,animation:"slideInL .3s ease both"}}>
                  <p style={{fontSize:11,fontWeight:800,color:"#92400e",textTransform:"uppercase",
                    letterSpacing:.7,marginBottom:8}}>
                    🤔 Why is this risky?
                  </p>
                  {dedupeReasons.map((r,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:7,marginBottom:5,
                      fontSize:13,color:"#9a3412",fontWeight:600,lineHeight:1.4}}>
                      <span style={{flexShrink:0,marginTop:1}}>⚠</span><span>{r}</span>
                    </div>
                  ))}

                  {/* 💡 Test-Payment Suggestion for very high risk (score >= 90) */}
                  {score >= 90 && (
                    <div style={{marginTop:12,padding:"10px 12px",background:"#f0f9ff",
                      border:"1.5px solid #38bdf8",borderRadius:10,
                      display:"flex",alignItems:"flex-start",gap:10,
                      animation:"slideInL .25s ease both"}}>
                      <span style={{fontSize:18,flexShrink:0}}>💡</span>
                      <div>
                        <p style={{fontSize:13,fontWeight:700,color:"#0369a1",marginBottom:3,lineHeight:1.4}}>
                          Try confirming with a ₹1 test payment first
                        </p>
                        <p style={{fontSize:11,color:"#075985",fontWeight:500,lineHeight:1.4,margin:0}}>
                          For high-risk payments, sending a small ₹1 amount helps verify the recipient's UPI ID is active and owned by the correct person — before committing the full amount.
                        </p>
                      </div>
                    </div>
                  )}

                  {/* SECTION 3: Tag chips — 1-2 word labels only */}
                  {dedupeTags.length > 0 && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:10}}>
                      {dedupeTags.map((tag,i)=>{
                        const ts = TAG_STYLE(tag);
                        return(
                          <span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,
                            padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:700,
                            background:ts.bg,color:ts.c,border:`1.5px solid ${ts.bd}`}}>
                            {tag}
                          </span>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </>
          );
        })()}


        {/* ===== 90+ WARNING: Extra caution text above button ===== */}
        {score >= 90 && (
          <div style={{marginBottom:12,padding:"10px 14px",background:"#fef2f2",
            border:"2px solid #dc2626",borderRadius:10,textAlign:"center"}}>
            <p style={{fontSize:14,fontWeight:800,color:"#dc2626",margin:0}}>
              ⚠️ BE EXTRA CAREFUL: This transaction has multiple high-risk signals.
            </p>
          </div>
        )}

        <div style={{display:"flex",gap:10}}>
          <button onClick={onVerify} className="btn-primary"
            style={{flex:1,padding:"12px",background:`linear-gradient(135deg,#0078FF,#0055cc)`,border:"none",
              borderRadius:12,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif",boxShadow:"0 4px 14px rgba(0,120,255,.28)"}}>
            {useOTPButton ? "Verify with OTP →" : "Pay with PIN →"}
          </button>
          <button onClick={onReport}
            style={{padding:"12px 18px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:12,
              color:"#dc2626",cursor:"pointer",fontSize:14,fontFamily:"'DM Sans',sans-serif",fontWeight:600,transition:"all .15s"}}
            onMouseEnter={e=>e.target.style.background="#fee2e2"}
            onMouseLeave={e=>e.target.style.background="#fef2f2"}>
            {Ic.flag("#dc2626")} Report
          </button>
        </div>
      </div>
    </Card>
  );
}

/* ===== FEATURE 3: Smart Delay Modal — psychological warning + animated countdown ===== */
function SmartDelayModal({amount, onConfirm, onCancel}){
  const DELAY=10;
  const[secs,setSecs]=useState(DELAY);
  const[done,setDone]=useState(false);
  const[hesStart]=useState(Date.now()); // track hesitation time for biometrics

  useEffect(()=>{
    document.body.style.overflow="hidden";
    return()=>{document.body.style.overflow="";};
  },[]);

  useEffect(()=>{
    if(secs<=0){setDone(true);return;}
    const t=setInterval(()=>setSecs(s=>s-1),1000);
    return()=>clearInterval(t);
  },[secs]);

  const pct=((DELAY-secs)/DELAY)*100;
  const circumference=2*Math.PI*34;

  return(
    <Modal>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,
        background:"rgba(10,25,70,.72)",backdropFilter:"blur(8px)",
        display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#fff",borderRadius:24,maxWidth:400,width:"100%",
          padding:"32px 28px",textAlign:"center",
          boxShadow:"0 32px 80px rgba(0,0,0,.28)",animation:"scaleIn .28s cubic-bezier(.16,1,.3,1)"}}>

          {/* Icon */}
          <div style={{width:72,height:72,borderRadius:"50%",
            background:"linear-gradient(135deg,#fff7ed,#fef3c7)",
            display:"flex",alignItems:"center",justifyContent:"center",
            margin:"0 auto 18px",border:"2px solid #fcd34d",
            boxShadow:"0 8px 24px rgba(245,158,11,.18)"}}>
            <svg width="32"height="32"viewBox="0 0 24 24"fill="none"stroke="#f59e0b"strokeWidth="2.2"strokeLinecap="round">
              <circle cx="12"cy="12"r="10"/><line x1="12"y1="8"x2="12"y2="12"/><line x1="12"y1="16"x2="12.01"y2="16"/>
            </svg>
          </div>

          <h3 style={{fontSize:18,fontWeight:800,color:"#92400e",marginBottom:6}}>Large Transaction Detected</h3>
          <p style={{color:"#64748b",fontSize:14,marginBottom:10}}>
            You are sending <strong style={{color:"#0f172a"}}>₹{Number(amount).toLocaleString("en-IN")}</strong>
          </p>

          {/* Psychological safety warning */}
          <div style={{padding:"12px 16px",background:"#fef3c7",border:"1px solid #fcd34d",
            borderRadius:12,marginBottom:20,textAlign:"left"}}>
            <p style={{fontSize:12,color:"#92400e",fontWeight:600,lineHeight:1.5}}>
              ⚠️ <strong>Scammers often create urgency.</strong> Take a moment to verify:
              <br/>• Do you personally know this recipient?
              <br/>• Did anyone ask you to make this payment urgently?
              <br/>• Is the amount what you intended?
            </p>
          </div>

          {/* SVG countdown ring */}
          <div style={{position:"relative",width:88,height:88,margin:"0 auto 18px"}}>
            <svg width="88"height="88"viewBox="0 0 88 88"style={{transform:"rotate(-90deg)"}}>
              <circle cx="44"cy="44"r="34"fill="none"stroke="#f1f5f9"strokeWidth="8"/>
              <circle cx="44"cy="44"r="34"fill="none"stroke={done?"#22c55e":"#f59e0b"}strokeWidth="8"
                strokeLinecap="round"
                strokeDasharray={circumference}
                strokeDashoffset={circumference*(1-pct/100)}
                style={{transition:"stroke-dashoffset 1s linear,stroke .3s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:26,fontWeight:800,
              color:done?"#166534":"#f59e0b",fontFamily:"monospace"}}>
              {done?"✓":secs}
            </div>
          </div>

          {/* Countdown bar */}
          <div style={{height:4,background:"#f1f5f9",borderRadius:2,overflow:"hidden",marginBottom:20}}>
            <div style={{height:"100%",width:`${pct}%`,
              background:`linear-gradient(90deg,#f59e0b,${done?"#22c55e":"#f97316"})`,
              borderRadius:2,transition:"width 1s linear,background .3s"}}/>
          </div>

          <p style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>
            {done?"You may now confirm your payment":"Please review the details above"}
          </p>

          <div style={{display:"flex",gap:10}}>
            <button onClick={onCancel}
              style={{flex:1,padding:"11px",background:"#f8faff",border:"1px solid #e2e8f0",
                borderRadius:12,fontWeight:600,fontSize:14,cursor:"pointer",color:"#64748b",
                fontFamily:"'DM Sans',sans-serif"}}>
              Cancel
            </button>
            <button onClick={()=>{if(done)onConfirm();}} disabled={!done}
              className="btn-primary"
              style={{flex:2,padding:"11px",border:"none",borderRadius:12,fontWeight:700,fontSize:14,
                cursor:done?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",
                background:done?"linear-gradient(135deg,#22c55e,#16a34a)":"#93c5fd",
                color:"#fff",boxShadow:done?"0 4px 14px rgba(34,197,94,.3)":"none",
                transition:"all .3s"}}>
              {done?"✓ Confirm Payment →":"Reviewing…"}
            </button>
          </div>
        </div>
      </div>
    </Modal>
  );
}


/* ═══ COOLDOWN MODAL with working timer ═══ */
function CooldownModal({remaining, reason, onClose}){
  const [seconds, setSeconds] = useState(remaining);
  
  useEffect(() => {
    if (seconds <= 0) {
      onClose();
      return;
    }
    const timer = setInterval(() => setSeconds(s => s - 1), 1000);
    return () => clearInterval(timer);
  }, [seconds, onClose]);
  
  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);
  
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  
  return (
    <Modal>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,
        background:"rgba(10,25,70,.65)",backdropFilter:"blur(8px)",
        display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:24,maxWidth:380,padding:"30px",textAlign:"center"}}>
          <div style={{width:70,height:70,borderRadius:"50%",background:"#fef2f2",
            display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            {Ic.warn("#dc2626")}
          </div>
          <h3 style={{fontSize:20,fontWeight:800,color:"#0f172a",marginBottom:8}}>Unusual Activity Detected</h3>
          <p style={{color:"#64748b",marginBottom:16}}>{reason || "Too many rapid small payments detected."}</p>
          <div style={{fontSize:48,fontWeight:800,color:"#0078FF",marginBottom:16,fontFamily:"monospace"}}>
            {mins}:{secs.toString().padStart(2,'0')}
          </div>
          <div style={{width:"100%",height:4,background:"#f1f5f9",borderRadius:2,marginBottom:16}}>
            <div style={{height:"100%",width:`${(seconds/remaining)*100}%`,background:"#0078FF",
              borderRadius:2,transition:"width 1s linear"}}/>
          </div>
          <p style={{fontSize:13,color:"#94a3b8"}}>Please wait before your next transaction</p>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ FREEZE MODAL with working timer ═══ */
function FreezeModal({message, permanent, remaining, onClose}){
  const [seconds, setSeconds] = useState(remaining || 0);
  
  useEffect(() => {
    if (permanent || seconds <= 0) return;
    
    const timer = setInterval(() => {
      setSeconds(s => {
        if (s <= 1) {
          onClose();
          return 0;
        }
        return s - 1;
      });
    }, 1000);

  }, [seconds, permanent, onClose]);
  
  useEffect(() => {

/* ═══ RECIPIENT RISK WARNING COMPONENT — Network-Level Reporting UI ═══ */
function RecipientRiskWarning({recipient, recipientType, userContacts, amount, userObj}){
  const[showWhy, setShowWhy] = useState(false);
  if(!recipient) return null;
  const targetNum = recipientType==='phone' ? recipient
    : (Object.entries(USERS).find(([,v])=>v.upi===recipient)||[])[0] || recipient;
  const rr = getRecipientRisk(targetNum);
  if(rr < 1) return null;

  const isHighRisk = rr > 3;
  const isNewRecipient = !(targetNum in (userContacts||{}));
  const inNetwork = targetNum in USERS;

  // Build explanation using getRiskExplanation if we have user context
  const expl = userObj && amount > 0
    ? getRiskExplanation(userObj, targetNum, amount)
    : null;

  const reasons = [];
  reasons.push(`Reported by ${rr} user${rr!==1?"s":""}`);
  if(isNewRecipient) reasons.push("New recipient — not in your contacts");
  if(!inNetwork) reasons.push("Unknown / off-network account");
  if(expl && expl.reasons.length > 0) {
    expl.reasons.forEach(r => { if(!reasons.some(x=>x.toLowerCase().includes(r.toLowerCase().slice(0,12)))) reasons.push(r); });
  }

  const tags = [];
  tags.push("Reported");
  if(isNewRecipient) tags.push("New Recipient");
  if(!inNetwork) tags.push("Off-Network");

  return(
    <div style={{marginTop:10,animation:"slideDown .25s ease"}}>
      {/* Primary banner */}
      <div style={{padding:"10px 14px",
        background: isHighRisk ? "#450a0a" : "#fef2f2",
        border:`1.5px solid ${isHighRisk?"#dc2626":"#fca5a5"}`,
        borderRadius: showWhy ? "12px 12px 0 0" : 12,
        display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:15,flexShrink:0}}>{isHighRisk?"🚨":"⚠"}</span>
        <span style={{fontSize:13,fontWeight:700,color:isHighRisk?"#fca5a5":"#dc2626",flex:1}}>
          {isHighRisk
            ? `🚨 High-risk recipient — reported ${rr} times`
            : `⚠ Reported ${rr} time${rr!==1?"s":""} in network`}
        </span>
        <button onClick={()=>setShowWhy(w=>!w)}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:11,
            color:isHighRisk?"#fca5a5":"#0078FF",fontWeight:700,
            fontFamily:"'DM Sans',sans-serif",padding:0,whiteSpace:"nowrap"}}>
          {showWhy?"Hide ▲":"Details ▼"}
        </button>
      </div>

      {/* Expandable detail panel */}
      {showWhy && (
        <div style={{padding:"12px 14px",background:"#fff7ed",
          border:"1.5px solid #fdba74",borderTop:"none",
          borderRadius:"0 0 12px 12px"}}>
          <div style={{fontSize:11,fontWeight:800,color:"#92400e",
            textTransform:"uppercase",letterSpacing:.6,marginBottom:8}}>
            🤔 Why is this risky?
          </div>
          {reasons.map((r,i)=>(
            <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,
              marginBottom:5,fontSize:12,color:"#92400e",fontWeight:600,lineHeight:1.4}}>
              <span style={{flexShrink:0}}>⚠</span><span>{r}</span>
            </div>
          ))}
          {/* Tag chips */}
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
            {tags.map((tag,i)=>{
              const tc=tag==="Reported"?"#dc2626":tag==="New Recipient"?"#f59e0b":"#64748b";
              const tbg=tag==="Reported"?"#fef2f2":tag==="New Recipient"?"#fef3c7":"#f8faff";
              const tbd=tag==="Reported"?"#fca5a5":tag==="New Recipient"?"#fcd34d":"#e2e8f0";
              return(
                <span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,
                  padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:700,
                  background:tbg,color:tc,border:`1.5px solid ${tbd}`}}>
                  {tag}
                </span>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ SEND MONEY PAGE with PIN+OTP for suspicious ═══ */
function SendMoneyPage({user,balance,addTx,updateBalance,setPage,updateUser}){
  const[recipient, setRecipient] = useState("");
  const[recipientType, setRecipientType] = useState("phone");
  const[amt, setAmt] = useState("");
  const[note, setNote] = useState("");
  const[stage, setStage] = useState("form");
  const[riskData, setRiskData] = useState({score:0,signals:[], action:'allow', tier:'normal', risk:0});
  const[prog, setProg] = useState(0);
  const[lastTx, setLastTx] = useState(null);
  const[balErr, setBalErr] = useState("");
  const[recipientErr, setRecipientErr] = useState(""); // FEATURE: mobile validation error
  const[showCooldown, setShowCooldown] = useState(false);
  const[cooldownData, setCooldownData] = useState(null);
  const[showFreeze, setShowFreeze] = useState(false);
  const[freezeData, setFreezeData] = useState(null);
  // ===== NEW: Smart Delay state =====
  const[showSmartDelay, setShowSmartDelay] = useState(false);
  // === Out-of-Band Verification Feature: modal state ===
  const[showOOBModal, setShowOOBModal] = useState(false);
  // ===== FEATURE: Duplicate Payment Warning — tracks recent same-amount/to recipient txs =====
  const[recentTxTimestamps, setRecentTxTimestamps] = useState([]); // [{toNum, amt, ts}]
  const[showDupWarning, setShowDupWarning] = useState(false);

  // ===== NEW: Record biometric interactions on mount and interactions =====
  useEffect(() => { recordInteraction(user.number, 'page_load'); }, [user.number]);

  useEffect(() => {
    const frozen = checkFrozen(user);
    if (frozen.frozen) {
      setFreezeData(frozen);
      setShowFreeze(true);
      return;
    }
    const cooldown = checkCooldown(user);
    if (cooldown.cooldown) {
      setCooldownData(cooldown);
      setShowCooldown(true);
    }
  }, [user]);

  const parsedAmt = parseFloat(amt)||0;
  const isInsufficient = parsedAmt>0 && parsedAmt>balance;

  const getRecipientInfo = () => {
    if (!recipient) return { name: "", targetNum: "", inUPI: false, inContacts: false, inHistory: false };
    let targetNum = recipient;
    if (recipientType === 'upi') {
      const u = Object.entries(USERS).find(([,v]) => v.upi === recipient);
      if (u) targetNum = u[0];
    }
    const inUPI = targetNum in USERS;
    const inContacts = targetNum in (user.contacts || {});
    const inHistory = user.known_recipients?.has(targetNum) || false;
    const name = inUPI ? USERS[targetNum].name : (inContacts ? user.contacts[targetNum] : recipient);
    return { name, targetNum, inUPI, inContacts, inHistory };
  };

  const isFormReady = recipient && amt && parsedAmt>0 && !isInsufficient && (recipientType==="upi" || recipient.replace(/\D/,"").length===10);

  function handleAmtChange(v){
    recordInteraction(user.number, 'amount_input'); // biometrics
    setAmt(v);
    setBalErr("");
  }

  // ===== FEATURE: Duplicate Payment Warning handlers =====
  function handleDupWarningProceed() {
    setShowDupWarning(false);
    // Record this attempt in recent timestamps so subsequent checks within 4 mins will trigger again
    const { targetNum } = getRecipientInfo();
    setRecentTxTimestamps(prev => [...prev, { toNum: targetNum || recipient, amt: parsedAmt, ts: Date.now() }]);
    // Resume risk analysis
    const { targetNum: tn } = getRecipientInfo();
    setStage("analyzing");
    setProg(0);
    const t = setInterval(() => setProg(p => { if(p>=92){ clearInterval(t); return 92; } return p + 7; }), 80);
    setTimeout(() => {
      clearInterval(t); setProg(100);
      const ruleResult = calculateRisk(user, parsedAmt, tn || recipient);
      if (ruleResult.action === 'cooldown') {
        const cd = applyCooldown(user, ruleResult.signals[0]);
        setCooldownData(cd); setShowCooldown(true); setStage("form"); return;
      }
      const mlProb = mlFraudScore(user, parsedAmt, tn || recipient);
      const mlSignals = []; let mlAdj = 0;
      if (mlProb !== null) {
        if (mlProb > 0.80) { mlSignals.push("\uD83E\uDD16 ML model: " + Math.round(mlProb*100) + "% fraud probability."); mlAdj = Math.round(mlProb * 25); }
        else if (mlProb > 0.50) { mlSignals.push("\uD83E\uDD16 ML model flagged: " + Math.round(mlProb*100) + "% fraud probability."); mlAdj = Math.round(mlProb * 18); }
        else if (mlProb < 0.15) { mlAdj = -8; }
      }
      const score = ruleResult.score + mlAdj;
      const tier = score >= RISK_OTP ? 'otp' : score >= RISK_INFO ? 'info' : 'normal';
      const action = ruleResult.action === 'block' ? 'block' : tier === 'otp' ? 'otp' : tier === 'info' ? 'info' : 'allow';
      setRiskData({ score, signals: [...ruleResult.signals, ...mlSignals], action, tier, risk: ruleResult.risk });
      setStage("risk");
    }, 600);
  }

  function handleDupWarningCancel() {
    setShowDupWarning(false);
  }

  function analyzeRisk(){
    if(!isFormReady) return;
    if(parsedAmt>balance){
      setBalErr(`Insufficient balance. You have ₹${balance.toLocaleString("en-IN")} available.`);
      return;
    }

    const { targetNum } = getRecipientInfo();
    if (!targetNum && recipientType === 'phone') {
      setBalErr("Invalid recipient number");
      return;
    }

    // ===== FEATURE: Duplicate Payment Warning — check same amount + same recipient within 3 minutes =====
    const FOUR_MINS = 4 * 60 * 1000;
    const now = Date.now();
    const recentDuplicate = recentTxTimestamps.some(tx => tx.toNum === (targetNum || recipient) && tx.amt === parsedAmt && (now - tx.ts) < FOUR_MINS);
    if (recentDuplicate) {
      setShowDupWarning(true); // show warning modal, don't proceed
      return;
    }

    setStage("analyzing");
    setProg(0);
    
    const t = setInterval(() => setProg(p => {
      if(p>=92){ clearInterval(t); return 92; }
      return p + 7;
    }), 80);
    setTimeout(() => {
      clearInterval(t); setProg(100);
      const ruleResult = calculateRisk(user, parsedAmt, targetNum || recipient);
      if (ruleResult.action === 'cooldown') {
        const cd = applyCooldown(user, ruleResult.signals[0]);
        setCooldownData(cd); setShowCooldown(true); setStage("form"); return;
      }
      // GBM inference: pure JS tree traversal, synchronous
      const mlProb = mlFraudScore(user, parsedAmt, targetNum || recipient);
      const mlSignals = []; let mlAdj = 0;
      if (mlProb !== null) {
        if (mlProb > 0.80) {
          mlSignals.push("\uD83E\uDD16 ML model: " + Math.round(mlProb*100) + "% fraud probability.");
          mlAdj = Math.round(mlProb * 25); // calibrated: was 40, reduced to prevent over-penalising
        } else if (mlProb > 0.50) {
          mlSignals.push("\uD83E\uDD16 ML model flagged: " + Math.round(mlProb*100) + "% fraud probability.");
          mlAdj = Math.round(mlProb * 18); // calibrated: was 25, reduced to prevent over-penalising
        } else if (mlProb < 0.15) {
          mlAdj = -8; // ML says legit — silently reduce risk, no message shown
        }
      }
      // Keyword Risk Analysis Engine — runs on UPI input
      let kwScore = 0, kwSignals = [], kwMatched = [];
      if (recipientType === 'upi' && recipient) {
        const kwResult = analyzeUPIKeywords(recipient);
        kwScore   = kwResult.keywordScore;
        kwSignals = kwResult.signals;
        kwMatched = kwResult.matchedKeywords;
      }
      // If resolved by phone the recipient UPI is available too
      const resolvedUPI = targetNum && USERS[targetNum] ? USERS[targetNum].upi : null;
      if (recipientType === 'phone' && resolvedUPI && kwScore === 0) {
        const kwResult = analyzeUPIKeywords(resolvedUPI);
        kwScore   = kwResult.keywordScore;
        kwSignals = kwResult.signals;
        kwMatched = kwResult.matchedKeywords;
      }

      // === Urgency Detection Feature ===
      // Run urgency scan on both payment note and recipient UPI ID.
      // The resolved UPI (if phone mode) is used as fallback.
      const urgencyUPI = recipientType === 'upi' ? recipient : (resolvedUPI || '');
      const urgencyResult = detectUrgency(note, urgencyUPI);
      // Blend urgency score: small weight (+0.08) nudges risk without dominating
      const urgencyAdj = Math.round(urgencyResult.urgencyScore * 8); // max +8 pts
      // === End Urgency Detection Feature ===

      const totalRisk = Math.min(100, Math.max(0, user.risk_score + ruleResult.risk + mlAdj + kwScore + urgencyAdj));
      let tier = 'normal';
      if (totalRisk >= RISK_OTP)  tier = 'otp';
      else if (totalRisk >= RISK_INFO) tier = 'info';

      // ── Signal deduplication: keep ONLY the single most severe amount-based signal ──
      // Patterns cover: calculateRisk balance-drain, behaviouralDeviation z-score,
      // scamPatternCheck large-amount, and checkHighValueTransaction outputs.
      // === Urgency Detection Feature ===
      // If urgency keywords were found, append warning signal into the insight list
      const urgencySignals = urgencyResult.urgencyScore > 0
        ? ["⚠️ This request uses urgency tactics often seen in scams — take a moment to verify"]
        : [];
      // === End Urgency Detection Feature ===

      let allSignals = [...ruleResult.signals, ...mlSignals, ...kwSignals, ...urgencySignals];
      const amountSignalPriority = [
        /This transaction drains \d+% of your balance/i,
        /Large transfer:.*of your current balance/i,
        /Amount.*is unusually far outside your typical range/i,
        /Amount ₹[\d,]+ is (much higher|higher) than your usual/i,
        /This transaction.*is.*higher than your usual amount/i,
        /Large transaction for.*your age group/i,
        /High.?value transaction/i,
        /\d+(\.\d+)?× (your avg|higher than)/i,
      ];
      // Priority order: drain > large-transfer > z-score > scam-amount > high-value
      // Keep whichever appears first in the priority list; suppress the rest.
      let keptAmountSignal = null;
      const kept = [];
      for (const s of allSignals) {
        const isAmt = amountSignalPriority.some(rx => rx.test(s));
        if (!isAmt) { kept.push(s); continue; }
        if (!keptAmountSignal) { keptAmountSignal = s; kept.push(s); }
        // else: duplicate amount signal — drop silently
      }
      allSignals = kept;

      setRiskData({
        score: totalRisk,
        signals: allSignals,
        action: ruleResult.action, tier, risk: ruleResult.risk,
        kwMatched, kwScore,
        // === Urgency Detection Feature: persist urgency hits for UI rendering ===
        urgencyHits: urgencyResult.urgencyHits,
        urgencyScore: urgencyResult.urgencyScore
      });
      setStage("risk");

      // ── WebSocket: broadcast fraud_alert when risk ≥ 85 ──────────────
      if (totalRisk >= RISK_OTP && window._ptSocket?.connected) {
        const { targetNum: tn } = getRecipientInfo();
        window._ptSocket.emit("fraud_alert", {
          userNumber:      user.number,
          riskScore:       totalRisk,
          amount:          parsedAmt,
          recipientNumber: tn || "",
          reason:          allSignals.slice(0,2).join("; ") || "High risk payment",
        });
        console.log("[PayTrust WS] 🚨 fraud_alert emitted, score:", totalRisk);
      }
      // ─────────────────────────────────────────────────────────────────
    }, 1600);
  }

  async function handleVerify(){
    // === Self-payment guard: users cannot pay themselves ===
    const { targetNum } = getRecipientInfo();
    if (targetNum && targetNum === user.number) {
      alert("❌ Self-payment is not allowed. Please enter a different recipient.");
      return;
    }

    // === Location jump: show popup only, does NOT affect risk score ===
    // Only run if location permission was granted at login
    if (GeoDeviceBaseline.location_enabled) {
      const freshLoc = await getFreshLocation();
      const travelCheck = checkImpossibleTravel(
        user.number,
        freshLoc.lat,
        freshLoc.lng,
        Date.now()
      );
      if (travelCheck.triggered && travelCheck.risk_level === "popup") {
        const confirmed = confirm(
          travelCheck.reason
            ? travelCheck.reason
            : "Unusual location change detected.\nPlease confirm this activity."
        );
        if (!confirmed) {
          setStage("form");
          setRecipient("");
          setAmt("");
          setNote("");
          return;
        }
      }
    }

    // === Out-of-Band Verification Feature ===
    // Trigger the OOB modal BEFORE PIN/OTP if:
    //   (a) risk score > 75, OR
    //   (b) recipient is unknown to contacts AND amount is ≥ ₹2000
    const { inContacts, inHistory } = getRecipientInfo();
    const isUnknownContact = !inContacts && !inHistory;
    const shouldShowOOB = riskData.score > 75 || (isUnknownContact && parsedAmt >= 2000);
    if (shouldShowOOB) {
      setShowOOBModal(true);
      return; // halt here — user must explicitly choose to proceed or cancel
    }
    // === End Out-of-Band Verification Feature ===

    // ===== NEW: Show smart delay if high-value transaction =====
    if (riskData.requiresDelay) {
      setShowSmartDelay(true);
    } else {
      setStage("pin");
    }
  }

  // === Out-of-Band Verification Feature: handlers for the OOB modal ===
  function handleOOBProceed() {
    // User chose to proceed despite the warning — close modal and continue normally
    setShowOOBModal(false);
    if (riskData.requiresDelay) {
      setShowSmartDelay(true);
    } else {
      setStage("pin");
    }
  }

  function handleOOBCancel() {
    // User chose to cancel — go back to the risk review screen
    setShowOOBModal(false);
    setStage("form");
    setRecipient("");
    setAmt("");
    setNote("");
  }
  // === End Out-of-Band Verification Feature ===

  function handleSmartDelayConfirm(){
    setShowSmartDelay(false);
    setStage("pin");
  }

  function handlePINSuccess() {
    const requiresOTP = riskData.tier === 'otp' || riskData.tier === 'high_risk';
    // ===== NEW: Also trigger OTP via smart OTP logic =====
    const smartOTP = shouldTriggerOTP(user, parsedAmt, getRecipientInfo().targetNum || recipient, riskData.score);
    if (requiresOTP || smartOTP) {
      setStage("otp");
    } else {
      completePayment();
    }
  }

  function handleOTPSuccess() {
    completePayment();
  }

  const [reportModal, setReportModal] = useState(null); // null | target number

  function handleReport() {
    const { targetNum } = getRecipientInfo();
    if (targetNum) {
      setReportModal(targetNum);
    }

  function completeReport(reason) {
    const { targetNum } = getRecipientInfo();
    if (targetNum) {
      reportRecipient(user.number, targetNum, parsedAmt, reason);
    }
    setReportModal(null);
    setStage("form");
    setRecipient("");
    setAmt("");
    setNote("");
  }

  function cancelReport() {
    setReportModal(null);
  }

  function completePayment(){
    const a = parsedAmt;
    const { date, time } = nowStamp();
    const { targetNum, name } = getRecipientInfo();
    
    const otpUsed = riskData.tier === 'otp' || riskData.tier === 'high_risk';
    const status = riskData.tier === 'high_risk' ? 'verified' : 'success';
    
    const _gdMeta = getTxGeoDeviceMeta();
    const _locationDisplay = MockLocation.active
      ? MockLocation.label
      : (_gdMeta.location || null);
    const tx = {
      id: Date.now(),
      to: name || recipient,
      toNum: targetNum || recipient,
      upi: recipientType === 'upi' ? recipient : (USERS[targetNum]?.upi || ''),
      amt: a,
      date, time,
      risk: riskData.score,
      status,
      type: "debit",
      note: note || "Payment",
      isNew: true,
      risk_tag: riskData.tier,
      otp_used: otpUsed,
      location: _locationDisplay,
      device: _gdMeta.device,
      new_device: _gdMeta.isNewDevice,
    };
    
    addTx(tx);
    updateBalance(b => b - a);

    // ===== FEATURE: Record this payment for duplicate warning detection (4-min window) =====
    setRecentTxTimestamps(prev => {
      const cutoff = Date.now() - 4 * 60 * 1000;
      const pruned = prev.filter(tx => tx.ts > cutoff);
      return [...pruned, { toNum: targetNum || recipient, amt: a, ts: Date.now() }];
    });

    // ── WebSocket: real-time push to recipient ────────────────────────
    if (window._ptSocket?.connected && targetNum && targetNum in USERS) {
      window._ptSocket.emit(
        "send_payment",
        {
          fromNumber: user.number,
          toNumber:   targetNum,
          amount:     a,
          txId:       tx.id,
          timestamp:  new Date().toISOString(),
          note:       note || "Payment",
        },
        (ack) => {
          if (ack?.delivered) {
            console.log("[PayTrust WS] ✅ Delivered to", targetNum);
          } else {
            console.log("[PayTrust WS] ℹ️ Recipient offline — local tx recorded");
          }
        }
      );
      console.log("[PayTrust WS] 📤 send_payment →", targetNum, "₹" + a);
    }
    // ─────────────────────────────────────────────────────────────────

    if (targetNum && targetNum in USERS) {
      USERS[targetNum].balance += a;
    }
    
    if (targetNum) {
      if (!user.known_recipients) user.known_recipients = new Set();
      user.known_recipients.add(targetNum);
    }
    
    user.risk_score = Math.max(0, user.risk_score + riskData.risk - (otpUsed ? OTP_DISCOUNT : 0));
    if (!user.risk_score_history) user.risk_score_history = [];
    user.risk_score_history.push({
      time: new Date(),
      score: user.risk_score,
      amount: a,
      receiver: targetNum,
      action: riskData.action
    });
    
    setLastTx(tx);
    setStage("success");

    // Record location for impossible travel detection on the NEXT transaction.
    const _freshLoc = getFreshLocation().then(loc => {
      recordTxLocation(user.number, loc.lat, loc.lng, Date.now());
    });

    if (recordBlock(user)) {
      const freeze = freezeAccount(user, "3 blocked transactions in 5 minutes.");
      setFreezeData(freeze);
      setShowFreeze(true);
    }
  }

  if (showCooldown && cooldownData) {
    return <CooldownModal 
      remaining={cooldownData.remaining}
      reason={cooldownData.reason}
      onClose={() => setShowCooldown(false)}
    />;
  }

  if (showFreeze && freezeData) {
    return <FreezeModal 
      message={freezeData.message || freezeData.reason}
      permanent={freezeData.permanent}
      remaining={freezeData.remaining}
      onClose={() => setShowFreeze(false)}
    />;
  }

  if(stage==="success") return(
    <div className="page-pad page-enter" style={{padding:40,display:"flex",flexDirection:"column",
      alignItems:"center",minHeight:"60vh",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:24,padding:"40px 34px",maxWidth:380,width:"100%",
        boxShadow:"0 20px 56px rgba(0,120,255,.1)",textAlign:"center",animation:"scaleIn .4s cubic-bezier(.16,1,.3,1)"}}>
        <div style={{width:80,height:80,borderRadius:"50%",
          background:"linear-gradient(135deg,#dcfce7,#bbf7d0)",
          display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",
          boxShadow:"0 8px 24px rgba(34,197,94,.2)"}}>
          <svg width="40"height="40"viewBox="0 0 40 40">
            <polyline points="8 20 16 28 32 12"fill="none"stroke="#166534"strokeWidth="3.5"strokeLinecap="round"strokeLinejoin="round"
              strokeDasharray="36"strokeDashoffset="36"style={{animation:"drawCheck .4s .1s ease forwards"}}/>
          </svg>
        </div>
        <h2 style={{color:"#166534",fontSize:22,fontWeight:800,marginBottom:8}}>Payment Successful!</h2>
        <p style={{color:"#64748b",marginBottom:4,fontSize:15}}>
          <b style={{color:"#0f172a"}}>₹{parsedAmt.toLocaleString("en-IN")}</b> sent to
        </p>
        <p style={{color:"#0078FF",fontWeight:700,marginBottom:4,fontSize:14}}>{getRecipientInfo().name || recipient}</p>
        <p style={{color:"#94a3b8",fontSize:12,marginBottom:28}}>Ref: PT{lastTx&&lastTx.id}</p>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{setStage("form");setRecipient("");setAmt("");setNote("");setRiskData({score:0,signals:[],action:'allow'});setBalErr("");}} variant="primary" style={{flex:1}}>
            New Payment
          </Btn>
          <Btn onClick={()=>setPage("history")} variant="secondary" style={{flex:1}}>History</Btn>
        </div>
      </div>
    </div>
  );

  return(
    <div className="page-pad page-enter" style={{padding:24,maxWidth:580,margin:"0 auto"}}>
      {/* ===== NEW: Smart Delay Modal for high-value transactions ===== */}
      {showSmartDelay && (
        <SmartDelayModal
          amount={parsedAmt}
          onConfirm={handleSmartDelayConfirm}
          onCancel={() => { setShowSmartDelay(false); setStage("risk"); }}
        />
      )}

      {/* ===== FEATURE: Duplicate Payment Warning Modal ===== */}
      {showDupWarning && (
        <Modal>
          <div style={{background:"#fff",borderRadius:24,padding:"32px 28px",maxWidth:380,width:"100%",
            boxShadow:"0 20px 56px rgba(0,0,0,.18)",textAlign:"center",animation:"scaleIn .3s cubic-bezier(.16,1,.3,1)"}}>
            <div style={{width:72,height:72,borderRadius:"50%",background:"#fef3c7",
              display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",
              boxShadow:"0 8px 24px rgba(245,158,11,.2)"}}>
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#d97706" strokeWidth="2.5" strokeLinecap="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
            </div>
            <h3 style={{color:"#92400e",fontSize:18,fontWeight:800,marginBottom:10}}>Duplicate Payment Alert</h3>
            <p style={{color:"#78350f",fontSize:14,lineHeight:1.6,marginBottom:24}}>
              You recently sent <strong>₹{parsedAmt.toLocaleString("en-IN")}</strong> to{" "}

            </p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={handleDupWarningCancel}
                style={{flex:1,padding:"12px",borderRadius:12,border:"1.5px solid #e2e8f0",

                  fontFamily:"'DM Sans',sans-serif"}}>

              </button>
              <button onClick={handleDupWarningProceed}
                style={{flex:1,padding:"12px",borderRadius:12,border:"none",
                  background:"linear-gradient(135deg,#d97706,#b45309)",
                  color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",
                  fontFamily:"'DM Sans',sans-serif",
                  boxShadow:"0 4px 14px rgba(217,119,6,.3)"}}>
                Proceed Anyway
              </button>
            </div>
          </div>
        </Modal>
      )}

      {/* === Out-of-Band Verification Feature: modal rendered before PIN/OTP === */}
      {showOOBModal && (
        <OutOfBandVerificationModal

      {stage==="otp" && (

          mobile={user.number}

      {(stage==="form"||stage==="analyzing")&&(

              <div style={{marginTop:6,fontSize:12,color:"#dc2626",fontWeight:600,animation:"slideDown .2s ease"}}>
                {recipientErr}
              </div>
            )}
            {recipient && recipientType === 'phone' && recipient in USERS && (
              <div style={{marginTop:6,fontSize:13,color:"#166534",display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                {Ic.check("#166534")} <strong>{USERS[recipient].name}</strong>
                {USERS[recipient].verified && (
                  <span style={{fontSize:11,background:"#e0f2fe",color:"#0369a1",padding:"2px 8px",
                    borderRadius:12,fontWeight:700,display:"flex",alignItems:"center",gap:3}}>
                    ✔ Verified
                  </span>
                )}
                {/* Network report count badge */}
                {getRecipientRisk(recipient) > 0 && (
                  <span style={{fontSize:11,background:"#fef2f2",color:"#dc2626",
                    padding:"2px 9px",borderRadius:12,fontWeight:700,border:"1px solid #fca5a5"}}>
                    ⚠ Reported {getRecipientRisk(recipient)}×
                  </span>
                )}
                {getRecipientRisk(recipient) > 3 && (
                  <span style={{fontSize:11,background:"#450a0a",color:"#fca5a5",
                    padding:"2px 9px",borderRadius:12,fontWeight:700}}>
                    🚨 High-risk
                  </span>
                )}
              </div>
            )}
            {/* ===== Recipient Risk Warning (network-level reporting) ===== */}
            <RecipientRiskWarning recipient={recipient} recipientType={recipientType} userContacts={user.contacts} amount={parsedAmt} userObj={user}/>
          </div>

          <div style={{marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <label style={{fontSize:12,fontWeight:700,color:"#374151"}}>Amount (₹)</label>
              {isInsufficient&&(
                <span style={{fontSize:11,fontWeight:700,color:"#dc2626",display:"flex",alignItems:"center",gap:4}}>
                  {Ic.warn("#dc2626")} Exceeds balance
                </span>
              )}
            </div>
            <input type="number" value={amt} onChange={e=>handleAmtChange(e.target.value)}
              placeholder="0"
              style={{width:"100%",padding:"12px 14px",borderRadius:12,
                border:`1.5px solid ${isInsufficient?"#fca5a5":amt?"#93c5fd":"#e2e8f0"}`,
                fontSize:24,fontWeight:800,outline:"none",boxSizing:"border-box",
                color:isInsufficient?"#dc2626":"#0f172a",background:isInsufficient?"#fef2f2":"#fff"}}/>
            {isInsufficient&&(
              <div style={{display:"flex",alignItems:"center",gap:7,marginTop:8,padding:"9px 12px",
                background:"#fef2f2",borderRadius:10,border:"1px solid #fca5a5"}}>
                {Ic.warn("#dc2626")}
                <span style={{fontSize:13,color:"#dc2626",fontWeight:600}}>
                  You only have ₹{balance.toLocaleString("en-IN")} available.
                </span>
              </div>
            )}
            <div style={{marginTop:10,display:"flex",gap:7,flexWrap:"wrap"}}>
              {[500,1000,5000,10000].map(v=>(
                <button key={v} onClick={()=>handleAmtChange(String(v))}
                  style={{padding:"5px 12px",background:amt==v?"#e8f1ff":"#f8faff",
                    border:`1.5px solid ${amt==v?"#93c5fd":"#e2e8f0"}`,borderRadius:20,
                    color:amt==v?"#0078FF":"#64748b",cursor:"pointer",fontSize:13,fontWeight:600}}>
                  ₹{v.toLocaleString("en-IN")}
                </button>
              ))}
            </div>
          </div>

          <div style={{marginBottom:22}}>
            <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:7}}>Note (optional)</label>
            <input value={note} onChange={e=>setNote(e.target.value)} placeholder="What's this for?"
              style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1.5px solid #e2e8f0",
                fontSize:14,outline:"none",boxSizing:"border-box",color:"#0f172a"}}/>
          </div>

          {stage==="analyzing"&&(
            <div style={{marginBottom:20,padding:"16px",background:"#e8f1ff",borderRadius:14,
              border:"1px solid #93c5fd"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:10}}>
                <span style={{display:"flex",alignItems:"center",gap:7,color:"#0078FF",fontWeight:800}}>
                  {Ic.shield("#0078FF")} Analyzing transaction…
                </span>
                <span style={{fontWeight:800,color:"#0078FF"}}>{Math.round(prog)}%</span>
              </div>
              <div style={{height:6,background:"#dbeafe",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${prog}%`,
                  background:`linear-gradient(90deg,#0078FF,#0055cc)`,
                  borderRadius:3,transition:"width .1s"}}/>
              </div>
              <div style={{display:"flex",gap:7,marginTop:12,flexWrap:"wrap"}}>
                {["Rule Engine","Behaviour","ML Scorer","Keyword Scan","Decision"].map((s,i)=>(
                  <span key={s} style={{padding:"4px 10px",
                    background:prog>(i+1)*20?"#dbeafe":"#f8faff",
                    border:`1px solid ${prog>(i+1)*20?"#93c5fd":"#e2e8f0"}`,borderRadius:16,
                    fontSize:11,color:prog>(i+1)*20?"#0078FF":"#94a3b8",fontWeight:600,
                    display:"flex",alignItems:"center",gap:5}}>
                    {prog>(i+1)*20?Ic.check("#0078FF"):<svg width="11"height="11"viewBox="0 0 12 12"><circle cx="6"cy="6"r="5"fill="none"stroke="#e2e8f0"strokeWidth="1.5"/></svg>}
                    {s}
                  </span>
                ))}
              </div>
            </div>
          )}

          <button onClick={analyzeRisk} disabled={!isFormReady||stage==="analyzing"}
            className="btn-primary"
            style={{width:"100%",padding:"14px",fontSize:16,borderRadius:14,border:"none",
              background:(!isFormReady||stage==="analyzing")?"#93c5fd":`linear-gradient(135deg,#0078FF,#0055cc)`,
              color:"#fff",fontWeight:700,
              cursor:(!isFormReady||stage==="analyzing")?"not-allowed":"pointer",
              boxShadow:(!isFormReady||stage==="analyzing")?"none":"0 6px 18px rgba(0,120,255,.28)"}}>
            {stage==="analyzing"?"Analyzing…":"Analyze & Send →"}
          </button>
        </Card>
      )}

      {stage==="risk" && (
        <>
          {/* ===== FEATURE 2: Behavioral Biometrics alert ===== */}
          {getBiometricRisk(user.number).risk >= 5 && (
            <div style={{padding:"12px 16px",background:"#fff7ed",border:"1px solid #fdba74",
              borderRadius:12,marginBottom:14,display:"flex",alignItems:"center",gap:10,
              animation:"slideDown .3s ease"}}>
              {Ic.warn("#f97316")}
              <span style={{fontSize:13,color:"#92400e",fontWeight:600}}>
                Unusual behavior detected — additional verification applied
              </span>
            </div>
          )}
          <FraudRiskCard
            score={riskData.score}
            recipient={getRecipientInfo().name || recipient}
            recipientNum={getRecipientInfo().targetNum || recipient}
            amount={parsedAmt}
            signals={riskData.signals}
            onVerify={handleVerify}
            onCancel={() => setStage("form")}
            onReport={handleReport}
            tier={riskData.tier}
            kwMatched={riskData.kwMatched || []}
            urgencyHits={riskData.urgencyHits || []}
            urgencyScore={riskData.urgencyScore || 0}
          />
        </>
      )}
    </div>
  );
}

/* ═══ REQUESTS PAGE — Fully Upgraded ═══ */
function RequestsPage({user,requests,resolveRequest,addTx,updateBalance,updateUser}){
  const [localRequests, setLocalRequests] = useState(requests);
  const [verifying, setVerifying] = useState(null);
  const [verifyStage, setVerifyStage] = useState('otp');
  const [showFreeze, setShowFreeze] = useState(false);
  const [freezeData, setFreezeData] = useState(null);
  // ── Report modal state: null | { req } ──
  const [reportModal, setReportModal] = useState(null);

  useEffect(() => { setLocalRequests(requests); }, [requests]);

  useEffect(() => {
    const frozen = checkFrozen(user);
    if (frozen.frozen) { setFreezeData(frozen); setShowFreeze(true); }
  }, [user]);

  /* ── Red-flag keyword scanner for payment request notes ── */
  const REQ_SCAM_KEYWORDS = [
    // Greed hooks (critical tier — +50 to +60)
    "prize","lucky draw","won","cashback","reward","lottery","free prize","you won","congratulations",
    "cash win","free win","award","gift card","bonus prize",
    // Urgency / fear (critical tier — +48 to +55)
    "blocked","electricity bill","emergency","processing fee","pending fine","penalty","charge",
    "admin fee","refund fee","claim prize","verify account","account blocked","urgent payment",
    // Authority hooks (critical tier — +48 to +55)
    "kyc update","bank officer","verification","refund department","support","aadhaar update",
    "pan card","immediate action","act now","limit exceeded"
  ];

  // Tiered keyword penalty based on sender verification
  function scanNoteKeywords(note, senderVerified = false) {
    if (!note) return { hit: false, matched: [], penalty: 0, tier: null };
    const lower = note.toLowerCase();
    const matched = REQ_SCAM_KEYWORDS.filter(kw => lower.includes(kw));
    if (matched.length === 0) return { hit: false, matched: [], penalty: 0, tier: null };
    // Unknown/unverified sender + scam keyword → critical penalty
    if (!senderVerified) {
      const critical = matched.some(k => ["prize","lucky draw","won","emergency","refund fee","claim prize"].some(c => lower.includes(c)));
      return { hit: true, matched, penalty: critical ? 60 : 50, tier: "critical" };
    }
    // Known sender but still flagged → medium-high
    return { hit: true, matched, penalty: 35, tier: "high" };
  }

  /* ── Risk helpers for a request — with keyword penalty & deduplication ── */
  function reqRiskInfo(req) {
    const result        = calculateRisk(user, req.amt, req.fromNum);
    const senderVerified = (user.contacts || {}).hasOwnProperty(req.fromNum);
    const kwScan        = scanNoteKeywords(req.reason, senderVerified);
    const kwPenalty     = kwScan.penalty;

    // Deduplicate amount-based signals before adding keyword ones
    const amtPatterns = [
      /This transaction drains \d+% of your balance/i,
      /Large transfer:.*of your current balance/i,
      /Amount.*is unusually far outside your typical range/i,
      /Amount ₹[\d,]+ is (much higher|higher) than your usual/i,
      /This transaction.*is.*higher than your usual amount/i,
      /Large transaction for.*your age group/i,
      /High.?value transaction/i,
      /\d+(\.\d+)?× (your avg|higher than)/i,
    ];
    let seenAmt = false;
    const dedupedSignals = result.signals.filter(s => {
      const isAmt = amtPatterns.some(rx => rx.test(s));
      if (isAmt) { if (!seenAmt) { seenAmt = true; return true; } return false; }
      return true;
    });

    // Append keyword signals if triggered
    const signals = [...dedupedSignals];
    if (kwScan.hit) {
      const severity = kwScan.tier === "critical" ? "🚨 Critical" : "⚠️ High";
      signals.push(
        `${severity} scam keyword${kwScan.matched.length > 1 ? "s" : ""} in note: "${kwScan.matched.slice(0,3).join('", "')}" — high-fraud pattern.`
      );
    }

    let rawRisk = result.risk + kwPenalty;

    // ── Minimum risk floor for scam keywords ──
    if (kwScan.hit) {
      const hasOtherSignals = result.signals.length > 0 || rawRisk > result.risk;
      const floor = hasOtherSignals ? 85 : 70;
      rawRisk = Math.max(rawRisk, floor);
    }

    const totalRisk = Math.min(100, user.risk_score + rawRisk);
    let tier = 'normal';
    if (totalRisk >= RISK_OTP)  tier = 'otp';
    else if (totalRisk >= RISK_INFO) tier = 'info';
    return { result: {...result, risk: rawRisk, signals}, totalRisk, tier, kwScan };
  }

  function acceptReq(req) {
    const { result, totalRisk, tier } = reqRiskInfo(req);
    setVerifying({ req, result, tier, totalRisk });
    setVerifyStage(tier !== 'normal' ? 'otp' : 'pin');
  }

  function completeAccept() {
    const { req, result, tier } = verifying;
    const { date, time } = nowStamp();
    if (req.amt > user.balance) {
      alert("Insufficient balance to pay this request");
      setVerifying(null); return;
    }
    const otpUsed = tier === 'otp' || tier === 'high_risk';
    const status  = tier === 'high_risk' ? 'verified' : 'success';
    const tx = {
      id: Date.now(), to: req.from, toNum: req.fromNum, upi: req.upi,
      amt: req.amt, date, time, risk: verifying.totalRisk, status,
      type: "debit", note: req.reason, isNew: true,
      risk_tag: tier, otp_used: otpUsed
    };
    addTx(tx);
    updateBalance(b => b - req.amt);
    if (req.fromNum) {
      if (!user.known_recipients) user.known_recipients = new Set();
      user.known_recipients.add(req.fromNum);
    }
    user.risk_score = Math.max(0, user.risk_score + result.risk - (otpUsed ? OTP_DISCOUNT : 0));
    resolveRequest(req.id, "paid");
    setLocalRequests(prev => prev.map(r => r.id === req.id ? {...r, status:"paid"} : r));
    setVerifying(null);
  }

  function declineReq(id) {
    resolveRequest(id, "declined");
    setLocalRequests(prev => prev.map(r => r.id === id ? {...r, status:"declined"} : r));
  }

  function openReportModal(req) { setReportModal({ req }); }

  function completeReport(reason) {
    const { req } = reportModal;
    if (req.fromNum) {
      reportRecipient(user.number, req.fromNum, req.amt, reason);
    }
    resolveRequest(req.id, "reported");
    setLocalRequests(prev => prev.map(r => r.id === req.id ? {...r, status:"reported"} : r));
    setReportModal(null);
  }

  const pending  = localRequests.filter(r => r.status === "pending");
  const resolved = localRequests.filter(r => r.status !== "pending");

  if (showFreeze && freezeData) {
    return <FreezeModal message={freezeData.message} permanent={freezeData.permanent}
      remaining={freezeData.remaining} onClose={() => setShowFreeze(false)}/>;
  }

  return(
    <div className="page-pad page-enter" style={{padding:24,maxWidth:720,margin:"0 auto"}}>

      {/* ── Report Reason Modal ── */}
      {reportModal && (
        <ReportReasonModal
          title="Report This Request"
          onSelect={completeReport}
          onCancel={() => setReportModal(null)}
        />
      )}

      {/* ── OTP / PIN verification modals ── */}
      {verifying && (
        verifying.tier !== 'normal' && verifyStage === 'otp' ? (
          <OTPModal
            mobile={user.number}
            onSuccess={() => setVerifyStage('pin')}
            onCancel={() => { setVerifying(null); setVerifyStage('otp'); }}
          />
        ) : (
          <PINModal
            userPin={user.pin} user={user}
            onSuccess={completeAccept}
            onCancel={() => { setVerifying(null); setVerifyStage('otp'); }}
          />
        )
      )}

      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#0f172a",marginBottom:4}}>Payment Requests</h2>
        <p style={{fontSize:14,color:"#64748b"}}>{pending.length} pending · {resolved.length} resolved · Paying these will debit your balance</p>
      </div>

      {localRequests.length===0 && (
        <Card style={{padding:"40px",textAlign:"center"}}>
          <div style={{color:"#94a3b8",fontSize:15}}>No payment requests.</div>
        </Card>
      )}

      {localRequests.map((req, ri) => {
        const { result, totalRisk, tier, kwScan } = reqRiskInfo(req);
        const m = riskMeta(totalRisk);
        const requiresOTP  = totalRisk >= RISK_OTP;   // 85+: PIN+OTP enforced
        const useOTPLabel  = totalRisk >= 90;          // 90+: button reads "Verify with OTP"
        const needsTimer   = totalRisk >= 90;          // 90+: timer shown
        const isSuspicious = requiresOTP;
        const recipRisk    = getRecipientRisk(req.fromNum || "");
        const recipReason  = getRecipientReportReason(req.fromNum || "");

        // signals are already deduped inside reqRiskInfo
        const signals = result.signals || [];

        return (
          <Card key={req.id} style={{
            padding: 0, marginBottom: 16, overflow: "hidden",
            border: (req.id === 999 || (needsTimer && recipRisk > 0))
                    ? "2px solid #dc2626"
                    : needsTimer ? "1.5px solid #fca5a5"
                    : isSuspicious ? "1.5px solid #fdba74"
                    : "1px solid rgba(0,80,200,.07)",
            boxShadow: (req.id === 999 || (needsTimer && recipRisk > 0))
                    ? "0 0 0 3px rgba(220,38,38,.15), 0 8px 28px rgba(220,38,38,.18)"
                    : undefined,
          }}>
            {/* risk accent bar */}
            <div style={{height:4, background:`linear-gradient(90deg,${m.dot},${m.color})`, borderRadius:"18px 18px 0 0"}}/>

            <div style={{padding:"18px 20px 0"}}>
              {/* ── 90+ Extra Caution Banner ── */}
              {needsTimer && req.status === "pending" && (
                <div style={{
                  display:"flex", alignItems:"flex-start", gap:10,
                  padding:"11px 14px", marginBottom:14,
                  background:"linear-gradient(135deg,#fef2f2,#fff1f2)",
                  border:"2px solid #dc2626", borderRadius:12,
                  animation:"slideDown .3s ease"
                }}>
                  <span style={{fontSize:20, lineHeight:1, flexShrink:0}}>⚠️</span>
                  <div>
                    <div style={{fontWeight:800, fontSize:13, color:"#dc2626"}}>BE EXTRA CAREFUL</div>
                    <div style={{fontSize:12, color:"#991b1b", marginTop:2, lineHeight:1.4}}>
                      This request has multiple high-risk signals. Verify the sender's identity before paying.
                    </div>
                  </div>
                </div>
              )}

              {/* ── Suspicious (85–89) inline warning ── */}
              {isSuspicious && !needsTimer && req.status === "pending" && (
                <div style={{
                  display:"flex", alignItems:"center", gap:9,
                  padding:"9px 13px", marginBottom:12,
                  background:"#fff7ed", border:"1px solid #fdba74", borderRadius:10,
                  animation:"slideDown .3s ease"
                }}>
                  {Ic.warn("#f97316")}
                  <span style={{fontSize:12, color:"#92400e", fontWeight:600}}>
                    Suspicious request — OTP verification required before paying
                  </span>
                </div>
              )}

              {/* ── Request header ── */}
              <div style={{display:"flex", alignItems:"center", gap:14, marginBottom:14}}>
                <Avatar name={req.from} size={48}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800, fontSize:15, color:"#0f172a"}}>{req.from}</div>
                  <div style={{fontSize:12, color:"#94a3b8", marginTop:2}}>{req.upi} · {req.ago}</div>
                  <div style={{fontSize:12, color:"#64748b", fontStyle:"italic", marginTop:3}}>"{req.reason}"</div>
                  {/* Prior report signal from registry */}
                  {recipRisk >= 1 && (
                    <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:5}}>
                      <div style={{display:"inline-flex", alignItems:"center", gap:5,
                        padding:"3px 10px", background:"#fef2f2", border:"1px solid #fca5a5",
                        borderRadius:20, fontSize:11, fontWeight:700, color:"#dc2626"}}>
                        {Ic.flag("#dc2626")}
                        ⚠ Reported {recipRisk}× {recipReason ? `for ${recipReason}` : "in network"}
                      </div>
                      {recipRisk > 3 && (
                        <div style={{display:"inline-flex", alignItems:"center", gap:5,
                          padding:"3px 10px", background:"#450a0a", border:"1px solid #dc2626",
                          borderRadius:20, fontSize:11, fontWeight:700, color:"#fca5a5"}}>
                          🚨 High-risk recipient
                        </div>
                      )}
                    </div>
                  )}
                </div>
                <div style={{textAlign:"right", flexShrink:0}}>
                  <div style={{fontWeight:800, fontSize:20, color:"#dc2626"}}>
                    −₹{req.amt.toLocaleString("en-IN")}
                  </div>
                  <div style={{fontSize:11, color:"#94a3b8", marginTop:2}}>will debit your account</div>
                  <div style={{marginTop:6}}>
                    <RiskPill score={totalRisk}/>
                  </div>
                </div>
              </div>

              {/* ── Engine Insights (deduped signals) ── */}
              {signals.length > 0 && req.status === "pending" && (
                <div style={{marginBottom:12}}>
                  <p style={{fontSize:10, fontWeight:800, color:"#94a3b8",
                    textTransform:"uppercase", letterSpacing:.8, marginBottom:7}}>
                    🔍 Engine Insights
                  </p>
                  <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                    {signals.slice(0,5).map((s, i) => {
                      const isKW = s.startsWith("⚠️") || s.startsWith("🚨");
                      return (
                        <div key={i} style={{
                          display:"flex", alignItems:"flex-start", gap:7,
                          padding:"6px 10px",
                          background: isKW ? "#fff7ed" : m.bg,
                          border:`1px solid ${isKW ? "#fdba74" : m.border}`,
                          borderRadius:9, fontSize:12,
                          color: isKW ? "#92400e" : m.color,
                          fontWeight: isKW ? 600 : 500, lineHeight:1.4,
                          animation:`slideInL .2s ${i*.06}s ease both`
                        }}>
                          <svg width="6" height="6" style={{flexShrink:0, marginTop:4}}>
                            <circle cx="3" cy="3" r="3" fill={isKW ? "#f59e0b" : m.dot}/>
                          </svg>
                          {s}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── Why is this risky? (Layer 2: short reasons + Layer 3: tags) ── */}
              {req.status === "pending" && totalRisk >= 60 && (()=>{
                const TAG_STYLE_REQ = (tag) => {
                  const map = {
                    "Reported":    {c:"#dc2626", bg:"#fef2f2", bd:"#fca5a5"},
                    "New":         {c:"#f59e0b", bg:"#fef3c7", bd:"#fcd34d"},
                    "High Amount": {c:"#f97316", bg:"#fff7ed", bd:"#fdba74"},
                    "Large Spend": {c:"#ea580c", bg:"#fff7ed", bd:"#fb923c"},
                    "Odd Hour":    {c:"#7c3aed", bg:"#f5f3ff", bd:"#c4b5fd"},
                    "Off-Network": {c:"#0369a1", bg:"#e0f2fe", bd:"#7dd3fc"},
                  };
                  return map[tag] || {c:"#64748b", bg:"#f8faff", bd:"#e2e8f0"};
                };
                const rr2 = getRecipientRisk(req.fromNum || "");
                const reqReasons = [];
                const reqTags    = [];
                if (rr2 > 0) { reqReasons.push(`Reported by ${rr2} user${rr2>1?"s":""}`); reqTags.push("Reported"); }
                signals.forEach(s => {
                  const sl = s.toLowerCase();
                  if ((sl.includes("new recipient") || sl.includes("not seen in your contacts")) &&
                      !reqReasons.some(r=>r.toLowerCase().includes("new"))) {
                    reqReasons.push("New recipient"); reqTags.push("New");
                  }
                  if ((sl.includes("drain") || sl.includes("large transfer") || sl.includes("higher than your usual") || sl.includes("unusually far outside")) &&
                      !reqReasons.some(r=>r.toLowerCase().includes("amount"))) {
                    reqReasons.push("High amount"); if(!reqTags.includes("High Amount")) reqTags.push("High Amount");
                  }
                  if ((sl.includes("off-network") || sl.includes("outside the upi network")) &&
                      !reqReasons.some(r=>r.toLowerCase().includes("network"))) {
                    reqReasons.push("Off-network account"); if(!reqTags.includes("Off-Network")) reqTags.push("Off-Network");
                  }
                  if ((sl.includes("daily spending") || sl.includes("starting balance") || sl.includes("portion")) &&
                      !reqReasons.some(r=>r.toLowerCase().includes("spend"))) {
                    reqReasons.push("Large spend"); if(!reqTags.includes("Large Spend")) reqTags.push("Large Spend");
                  }
                });
                const dedupedR = [...new Set(reqReasons)];
                const dedupedT = [...new Set(reqTags)];
